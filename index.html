<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DELVE — The Infinite Dark</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    overflow: hidden;
  }

  #title {
    color: #ff9900;
    font-size: 11px;
    letter-spacing: 4px;
    margin-bottom: 10px;
    text-shadow: 0 0 10px #ff6600, 0 0 20px #ff3300;
    animation: flicker 4s infinite;
  }

  #game-wrapper {
    position: relative;
    border: 3px solid #ff9900;
    border-bottom: none;
    box-shadow: 0 0 20px #ff6600, 0 0 60px #ff330033, inset 0 0 30px #00000088;
  }

  #canvas-wrapper {
    position: relative;
    display: block;
  }

  canvas#game {
    display: block;
    image-rendering: pixelated;
  }

  /* CRT overlay — only over the canvas, not the HUD */
  #crt {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.07) 2px,
      rgba(0,0,0,0.07) 4px
    );
  }

  #hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    color: #ff9900;
    font-size: 6px;
    padding: 6px 10px;
    background: #0a0500;
    border: 2px solid #ff6600;
    border-top: 2px solid #ff6600;
    letter-spacing: 1px;
    /* prevent layout shift from text changes */
    white-space: nowrap;
  }

  #hud span {
    display: inline-block;
    min-width: 80px;
  }

  #controls {
    color: #664400;
    font-size: 5px;
    margin-top: 8px;
    letter-spacing: 1px;
    text-align: center;
  }

  @keyframes flicker {
    0%,95%,100% { opacity: 1; }
    96% { opacity: 0.6; }
    97% { opacity: 1; }
    98% { opacity: 0.7; }
    99% { opacity: 1; }
  }

  @keyframes crt-flicker {
    0% { opacity: 1; }
    50% { opacity: 0.97; }
    100% { opacity: 1; }
  }
</style>
</head>
<body>
<div id="title">∞ &nbsp; D E L V E &nbsp; ∞</div>
<div id="game-wrapper">
  <div id="canvas-wrapper">
    <canvas id="game"></canvas>
    <div id="crt"></div>
  </div>
  <div id="hud">
    <span id="hud-pos">X:0 Y:0</span>
    <span id="hud-explored">TILES: 0</span>
    <span id="hud-pixels">PIXELS MAPPED: 0</span>
    <span id="hud-gold" style="color:#ffdd44;text-shadow:0 0 8px #ffaa00">GOLD: 0</span>
    <span id="hud-oil" style="color:#ff8800">OIL: 100%</span>
    <span id="hud-biome" style="color:#aabbff">DUNGEON</span>
    <span id="hud-depth">DEPTH: 0</span>
  </div>
</div>
<div id="controls">WASD — MOVE &nbsp;|&nbsp; SHIFT — SPRINT &nbsp;|&nbsp; SPACE (hold=charge) — ATTACK &nbsp;|&nbsp; V — DASH &nbsp;|&nbsp; X — PARRY &nbsp;|&nbsp; F — POUND &nbsp;|&nbsp; G — BOMB &nbsp;|&nbsp; Q — BOW &nbsp;|&nbsp; 1/2/3 — WEAPON &nbsp;|&nbsp; I — INVENTORY &nbsp;|&nbsp; Z — BOOSTS &nbsp;|&nbsp; E — SHOP &nbsp;|&nbsp; ? — HELP</div>

<script>
const TILE = 16;
const COLS = 50;
const ROWS = 38;
const W = COLS * TILE;
const H = ROWS * TILE;

// ═══════════════════════════════════════════════════════════
// DELVE — Web Audio Sound Engine (procedural, no files)
// ═══════════════════════════════════════════════════════════
const SFX = (() => {
  let _ctx = null, masterGain = null, ambiNode = null, ambiGain = null;
  let curBiome = null, enabled = true;

  function init() {
    if (_ctx) return;
    _ctx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = _ctx.createGain();
    masterGain.gain.value = 0.55;
    masterGain.connect(_ctx.destination);
  }
  function resume() { if (_ctx && _ctx.state === 'suspended') _ctx.resume(); }
  function now() { return _ctx ? _ctx.currentTime : 0; }

  function osc(type, freq, t, dur, vol, detune) {
    if (!_ctx || !enabled) return;
    const o = _ctx.createOscillator(), g = _ctx.createGain();
    o.type = type; o.frequency.value = freq;
    if (detune) o.detune.value = detune;
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g); g.connect(masterGain);
    o.start(t); o.stop(t + dur + 0.01);
  }

  function noise(dur, vol, ffreq) {
    if (!_ctx || !enabled) return;
    const buf = _ctx.createBuffer(1, Math.ceil(_ctx.sampleRate * dur), _ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    const src = _ctx.createBufferSource();
    src.buffer = buf;
    const f = _ctx.createBiquadFilter();
    f.type = 'bandpass'; f.frequency.value = ffreq; f.Q.value = 0.6;
    const g = _ctx.createGain();
    g.gain.setValueAtTime(vol, now());
    g.gain.exponentialRampToValueAtTime(0.0001, now() + dur);
    src.connect(f); f.connect(g); g.connect(masterGain);
    src.start(); src.stop(now() + dur);
  }

  function play(id) {
    if (!_ctx || !enabled) return;
    resume();
    const t = now();
    switch (id) {
      case 'step':        noise(0.06, 0.04, 200 + Math.random()*120); break;
      case 'step_lava':   noise(0.09, 0.055, 80); osc('sine', 55+Math.random()*15, t, 0.12, 0.04); break;
      case 'step_ice':    noise(0.04, 0.03, 2000+Math.random()*400); osc('triangle', 800, t, 0.05, 0.025); break;
      case 'sword':       noise(0.14, 0.22, 800+Math.random()*300); osc('sawtooth', 180, t, 0.08, 0.12, -200); osc('sine', 440, t+0.06, 0.06, 0.06); break;
      case 'sword_charged': noise(0.2, 0.35, 600); osc('sawtooth', 120, t, 0.15, 0.18, -300); osc('square', 280, t+0.05, 0.12, 0.1); osc('sine', 880, t+0.1, 0.08, 0.08); break;
      case 'torch_swing': noise(0.18, 0.18, 400); osc('sawtooth', 90, t, 0.14, 0.1, 100); break;
      case 'arrow_fire':  noise(0.1, 0.12, 1200); osc('sawtooth', 320, t, 0.06, 0.07, -100); break;
      case 'arrow_hit':   noise(0.08, 0.15, 500); osc('square', 200, t, 0.05, 0.06); break;
      case 'bomb_throw':  osc('sine', 380, t, 0.06, 0.1); osc('sine', 300, t+0.03, 0.05, 0.06); break;
      case 'bomb_explode': noise(0.35, 0.55, 120); osc('sine', 60, t, 0.3, 0.25); osc('sawtooth', 40, t, 0.25, 0.2); osc('square', 120, t+0.05, 0.15, 0.12); break;
      case 'ground_pound': noise(0.4, 0.45, 80); osc('sine', 55, t, 0.35, 0.3); osc('sine', 40, t+0.05, 0.3, 0.2); break;
      case 'parry':       osc('square', 800, t, 0.05, 0.15); osc('triangle', 1200, t+0.02, 0.06, 0.12); osc('sine', 600, t+0.04, 0.08, 0.08); break;
      case 'dash':        noise(0.12, 0.14, 1800); osc('sawtooth', 400, t, 0.08, 0.07, 300); break;
      case 'coin':        osc('sine', 880+Math.random()*200, t, 0.08, 0.09); osc('sine', 1200+Math.random()*200, t+0.03, 0.06, 0.07); break;
      case 'gem':         osc('triangle', 1100, t, 0.1, 0.11); osc('triangle', 1600, t+0.04, 0.08, 0.09); osc('sine', 2200, t+0.07, 0.06, 0.06); break;
      case 'chest':       osc('square', 220, t, 0.12, 0.1); osc('triangle', 440, t+0.05, 0.1, 0.1); osc('sine', 880, t+0.1, 0.12, 0.12); osc('sine', 1760, t+0.15, 0.1, 0.1); break;
      case 'potion':      osc('sine', 660, t, 0.1, 0.1); osc('sine', 880, t+0.04, 0.08, 0.09); osc('sine', 550, t+0.08, 0.12, 0.08); break;
      case 'oil_flask':   noise(0.12, 0.08, 600); osc('sine', 440, t, 0.1, 0.07); break;
      case 'hurt':        noise(0.18, 0.28, 300); osc('sawtooth', 160, t, 0.12, 0.15); osc('sine', 80, t+0.06, 0.1, 0.1); break;
      case 'enemy_hurt':  noise(0.1, 0.12, 400); osc('square', 200+Math.random()*100, t, 0.07, 0.08); break;
      case 'boss_hurt':   noise(0.22, 0.3, 200); osc('sawtooth', 100, t, 0.18, 0.2); osc('sine', 55, t+0.08, 0.16, 0.15); osc('square', 180, t+0.04, 0.12, 0.1); break;
      case 'enemy_die':   noise(0.2, 0.2, 250); osc('sawtooth', 150, t, 0.15, 0.12); osc('sine', 80, t+0.08, 0.12, 0.08); break;
      case 'boss_die': {
        noise(0.8, 0.55, 60); osc('sawtooth', 50, t, 0.7, 0.35); osc('sine', 35, t+0.1, 0.6, 0.3);
        osc('square', 110, t+0.05, 0.5, 0.25); osc('triangle', 220, t+0.2, 0.4, 0.15);
        const bo = _ctx.createOscillator(), bg = _ctx.createGain();
        bo.type = 'sawtooth'; bo.frequency.setValueAtTime(200, t); bo.frequency.exponentialRampToValueAtTime(800, t+0.4);
        bg.gain.setValueAtTime(0.15, t); bg.gain.exponentialRampToValueAtTime(0.0001, t+0.5);
        bo.connect(bg); bg.connect(masterGain); bo.start(t); bo.stop(t+0.55);
        break;
      }
      case 'boss_attack': noise(0.15, 0.22, 150); osc('square', 120, t, 0.12, 0.16); osc('sine', 60, t, 0.1, 0.14); break;
      case 'skeleton_bone': noise(0.08, 0.1, 600); osc('triangle', 400, t, 0.06, 0.07); break;
      case 'shadow_teleport': osc('sine', 800, t, 0.06, 0.09, -600); osc('sine', 200, t+0.05, 0.08, 0.07); noise(0.1, 0.08, 1500); break;
      case 'wraith_drain': osc('sine', 180, t, 0.08, 0.1, -200); osc('sine', 120, t+0.06, 0.1, 0.12, 100); break;
      case 'door_open':   noise(0.3, 0.15, 200); osc('square', 120, t, 0.25, 0.2); osc('sawtooth', 90, t+0.1, 0.2, 0.18); osc('square', 180, t+0.2, 0.15, 0.12); break;
      case 'lore_find':   osc('triangle', 660, t, 0.12, 0.1); osc('triangle', 880, t+0.06, 0.1, 0.1); osc('triangle', 1100, t+0.12, 0.14, 0.1); break;
      case 'act_start':   osc('square', 220, t, 0.2, 0.18); osc('square', 330, t+0.1, 0.15, 0.14); osc('square', 440, t+0.2, 0.15, 0.14); osc('triangle', 880, t+0.3, 0.2, 0.16); break;
      case 'victory':     [0,.12,.24,.36,.55].forEach((d,i)=>osc('triangle',[440,550,660,880,1100][i],t+d,0.4-i*0.04,0.15-i*0.01)); break;
      case 'shrine':      osc('sine', 528, t, 0.2, 0.14); osc('sine', 660, t+0.1, 0.18, 0.12); osc('sine', 792, t+0.18, 0.16, 0.1); osc('sine', 1056, t+0.28, 0.14, 0.1); break;
      case 'secret_wall': noise(0.25, 0.25, 150); osc('sawtooth', 80, t, 0.2, 0.15); osc('sine', 200, t+0.1, 0.15, 0.1); osc('triangle', 400, t+0.18, 0.12, 0.09); break;
      case 'menu_move':   osc('square', 440, t, 0.03, 0.04); break;
      case 'menu_confirm': osc('square', 440, t, 0.05, 0.05); osc('triangle', 880, t+0.04, 0.06, 0.05); break;
    }
  }

  // Biome drones silenced — music engine handles atmosphere now
  const DRONES = {
    dungeon: { freqs:[55],   gains:[0.0], type:'sine' },
    crypt:   { freqs:[46],   gains:[0.0], type:'sine' },
    cave:    { freqs:[49],   gains:[0.0], type:'sine' },
    ice:     { freqs:[64],   gains:[0.0], type:'sine' },
    lava:    { freqs:[41],   gains:[0.0], type:'sine' },
  };

  function setAmbience(biomeId) {
    if (!_ctx || !enabled || biomeId === curBiome) return;
    curBiome = biomeId;
    if (ambiGain) { ambiGain.gain.setTargetAtTime(0, now(), 1.5); }
    const drone = DRONES[biomeId]; if (!drone) return;
    const nodes = [];
    ambiGain = _ctx.createGain();
    ambiGain.gain.setValueAtTime(0, now());
    ambiGain.gain.setTargetAtTime(0.0, now(), 2.0); // silenced — music engine handles atmosphere
    ambiGain.connect(masterGain);
    drone.freqs.forEach((freq, i) => {
      const o = _ctx.createOscillator(), g = _ctx.createGain();
      const lfo = _ctx.createOscillator(), lg = _ctx.createGain();
      lfo.frequency.value = 0.08 + i * 0.03; lg.gain.value = drone.gains[i] * 0.3;
      lfo.connect(lg); lg.connect(g.gain);
      o.type = drone.type; o.frequency.value = freq; o.detune.value = (Math.random()-0.5)*8;
      g.gain.value = drone.gains[i];
      o.connect(g); g.connect(ambiGain); o.start(); lfo.start(); nodes.push(o, lfo);
    });
    if (biomeId === 'cave' || biomeId === 'lava') {
      const buf = _ctx.createBuffer(1, _ctx.sampleRate*2, _ctx.sampleRate);
      const d2 = buf.getChannelData(0); for (let i=0;i<d2.length;i++) d2[i]=Math.random()*2-1;
      const src = _ctx.createBufferSource(); src.buffer = buf; src.loop = true;
      const filt = _ctx.createBiquadFilter(); filt.type='lowpass'; filt.frequency.value = biomeId==='lava'?120:80;
      const g2 = _ctx.createGain(); g2.gain.value = biomeId==='lava'?0.025:0.018;
      src.connect(filt); filt.connect(g2); g2.connect(ambiGain); src.start(); nodes.push(src);
    }
    ambiNode = nodes;
  }

  function stopAmbience() {
    if (ambiGain) ambiGain.gain.setTargetAtTime(0, now(), 0.5);
    curBiome = null;
  }

  function toggle() {
    enabled = !enabled;
    if (masterGain) masterGain.gain.value = enabled ? 0.55 : 0;
    return enabled;
  }

  return { init, resume, play, setAmbience, stopAmbience, toggle,
           get ctx()     { return _ctx; },
           get master()  { return masterGain; },
           get enabled() { return enabled; } };
})();



// ═══════════════════════════════════════════════════════════
// DELVE — MUSIC ENGINE  v2
// Inspired by Mantis Lords (Hollow Knight / Christopher Larkin)
// A minor  |  60 BPM  |  ostinato + sparse melody + drone + stone hit
// ═══════════════════════════════════════════════════════════
const MUSIC = (() => {
  let ctx = null;
  let master = null;

  // ── Gain layers ─────────────────────────────────────────
  let gDrone    = null;   // sub-bass drone
  let gOstinato = null;   // plucked bass figure
  let gMelody   = null;   // sparse high melody
  let gPerc     = null;   // stone hits
  let gLowOilFx = null;   // low-oil dissonance layer

  let running   = false;
  let _state    = 'explore';
  let _nextBar  = 0;
  let _bar      = 0;        // bar counter
  let _melPhase = 0;        // which melody phrase we're on

  const BPM    = 60;
  const BEAT   = 60 / BPM;        // 1.0s
  const BAR    = BEAT * 4;        // 4.0s

  // ── A minor pentatonic: A3 C4 D4 E4 G4 A4 C5 E5 ─────────
  // Plus low register for ostinato
  const A2  = 110.00;
  const E3  = 164.81;
  const A3  = 220.00;
  const C4  = 261.63;
  const D4  = 293.66;
  const E4  = 329.63;
  const G4  = 392.00;
  const A4  = 440.00;
  const C5  = 523.25;
  const E5  = 659.25;
  const G5  = 783.99;

  // ── Melody phrases — long tones, big leaps, pentatonic ───
  // Each entry: [freq, beatDuration]
  const REST = 0;
  const PHRASES = [
    [ [A3,2], [E4,1], [REST,1], [G4,2], [E4,2] ],
    [ [C4,1], [REST,1], [A4,3], [REST,1], [G4,2] ],
    [ [E4,2], [REST,2], [C5,1], [A4,1], [E4,2] ],
    [ [A3,1], [D4,1], [E4,1], [REST,1], [A4,4] ],
    [ [REST,4], [E5,2], [REST,2] ],             // enters late — silence first
    [ [G4,3], [REST,1], [E4,2], [D4,2] ],
    [ [A4,4], [REST,2], [C5,2] ],
    [ [E4,1], [REST,1], [A4,1], [REST,1], [G4,4] ],
  ];

  function _now() { return ctx ? ctx.currentTime : 0; }

  // ── Node helpers ─────────────────────────────────────────

  function mkGain(v) {
    const g = ctx.createGain();
    g.gain.value = v;
    return g;
  }

  // Plucked string — sharp attack, exponential decay (Karplus-Strong approximation)
  function pluck(freq, vol, t, dur, dest, detune) {
    const o  = ctx.createOscillator();
    const o2 = ctx.createOscillator();
    o.type  = 'triangle'; o.frequency.value  = freq;
    o2.type = 'sine';     o2.frequency.value = freq * 2.01;
    if (detune) { o.detune.value = detune; o2.detune.value = detune; }

    const g = mkGain(0);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol,    t + 0.004);  // sharp attack
    g.gain.exponentialRampToValueAtTime(vol * 0.3, t + 0.08);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);

    // Mild resonant filter for string timbre
    const filt = ctx.createBiquadFilter();
    filt.type = 'bandpass'; filt.frequency.value = freq * 2; filt.Q.value = 3;

    o.connect(filt); o2.connect(filt);
    filt.connect(g); g.connect(dest);
    o.start(t); o2.start(t);
    o.stop(t + dur + 0.05); o2.stop(t + dur + 0.05);
  }

  // Long sustained tone — bell/pad hybrid
  function sustain(freq, vol, t, dur, dest) {
    const o  = ctx.createOscillator();
    const o2 = ctx.createOscillator();
    o.type  = 'sine';     o.frequency.value  = freq;
    o2.type = 'triangle'; o2.frequency.value = freq * 1.005; // slight chorus

    const g = mkGain(0);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol,    t + 0.25);
    g.gain.setValueAtTime(vol,             t + dur * 0.6);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);

    o.connect(g); o2.connect(g); g.connect(dest);
    o.start(t); o2.start(t);
    o.stop(t + dur + 0.1); o2.stop(t + dur + 0.1);
  }

  // Stone impact — filtered noise burst + low thump
  function stoneHit(t) {
    // Thump
    const ko = ctx.createOscillator();
    ko.type = 'sine'; ko.frequency.value = 55;
    ko.frequency.exponentialRampToValueAtTime(28, t + 0.15);
    const kg = mkGain(0);
    kg.gain.setValueAtTime(0.55, t);
    kg.gain.exponentialRampToValueAtTime(0.0001, t + 0.35);
    ko.connect(kg); kg.connect(gPerc);
    ko.start(t); ko.stop(t + 0.4);

    // Stone texture — bandpass noise
    const buf = ctx.createBuffer(1, Math.ceil(ctx.sampleRate * 0.12), ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource(); src.buffer = buf;
    const f = ctx.createBiquadFilter();
    f.type = 'bandpass'; f.frequency.value = 380; f.Q.value = 1.8;
    const ng = mkGain(0);
    ng.gain.setValueAtTime(0.18, t);
    ng.gain.exponentialRampToValueAtTime(0.0001, t + 0.12);
    src.connect(f); f.connect(ng); ng.connect(gPerc);
    src.start(t); src.stop(t + 0.15);
  }

  // ── Drone — low A, always ────────────────────────────────
  function startDrone() {
    const d1 = ctx.createOscillator();
    const d2 = ctx.createOscillator();
    d1.type = 'sine'; d1.frequency.value = A2 * 0.5; // A1 — pure sine, not harsh
    d2.type = 'sine'; d2.frequency.value = A2 * 0.5;
    d2.detune.value = 4; // very slight detune, barely perceptible

    const filt = ctx.createBiquadFilter();
    filt.type = 'lowpass'; filt.frequency.value = 180; filt.Q.value = 0.8;

    // Very slow LFO — barely noticeable breathing
    const lfo = ctx.createOscillator();
    lfo.type = 'sine'; lfo.frequency.value = 0.04;
    const lfoG = mkGain(18);
    lfo.connect(lfoG); lfoG.connect(filt.frequency);
    lfo.start();

    d1.connect(filt); d2.connect(filt); filt.connect(gDrone);
    d1.start(); d2.start();
  }

  // ── Ostinato — 3-note plucked bass figure ────────────────
  // Pattern: A2  —  E3  —  A2  (repeats every bar)
  // On bar boundary: [beat0, beat1.5, beat2.5]
  function scheduleOstinato(barStart) {
    const isLowOil = _state === 'lowoil';
    const isDead   = _state === 'dead';
    if (isDead) return;

    const vol = isLowOil ? 0.45 : 0.38;

    // Beat 0: root
    pluck(A2, vol,      barStart,            0.9, gOstinato, 0);
    // Beat 1.5: fifth — slightly softer
    pluck(E3, vol*0.7,  barStart + BEAT*1.5, 0.7, gOstinato, 0);
    // Beat 2.5: root again — even quieter, ghost note
    pluck(A2, vol*0.5,  barStart + BEAT*2.5, 0.6, gOstinato, 0);

    // In combat: add an extra hit on beat 3.5 — urgency
    if (_state === 'combat') {
      pluck(E3, vol*0.6, barStart + BEAT*3.5, 0.5, gOstinato, 0);
    }
  }

  // ── Stone hits — one every 2 bars on beat 1 ──────────────
  function schedulePerc(barStart, barIdx) {
    if (_state === 'dead') return;
    if (barIdx % 2 === 0) stoneHit(barStart + BEAT);         // beat 2
    if (_state === 'combat' && barIdx % 2 === 1) {
      stoneHit(barStart + BEAT * 3);                          // extra hit in combat
    }
  }

  // ── Melody — enters bar 8, sparse long tones ─────────────
  function scheduleMelody(barStart, barIdx) {
    if (_state === 'lowoil' || _state === 'dead') return;
    if (barIdx < 8) return;   // 8 bars of pure atmosphere before melody enters

    // Play one phrase every 2 bars, rest 1 bar between phrases
    if (barIdx % 3 !== 0) return;

    const phrase = PHRASES[_melPhase % PHRASES.length];
    _melPhase++;

    let cursor = barStart;
    for (const [freq, beats] of phrase) {
      const dur = beats * BEAT;
      if (freq !== REST && freq > 0) {
        sustain(freq, 0.22, cursor, dur * 0.92, gMelody);
        // Very quiet upper octave — shimmer
        if (Math.random() < 0.4) sustain(freq * 2, 0.025, cursor + 0.1, dur * 0.7, gMelody);
      }
      cursor += dur;
    }
  }

  // ── Low-oil dissonance — tritone above drone ─────────────
  function scheduleLowOilFx(barStart) {
    if (_state !== 'lowoil') return;
    // Eb tritone against A — maximum dissonance
    const Eb2 = A2 * 1.414;
    sustain(Eb2, 0.04, barStart, BAR * 1.1, gLowOilFx);
  }

  // ── Scheduler tick — lookahead pattern ───────────────────
  function tick() {
    if (!running || !ctx) return;
    const now = _now();
    while (_nextBar < now + BAR + 0.15) {
      scheduleOstinato(_nextBar);
      schedulePerc(_nextBar, _bar);
      scheduleMelody(_nextBar, _bar);
      scheduleLowOilFx(_nextBar);
      _nextBar += BAR;
      _bar++;
    }
  }

  // ── State management ─────────────────────────────────────
  function setState(newState) {
    if (newState === _state || !ctx) return;
    _state = newState;
    const now = _now();
    const F = 2.5;
    switch (newState) {
      case 'explore':
        gDrone.gain.setTargetAtTime(0.0, now, F);
        gOstinato.gain.setTargetAtTime(1.0, now, F);
        gMelody.gain.setTargetAtTime(1.0,  now, F);
        gPerc.gain.setTargetAtTime(1.0,    now, F);
        gLowOilFx.gain.setTargetAtTime(0,  now, F);
        break;
      case 'lowoil':
        gDrone.gain.setTargetAtTime(0.10, now, F);    // drone swells slightly
        gOstinato.gain.setTargetAtTime(0.8, now, F);
        gMelody.gain.setTargetAtTime(0,    now, F);   // melody dies
        gPerc.gain.setTargetAtTime(0.5,    now, F);   // perc fades
        gLowOilFx.gain.setTargetAtTime(1,  now, F);   // tritone enters
        break;
      case 'combat':
        gDrone.gain.setTargetAtTime(0.0, now, F);
        gOstinato.gain.setTargetAtTime(1.3, now, F);  // bass forward
        gMelody.gain.setTargetAtTime(0.6,  now, F);   // melody back slightly
        gPerc.gain.setTargetAtTime(1.4,    now, F);   // hits louder
        gLowOilFx.gain.setTargetAtTime(0,  now, F);
        break;
      case 'dead':
        gDrone.gain.setTargetAtTime(0.12, now, F*2);  // drone alone
        gOstinato.gain.setTargetAtTime(0, now, F);
        gMelody.gain.setTargetAtTime(0,   now, F);
        gPerc.gain.setTargetAtTime(0,     now, F);
        gLowOilFx.gain.setTargetAtTime(0.6, now, F*2);// tritone with drone on death
        break;
    }
  }

  // ── Init / stop ──────────────────────────────────────────
  function init(sharedCtx, sharedMaster) {
    if (running) return;
    ctx    = sharedCtx;
    master = sharedMaster;

    gDrone    = mkGain(0); gDrone.connect(master);
    gOstinato = mkGain(0); gOstinato.connect(master);
    gMelody   = mkGain(0); gMelody.connect(master);
    gPerc     = mkGain(0); gPerc.connect(master);
    gLowOilFx = mkGain(0); gLowOilFx.connect(master);

    startDrone();

    // Stagger the fade-ins for a ceremonial entrance
    const t = ctx.currentTime;
    gDrone.gain.linearRampToValueAtTime(0.0, t + 3);
    gOstinato.gain.linearRampToValueAtTime(1.0, t + 5);
    gPerc.gain.linearRampToValueAtTime(1.0, t + 6);
    gMelody.gain.linearRampToValueAtTime(1.0, t + 8);

    _nextBar = t + 0.3;
    _bar     = 0;
    running  = true;

    setInterval(tick, 50);
  }

  function stop() {
    running = false;
    const t = _now(), F = 3;
    [gDrone, gOstinato, gMelody, gPerc, gLowOilFx].forEach(g => {
      if (g) g.gain.setTargetAtTime(0, t, F);
    });
  }

  return { init, stop, setState, get running() { return running; } };
})();

function metaLoad() {
  try {
    const saved = localStorage.getItem(META_KEY);
    if (saved) {
      const p2 = JSON.parse(saved);
      META = Object.assign(JSON.parse(JSON.stringify(META_DEFAULTS)), p2);
      META.achievements = Object.assign(JSON.parse(JSON.stringify(META_DEFAULTS.achievements)), p2.achievements||{});
    }
  } catch(e2) { META = JSON.parse(JSON.stringify(META_DEFAULTS)); }
}
function metaSave() { try { localStorage.setItem(META_KEY, JSON.stringify(META)); } catch(e3){} }

function calcRunEchoes(stats) {
  let base = Math.floor(stats.depth*2) + Math.floor((stats.gold||0)*0.05) + Math.floor((stats.kills||0)*3) + (stats.actsCleared||0)*40;
  if (stats.mode==='hardcore') base=Math.floor(base*1.5);
  if (stats.mode==='easy') base=Math.floor(base*0.5);
  return Math.max(1, Math.floor(base*(stats.cursedMultiplier||1)));
}
function awardEchoes(amount, reason) {
  META.echoes+=amount;
  if(reason && typeof banners!=='undefined') banners.push({text:`+${amount} ECHOES  ${reason}`,color:'#cc88ff',life:3000,maxLife:3000});
  metaSave();
}

function checkAchievements() {
  for (const def of ACHIEVEMENT_DEFS) {
    if (META.achievementsUnlocked.includes(def.id)) continue;
    if (def.check(META.achievements)) {
      META.achievementsUnlocked.push(def.id);
      awardEchoes(def.reward, '['+def.label+']');
      if (def.unlockPerk && !META.unlockedPerks.includes(def.unlockPerk)) {
        META.unlockedPerks.push(def.unlockPerk);
        if(typeof banners!=='undefined') banners.push({text:'PERK UNLOCKED: '+def.unlockPerk.toUpperCase().replace(/_/g,' '),color:'#44ffaa',life:4000,maxLife:4000});
      }
      metaSave();
    }
  }
}
function trackKill(enemyType) {
  META.achievements.totalKills++;
  if(enemyType==='boss')       META.achievements.bossKills++;
  if(enemyType==='skeleton')   META.achievements.skeletonKills++;
  if(enemyType==='lava_golem') META.achievements.lavaGolemKills++;
  if(enemyType==='wraith')     META.achievements.wraithKills++;
  checkAchievements();
}
function trackSecretRoom() { META.achievements.secretRoomsFound++; checkAchievements(); }
function endRunMeta(stats) {
  META.achievements.totalRuns++;
  META.achievements.totalGold += stats.gold||0;
  META.achievements.deepestDepth = Math.max(META.achievements.deepestDepth, stats.depth||0);
  META.achievements.actsCleared  = Math.max(META.achievements.actsCleared, stats.actsCleared||0);
  if (!stats.survived) META.achievements.totalDeaths++;
  if ((stats.cursedMultiplier||1)>1 && stats.survived) META.achievements.cursedRunsCompleted++;
  const earned = calcRunEchoes(stats);
  META.echoes += earned;
  checkAchievements();
  metaSave();
  return earned;
}

let activeCurses = [];

function rollCurses() {
  activeCurses = []; curseEchoMultiplier = 1.0;
  const chance = gameMode==='hardcore'?0.25:gameMode==='easy'?0:0.15;
  if (Math.random() > chance) return;
  // Always exactly 1 curse — unstackable
  let pool = CURSE_DEFS.filter(c2 => !(c2.notInStory && gameMode === 'story'));
  const picked = pool[Math.floor(Math.random() * pool.length)];
  activeCurses = [picked.id];
  curseEchoMultiplier = picked.echoMult;
  if (hasPerk('cursed_blood')) curseEchoMultiplier *= 1.25;
}
function hasCurse(id) { return activeCurses.includes(id); }

// ── Curse popup state ─────────────────────────────────────
let cursePopup = null; // { def, timer, maxTimer }

function drawCursePopup(timestamp) {
  if (!cursePopup) return;
  cursePopup.timer -= 16;
  if (cursePopup.timer <= 0) { cursePopup = null; return; }

  const def = cursePopup.def;
  const fade = Math.min(1, cursePopup.timer / 400);
  const alpha = fade;

  const pw = 340;
  const innerW = pw - 48;

  // Pre-measure description word-wrap to get dynamic height
  ctx.font = '6px "Press Start 2P"';
  const descWords = def.desc.split(' ');
  const descLines = [];
  let dline = '';
  for (const word of descWords) {
    const test = dline + (dline ? ' ' : '') + word;
    if (ctx.measureText(test).width > innerW && dline) { descLines.push(dline); dline = word; }
    else dline = test;
  }
  if (dline) descLines.push(dline);

  // Dynamic height: header(26) + name(24) + divider(14) + desc lines + echo(28) + padding
  const ph = 26 + 24 + 14 + descLines.length * 13 + 28 + 20;
  const px2 = W/2 - pw/2, py2 = H/2 - ph/2 - 20;

  // Vignette
  ctx.fillStyle = `rgba(0,0,0,${alpha * 0.75})`;
  ctx.fillRect(0, 0, W, H);

  // Panel
  ctx.fillStyle = `rgba(10,2,8,${alpha})`;
  ctx.fillRect(px2, py2, pw, ph);
  ctx.strokeStyle = `rgba(200,0,50,${alpha})`; ctx.lineWidth = 2;
  ctx.strokeRect(px2, py2, pw, ph);
  ctx.strokeStyle = `rgba(80,0,20,${alpha})`; ctx.lineWidth = 1;
  ctx.strokeRect(px2+4, py2+4, pw-8, ph-8);

  // Corner accents
  ctx.fillStyle = `rgba(200,0,50,${alpha})`;
  [[0,0],[pw-6,0],[0,ph-2],[pw-6,ph-2]].forEach(([ox,oy]) => ctx.fillRect(px2+ox, py2+oy, 6, 2));

  let cy2 = py2 + 18;
  ctx.textAlign = 'center';

  // Header
  ctx.font = '7px "Press Start 2P"';
  ctx.fillStyle = `rgba(180,0,40,${alpha})`;
  ctx.fillText('☠  CURSED RUN  ☠', W/2, cy2); cy2 += 22;

  // Curse name
  ctx.font = '9px "Press Start 2P"';
  ctx.fillStyle = `rgba(${hexToRgb(def.color)},${alpha})`;
  ctx.fillText(def.name, W/2, cy2); cy2 += 14;

  // Divider
  ctx.strokeStyle = `rgba(80,0,20,${alpha})`; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(px2+16, cy2); ctx.lineTo(px2+pw-16, cy2); ctx.stroke();
  cy2 += 13;

  // Description lines
  ctx.font = '6px "Press Start 2P"';
  ctx.fillStyle = `rgba(180,140,160,${alpha})`;
  descLines.forEach(l => { ctx.fillText(l, W/2, cy2); cy2 += 13; });
  cy2 += 6;

  // Divider
  ctx.strokeStyle = `rgba(80,0,20,${alpha})`;
  ctx.beginPath(); ctx.moveTo(px2+16, cy2); ctx.lineTo(px2+pw-16, cy2); ctx.stroke();
  cy2 += 12;

  // Echo bonus
  ctx.font = '6px "Press Start 2P"';
  ctx.fillStyle = `rgba(200,136,255,${alpha})`;
  ctx.fillText('◆ ECHO BONUS: x' + curseEchoMultiplier.toFixed(2), W/2, cy2);

  ctx.textAlign = 'left';
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

function wrapTextCenter(text, cx2, y2, maxW, lineH, alpha) {
  const words = text.split(' ');
  let line = '', lines = [];
  for (const word of words) {
    const test = line + (line ? ' ' : '') + word;
    if (ctx.measureText(test).width > maxW && line) { lines.push(line); line = word; }
    else line = test;
  }
  if (line) lines.push(line);
  lines.forEach((l, i) => ctx.fillText(l, cx2, y2 + i * lineH));
}

function applyCurses() {
  if (hasCurse('shattered')) { player.maxHp = Math.min(player.maxHp, 8); player.hp = player.maxHp; player.armor = 0; }
  if (hasCurse('cursed_gear')) {
    const ws = ['sword','torch_weapon','bow'];
    player.weapon = ws[Math.floor(Math.random() * ws.length)];
    if (player.weapon === 'torch_weapon') { const t = upgrades.find(u => u.id === 'torch_weapon'); if (t) t.level = Math.max(1, t.level); }
  }
  if (hasCurse('hunted')) spawnPursuer();

  if (activeCurses.length > 0) {
    const def = CURSE_DEFS.find(c2 => c2.id === activeCurses[0]);
    if (def) cursePopup = { def, timer: 4000, maxTimer: 4000 };
    triggerFlash('#cc000066', 600);
    SFX.play('boss_attack');
  }
}

let pursuer = null;
function tickPursuer(dt) {
  if(!hasCurse('hunted')||!pursuer) return;
  pursuer.moveTimer=(pursuer.moveTimer||0)-dt;
  if(pursuer.moveTimer>0) return;
  pursuer.moveTimer=280;
  const dx4=player.wx-pursuer.wx, dy4=player.wy-pursuer.wy;
  let mx4=0,my4=0;
  if(Math.abs(dx4)>=Math.abs(dy4)) mx4=dx4>0?1:-1; else my4=dy4>0?1:-1;
  pursuer.wx+=mx4; pursuer.wy+=my4;
  pursuer.px=pursuer.wx*16; pursuer.py=pursuer.wy*16;
  if(pursuer.wx===player.wx&&pursuer.wy===player.wy&&player.invincible<=0){
    player.hp-=4; player.invincible=1000;
    SFX.play('hurt');
    spawnFloatText(player.wx,player.wy,'-4 THE HUNT','#ff2200');
    triggerFlash('#ff000044',300); triggerShake(5,400);
  }
}
function spawnPursuer() {
  if (!hasCurse('hunted')) return;
  // Spawn 20 tiles away in a random cardinal direction, clamped to valid coords
  const dirs = [[20,0],[-20,0],[0,20],[0,-20],[14,14],[-14,14],[14,-14],[-14,-14]];
  const d = dirs[Math.floor(Math.random() * dirs.length)];
  const spawnX = Math.max(2, player.wx + d[0]);
  const spawnY = Math.max(2, player.wy + d[1]);
  pursuer = { wx: spawnX, wy: spawnY, px: spawnX * TILE, py: spawnY * TILE, moveTimer: 800 };
}
function drawPursuer(timestamp) {
  if(!pursuer||!hasCurse('hunted')) return;
  const sx=Math.floor(pursuer.px-camX), sy2=Math.floor(pursuer.py-camY);
  if(sx<-32||sx>W+32||sy2<-32||sy2>H+32) return;
  const pulse=0.5+0.5*Math.sin(timestamp*0.006);
  ctx.fillStyle=`rgba(180,0,0,${0.7+pulse*0.3})`;
  ctx.fillRect(sx+3,sy2+2,10,12); ctx.fillRect(sx+1,sy2+5,14,7);
  ctx.fillStyle=`rgba(255,50,0,${pulse})`;
  ctx.fillRect(sx+4,sy2+4,3,2); ctx.fillRect(sx+9,sy2+4,3,2);
  const dx5=player.wx-pursuer.wx,dy5=player.wy-pursuer.wy;
  const dist5=Math.sqrt(dx5*dx5+dy5*dy5);
  if(dist5<6){ctx.strokeStyle=`rgba(255,0,0,${(1-dist5/6)*0.5})`;ctx.lineWidth=2;ctx.strokeRect(sx-2,sy2-2,20,20);}
  ctx.font='4px "Press Start 2P"'; ctx.fillStyle='#ff2200'; ctx.textAlign='center';
  ctx.fillText('HUNT',sx+8,sy2-4); ctx.textAlign='left';
}

// Track discovered synergies for codex
let discoveredSynergies = new Set();

function getActiveSynergies() {
  const active = [];
  for (const syn of SYNERGY_DEFS) {
    // oil_drinker: torch equipped + blood charm
    if (syn.id === 'oil_drinker') {
      if (player.weapon === 'torch_weapon' && player.bloodCharm) active.push(syn.id);
      continue;
    }
    // Item-based synergies
    const has = syn.items.every(item => {
      if (item === 'bow')         return player.weapon === 'bow' || upgrades.find(u => u.id === 'bow' && u.level > 0);
      if (item === 'torch_weapon')return upgrades.find(u => u.id === 'torch_weapon' && u.level > 0);
      if (item === 'void_cloak')  return player.voidCloaks > 0 || player._voidJustFired;
      if (item === 'blood_charm') return player.bloodCharm;
      if (item === 'cursed_blade')return player.cursedBlade;
      if (item === 'shadow_cloak')return player.shadowCloak;
      if (item === 'spider_ring') return player.spiderRing;
      if (item === 'depth_candle')return player.depthCandleTimer > 0;
      return false;
    });
    if (has) active.push(syn.id);
  }
  return active;
}

function hasSynergy(id) { return getActiveSynergies().includes(id); }

function notifySynergy(id) {
  if (discoveredSynergies.has(id)) return;
  discoveredSynergies.add(id);
  const syn = SYNERGY_DEFS.find(s => s.id === id);
  if (syn) {
    banners.push({ text: '\u2605 SYNERGY: ' + syn.name, color: syn.color, life: 4000, maxLife: 4000 });
    banners.push({ text: syn.desc, color: '#aaaacc', life: 3500, maxLife: 3500 });
    SFX.play('chest');
    triggerFlash(syn.color + '33', 500);
  }
}

// Called each time we need to check/activate synergies for current state
function checkSynergyDiscovery() {
  for (const id of getActiveSynergies()) notifySynergy(id);
}

let ghost = null; // null = inactive

// ghost state:
// { wx, wy, px, py,         — position
//   beatIdx,                — which beat we're on
//   lineIdx,                — which line within the beat
//   lineTimer,              — ms until next line
//   speakTimer,             — how long current line shows
//   dialogue,               — current line string
//   moveTimer,              — pathfinding cooldown
//   waitTimer,              — pause before repositioning
//   active,                 — false = fading out
//   fadeAlpha,              — for fade-in/out
//   hasAttacked,            — player attacked flag
//   tutorialTime,           — total ms elapsed
//   beatsDone,              — Set of completed beat ids
// }

function initGhost() {
  enemies.length = 0;
  spawnedChunks.clear();
  ghost = {
    wx: player.wx, wy: player.wy,
    px: player.wx * TILE, py: player.wy * TILE,
    beatIdx: 0, lineIdx: -1,
    lineTimer: 800,     // delay before first line
    speakTimer: 0,
    dialogue: null,
    moveTimer: 0,
    waitTimer: 0,
    active: true,
    fadeAlpha: 0.01,
    hasAttacked: false,
    moveCount: 0,
    tutorialTime: 0,
    beatsDone: new Set(),
    wobble: 0,
  };
  // Start intro beat immediately
  ghost.currentBeat = GHOST_BEATS[0];
  ghost.lineIdx = -1;
  ghost.lineTimer = 600;
}

function skipGhost() {
  if (!ghost) return;
  ghost.active = false;
  markTutorialDone();
}

function advanceGhostLine() {
  if (!ghost || !ghost.currentBeat) return;
  ghost.lineIdx++;
  const beat = ghost.currentBeat;
  if (ghost.lineIdx >= beat.lines.length) {
    // Beat complete
    ghost.beatsDone.add(beat.id);
    ghost.dialogue = null;
    ghost.currentBeat = null;
    ghost.lineIdx = -1;
    ghost.lineTimer = 1200; // pause between beats
    // If all beats done, finish
    if (ghost.beatsDone.size >= GHOST_BEATS.length) {
      ghost.active = false;
      markTutorialDone();
    }
  } else {
    ghost.dialogue = beat.lines[ghost.lineIdx];
    // Time per line: ~60ms per char, min 1800ms, max 4000ms
    ghost.speakTimer = Math.min(4000, Math.max(1800, ghost.dialogue.length * 62));
  }
}

function checkGhostBeatTrigger() {
  if (!ghost || !ghost.active) return;
  if (ghost.currentBeat) return; // already in a beat

  for (const beat of GHOST_BEATS) {
    if (ghost.beatsDone.has(beat.id)) continue;

    let triggered = false;
    if (beat.trigger === 'immediate') {
      triggered = true;
    } else if (beat.trigger === 'near_oil') {
      // Check if any oil flask collectible is within 12 tiles
      // Scan collected map for oil_flask tiles in range
      for (let dy = -12; dy <= 12; dy++) {
        for (let dx = -12; dx <= 12; dx++) {
          const wx2 = player.wx + dx, wy2 = player.wy + dy;
          const key = `${wx2},${wy2}`;
          if (!collected.has(key)) {
            const cxc = Math.floor(wx2/CHUNK), cyc = Math.floor(wy2/CHUNK);
            const lx = ((wx2%CHUNK)+CHUNK)%CHUNK, ly2 = ((wy2%CHUNK)+CHUNK)%CHUNK;
            try {
              const ch = getChunk(cxc,cyc);
              if (ch && ch.objects) {
                const obj = ch.objects.find(o => o.wx===wx2 && o.wy===wy2 && o.type==='oil_flask');
                if (obj) { triggered = true; break; }
              }
            } catch(e2) {}
          }
        }
        if (triggered) break;
      }
    } else if (beat.trigger === 'low_light') {
      const lit = litMap ? (litMap.get(`${player.wx},${player.wy}`) || 0) : 1;
      triggered = lit < 0.25 && ghost.tutorialTime > 8000;
    } else if (beat.trigger === 'after_move') {
      triggered = (ghost.moveCount || 0) > 15;
    } else if (beat.trigger === 'after_attack') {
      triggered = ghost.hasAttacked;
    } else if (beat.trigger === 'near_shop') {
      // Check if shop tile is within 6 tiles
      for (let dy = -6; dy <= 6 && !triggered; dy++) {
        for (let dx = -6; dx <= 6 && !triggered; dx++) {
          const wx2 = player.wx+dx, wy2 = player.wy+dy;
          const t2 = getTile ? getTile(wx2,wy2) : -1;
          if (t2 === T.SHOP_DOOR) triggered = true;
        }
      }
    } else if (beat.trigger === 'time') {
      triggered = ghost.tutorialTime > 55000;
    }

    // Fallback: fire if enough time has passed regardless of trigger
    if (!triggered && beat.fallbackTime > 0 && ghost.tutorialTime >= beat.fallbackTime) triggered = true;

    if (triggered) {
      ghost.currentBeat = beat;
      ghost.lineIdx = -1;
      ghost.lineTimer = 400;
      break;
    }
  }
}

function tickGhost(dt) {
  if (!ghost) return;
  ghost.tutorialTime += dt;
  ghost.wobble += dt * 0.003;

  // Fade in
  if (ghost.active && ghost.fadeAlpha < 1) ghost.fadeAlpha = Math.min(1, ghost.fadeAlpha + dt / 80);
  // Fade out
  if (!ghost.active) {
    ghost.fadeAlpha = Math.max(0, ghost.fadeAlpha - dt / 600);
    if (ghost.fadeAlpha <= 0) { ghost = null; return; }
  }

  // Dialogue timer
  if (ghost.currentBeat) {
    if (ghost.lineIdx === -1) {
      ghost.lineTimer -= dt;
      if (ghost.lineTimer <= 0) advanceGhostLine();
    } else if (ghost.dialogue) {
      ghost.speakTimer -= dt;
      if (ghost.speakTimer <= 0) advanceGhostLine();
    }
  } else {
    ghost.lineTimer -= dt;
    if (ghost.lineTimer <= 0) checkGhostBeatTrigger();
  }

  // Ghost movement — always stays near player on walkable tiles only
  ghost.moveTimer -= dt;
  if (ghost.moveTimer <= 0) {
    ghost.moveTimer = 350;
    const tdx = player.wx - ghost.wx, tdy = player.wy - ghost.wy;
    const dist = Math.sqrt(tdx*tdx + tdy*tdy);

    if (dist > 6) {
      // Too far — snap directly to a walkable tile adjacent to player
      const candidates = [
        [player.wx+1, player.wy], [player.wx-1, player.wy],
        [player.wx, player.wy+1], [player.wx, player.wy-1],
        [player.wx+2, player.wy], [player.wx-2, player.wy],
        [player.wx, player.wy+2], [player.wx, player.wy-2],
        [player.wx, player.wy],
      ];
      for (const [cx2, cy2] of candidates) {
        if (isWalkable(cx2, cy2)) {
          ghost.wx = cx2; ghost.wy = cy2;
          ghost.px = ghost.wx * TILE; ghost.py = ghost.wy * TILE;
          break;
        }
      }
    } else if (dist > 2) {
      // Drift one step toward player, only on walkable tiles
      const mx = tdx !== 0 ? (tdx > 0 ? 1 : -1) : 0;
      const my = tdy !== 0 ? (tdy > 0 ? 1 : -1) : 0;
      // Try primary direction, then fallbacks
      const moves = [[mx, 0], [0, my], [mx, my], [-mx, 0], [0, -my]];
      for (const [dx2, dy2] of moves) {
        if (dx2 === 0 && dy2 === 0) continue;
        const nx = ghost.wx + dx2, ny = ghost.wy + dy2;
        if (isWalkable(nx, ny)) { ghost.wx = nx; ghost.wy = ny; break; }
      }
    }
  }

  // Smooth pixel pos
  ghost.px += (ghost.wx * TILE - ghost.px) * 0.12;
  ghost.py += (ghost.wy * TILE - ghost.py) * 0.12;
}

function drawGhost(timestamp) {
  if (!ghost || ghost.fadeAlpha <= 0) return;

  const sx = Math.floor(ghost.px - camX);
  const sy2 = Math.floor(ghost.py - camY);
  const wobbleY = Math.sin(ghost.wobble) * 2;
  const a = ghost.fadeAlpha;

  const gy = wobbleY; // shorthand for vertical offset

  // ── Outer spectral glow ──────────────────────────────────
  ctx.save();
  ctx.globalAlpha = a * 0.18;
  const grd2 = ctx.createRadialGradient(sx+8, sy2+9+gy, 0, sx+8, sy2+9+gy, 20);
  grd2.addColorStop(0, '#88bbff');
  grd2.addColorStop(0.5, '#4466cc');
  grd2.addColorStop(1, 'transparent');
  ctx.fillStyle = grd2;
  ctx.fillRect(sx-12, sy2-12+gy, 40, 40);
  ctx.restore();

  // ── Inner soft glow ──────────────────────────────────────
  ctx.save();
  ctx.globalAlpha = a * 0.28;
  const grd3 = ctx.createRadialGradient(sx+8, sy2+8+gy, 0, sx+8, sy2+8+gy, 10);
  grd3.addColorStop(0, '#ccddff');
  grd3.addColorStop(1, 'transparent');
  ctx.fillStyle = grd3;
  ctx.fillRect(sx-2, sy2-2+gy, 20, 20);
  ctx.restore();

  ctx.save();
  ctx.globalAlpha = a * 0.72;

  // ── Cloak / body ────────────────────────────────────────
  // Cloak base — deep translucent navy
  ctx.fillStyle = '#0d1f3a';
  ctx.fillRect(sx+3, sy2+7+gy, 10, 8);
  ctx.fillRect(sx+3, sy2+12+gy, 10, 3);
  // Cloak highlight — left edge
  ctx.fillStyle = '#1e3d6e';
  ctx.fillRect(sx+3, sy2+7+gy, 2, 7);
  // Cloak shimmer line
  ctx.fillStyle = 'rgba(140,180,255,0.35)';
  ctx.fillRect(sx+4, sy2+8+gy, 1, 5);

  // Body underneath cloak
  ctx.fillStyle = '#162944';
  ctx.fillRect(sx+4, sy2+6+gy, 8, 7);

  // ── Head ────────────────────────────────────────────────
  // Skin — pale blue-grey (dead, ghostly)
  ctx.fillStyle = '#8aaabb';
  ctx.fillRect(sx+5, sy2+2+gy, 6, 5);
  // Cheek shadow
  ctx.fillStyle = '#6688aa';
  ctx.fillRect(sx+5, sy2+4+gy, 2, 2);
  ctx.fillRect(sx+9, sy2+4+gy, 2, 2);

  // ── Hood ────────────────────────────────────────────────
  ctx.fillStyle = '#0d1f3a';
  ctx.fillRect(sx+4, sy2+1+gy, 8, 4);
  ctx.fillRect(sx+5, sy2+gy, 6, 2);
  // Hood edge highlight
  ctx.fillStyle = '#1e3d6e';
  ctx.fillRect(sx+4, sy2+1+gy, 1, 3);
  ctx.fillRect(sx+11, sy2+1+gy, 1, 3);

  // ── Eyes — ghostly white with pale blue iris ─────────────
  ctx.fillStyle = '#cce8ff';
  ctx.fillRect(sx+6, sy2+4+gy, 2, 2);
  ctx.fillRect(sx+9, sy2+4+gy, 2, 2);
  // Pupils — hollow, ethereal
  ctx.fillStyle = '#7ab8ff';
  ctx.fillRect(sx+6, sy2+4+gy, 1, 1);
  ctx.fillRect(sx+9, sy2+4+gy, 1, 1);
  // Eye glow
  ctx.globalAlpha = a * 0.5;
  ctx.fillStyle = '#aaddff';
  ctx.fillRect(sx+5, sy2+3+gy, 4, 4);
  ctx.fillRect(sx+8, sy2+3+gy, 4, 4);
  ctx.globalAlpha = a * 0.72;

  // ── Broken lantern — dark, not lit ──────────────────────
  ctx.fillStyle = '#1a1a22';
  ctx.fillRect(sx+13, sy2+7+gy, 3, 4);
  // Cracked glass — tiny lines
  ctx.fillStyle = '#334466';
  ctx.fillRect(sx+13, sy2+8+gy, 1, 1);
  ctx.fillRect(sx+14, sy2+10+gy, 1, 1);
  // Faint ghost-light leaking from lantern
  ctx.globalAlpha = a * 0.2;
  ctx.fillStyle = '#6688ff';
  ctx.fillRect(sx+12, sy2+6+gy, 5, 6);
  ctx.globalAlpha = a * 0.72;

  // ── Wispy trail at feet ──────────────────────────────────
  // Dissolving lower body instead of legs
  ctx.globalAlpha = a * 0.5;
  ctx.fillStyle = '#1a3060';
  ctx.fillRect(sx+5, sy2+15+gy, 6, 2);
  ctx.globalAlpha = a * 0.3;
  ctx.fillStyle = '#1a3060';
  ctx.fillRect(sx+6, sy2+17+gy, 4, 1);
  ctx.globalAlpha = a * 0.15;
  ctx.fillStyle = '#4466aa';
  ctx.fillRect(sx+7, sy2+18+gy, 2, 1);

  ctx.restore();

  // ── Name tag ────────────────────────────────────────────
  ctx.save();
  ctx.globalAlpha = a * 0.55;
  ctx.font = '5px "Press Start 2P"';
  ctx.fillStyle = '#88aadd';
  ctx.textAlign = 'center';
  ctx.fillText('Cael', sx+8, sy2-5+gy);
  ctx.textAlign = 'left';
  ctx.restore();

  // Dialogue box
  if (ghost.dialogue && ghost.active) {
    ctx.save();
    ctx.globalAlpha = a;
    ctx.font = '6px "Press Start 2P"';

    // Word wrap
    const maxW = 200;
    const words = ghost.dialogue.split(' ');
    const dlines = [];
    let dline = '';
    for (const word of words) {
      const test = dline + (dline ? ' ' : '') + word;
      if (ctx.measureText(test).width > maxW && dline) { dlines.push(dline); dline = word; }
      else dline = test;
    }
    if (dline) dlines.push(dline);

    const dw = Math.min(maxW + 20, Math.max(...dlines.map(l => ctx.measureText(l).width)) + 20);
    const dh = dlines.length * 11 + 14;
    // Position box above ghost, keep on screen
    let bx2 = sx + 8 - dw/2;
    let by2 = sy2 - dh - 10 + wobbleY;
    bx2 = Math.max(4, Math.min(W - dw - 4, bx2));
    by2 = Math.max(4, by2);

    // Box
    ctx.fillStyle = 'rgba(4,8,18,0.92)';
    ctx.fillRect(bx2, by2, dw, dh);
    ctx.strokeStyle = '#4466aa'; ctx.lineWidth = 1;
    ctx.strokeRect(bx2, by2, dw, dh);

    // Tail pointing to ghost
    ctx.fillStyle = 'rgba(4,8,18,0.92)';
    const tailX = Math.max(bx2+4, Math.min(bx2+dw-8, sx+8));
    ctx.beginPath();
    ctx.moveTo(tailX-4, by2+dh);
    ctx.lineTo(tailX+4, by2+dh);
    ctx.lineTo(tailX, by2+dh+5);
    ctx.fill();

    // Text
    ctx.fillStyle = '#aaccff';
    ctx.textAlign = 'center';
    dlines.forEach((l, i) => ctx.fillText(l, bx2 + dw/2, by2 + 10 + i * 11));
    ctx.textAlign = 'left';
    ctx.restore();
  }

  // TAB to skip hint — bottom of screen, subtle
  if (ghost.active) {
    ctx.save();
    ctx.globalAlpha = a * 0.45;
    ctx.font = '5px "Press Start 2P"';
    ctx.fillStyle = '#445566';
    ctx.textAlign = 'center';
    ctx.fillText('TAB \u2014 skip guide', W/2, H - 8);
    ctx.textAlign = 'left';
    ctx.restore();
  }
}

// ─── Seeded PRNG ────────────────────────────────────────────
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// ─── Noise (value noise) ────────────────────────────────────
const noiseCache = new Map();
function getRng(cx, cy) {
  const key = `${cx},${cy}`;
  if (!noiseCache.has(key)) {
    noiseCache.set(key, mulberry32((cx * 73856093) ^ (cy * 19349663) ^ 0xDEADBEEF));
  }
  return noiseCache.get(key);
}

function smoothNoise(x, y, scale = 0.12) {
  const sx = x * scale, sy = y * scale;
  const ix = Math.floor(sx), iy = Math.floor(sy);
  const fx = sx - ix, fy = sy - iy;
  const ux = fx * fx * (3 - 2 * fx);
  const uy = fy * fy * (3 - 2 * fy);
  const r00 = getRng(ix,   iy  )();
  const r10 = getRng(ix+1, iy  )();
  const r01 = getRng(ix,   iy+1)();
  const r11 = getRng(ix+1, iy+1)();
  return r00*(1-ux)*(1-uy) + r10*ux*(1-uy) + r01*(1-ux)*uy + r11*ux*uy;
}

// ─── Tile types ──────────────────────────────────────────────
const T = { WALL: 0, FLOOR: 1, CORRIDOR: 2, LAVA: 3, DARK_PATCH: 4, PRESSURE: 5, ICE_PATCH: 6, SECRET_WALL: 7 };

// ─── Biomes ──────────────────────────────────────────────────
// Each chunk belongs to a biome based on smooth regional noise
const BIOMES = [
  { id:'dungeon',  wallDark:'#0d0e14', wallLit:'#3a3d52', floorDark:'#3d2e18', floorLit:'#c8a265', name:'Dungeon'   },
  { id:'crypt',    wallDark:'#0e0d10', wallLit:'#2e2a3a', floorDark:'#251c1c', floorLit:'#7a5a5a', name:'Crypt'     },
  { id:'cave',     wallDark:'#0a0e08', wallLit:'#2a3828', floorDark:'#1e2a18', floorLit:'#6a8a50', name:'Cave'      },
  { id:'ice',      wallDark:'#0a0e14', wallLit:'#2a4060', floorDark:'#1c2a38', floorLit:'#7ab0cc', name:'Ice Vault' },
  { id:'lava',     wallDark:'#140a04', wallLit:'#502010', floorDark:'#2a1208', floorLit:'#c04020', name:'Fire Pit'  },
];

const biomeCache = new Map();
function getChunkBiome(cx, cy) {
  const key = `${cx},${cy}`;
  if (biomeCache.has(key)) return biomeCache.get(key);
  const n = smoothNoise(cx, cy, 0.18);
  const biome = BIOMES[Math.floor(n * BIOMES.length)];
  biomeCache.set(key, biome);
  return biome;
}


// ─── Chunk system ────────────────────────────────────────────
const CHUNK = 16; // tiles per chunk
const chunks = new Map();

function chunkKey(cx, cy) { return `${cx},${cy}`; }

// Get the deterministic exit column/row for a chunk edge.
// Uses the *shared* edge seed so both neighbors agree on the same position.
function getExitPos(a, b) {
  // a,b are the two chunk coords that form the shared boundary key
  const seed = (a * 374761393) ^ (b * 1234567891);
  const rng = mulberry32(seed);
  return 3 + Math.floor(rng() * (CHUNK - 6)); // keep exits away from corners
}

function carveLine(tiles, x1, y1, x2, y2) {
  let x = x1, y = y1;
  while (x !== x2) {
    tiles[y*CHUNK+x] = T.CORRIDOR;
    x += x < x2 ? 1 : -1;
  }
  while (y !== y2) {
    tiles[y*CHUNK+x] = T.CORRIDOR;
    y += y < y2 ? 1 : -1;
  }
  tiles[y*CHUNK+x] = T.CORRIDOR;
}


// Strip loot objects from hazard tiles — called at end of every chunk generator
function stripLootFromHazards(tiles, objects) {
  const LOOT_TYPES = new Set(['coin','gem','chest','oil_flask','health_potion',
    'shrine','vault','cursed_altar','merchant','bone_pickup','lore_pickup',
    'barrel','crate','bones','web_corner','shield_wall','urn','sarcophagus',
    'candle_ring','stalagmite','ice_spike','lava_rock','ash_pile',
    'mushroom_red','mushroom_glow','crystal_shard','frozen_barrel','skull',
    'torch_iron','torch_skull','torch_bone','torch_crude','torch_ice','lava_vent','brazier']);
  const HAZARD = new Set([T.LAVA, T.DARK_PATCH, T.ICE_PATCH, T.PRESSURE]);
  for (let i = objects.length - 1; i >= 0; i--) {
    const obj = objects[i];
    const tile = tiles[obj.ly * CHUNK + obj.lx];
    if (HAZARD.has(tile)) objects.splice(i, 1);
  }
}

function generateChunk(cx, cy) {
  const rng = mulberry32((cx * 1234567) ^ (cy * 7654321) ^ 0xC0FFEE);
  const tiles = new Uint8Array(CHUNK * CHUNK);
  const objects = [];
  const biome = getChunkBiome(cx, cy);

  // --- Deterministic exit positions on each of the 4 edges ---
  const exitTop    = getExitPos(cx,  cy);
  const exitBottom = getExitPos(cx,  cy + 1);
  const exitLeft   = getExitPos(cy,  cx);
  const exitRight  = getExitPos(cy,  cx + 1);

  // Generate rooms (kept away from edges)
  const rooms = [];
  const numRooms = 2 + Math.floor(rng() * 3);
  for (let r = 0; r < numRooms; r++) {
    const rw = 4 + Math.floor(rng() * 4);
    const rh = 3 + Math.floor(rng() * 4);
    const rx = 2 + Math.floor(rng() * (CHUNK - rw - 4));
    const ry = 2 + Math.floor(rng() * (CHUNK - rh - 4));
    rooms.push({rx, ry, rw, rh});
    for (let dy = 0; dy < rh; dy++)
      for (let dx = 0; dx < rw; dx++)
        tiles[(ry+dy)*CHUNK + (rx+dx)] = T.FLOOR;
  }

  const hub = rooms[0];
  const hubCx = hub.rx + Math.floor(hub.rw / 2);
  const hubCy = hub.ry + Math.floor(hub.rh / 2);

  for (let i = 1; i < rooms.length; i++) {
    const a = rooms[i-1], b = rooms[i];
    const ax = a.rx + Math.floor(a.rw/2), ay = a.ry + Math.floor(a.rh/2);
    const bx = b.rx + Math.floor(b.rw/2), by = b.ry + Math.floor(b.rh/2);
    carveLine(tiles, ax, ay, bx, by);
  }

  for (let y = 0; y <= hubCy; y++) tiles[y*CHUNK + exitTop] = T.CORRIDOR;
  carveLine(tiles, exitTop, hubCy, hubCx, hubCy);
  for (let y = hubCy; y < CHUNK; y++) tiles[y*CHUNK + exitBottom] = T.CORRIDOR;
  carveLine(tiles, exitBottom, hubCy, hubCx, hubCy);
  for (let x = 0; x <= hubCx; x++) tiles[exitLeft*CHUNK + x] = T.CORRIDOR;
  carveLine(tiles, hubCx, exitLeft, hubCx, hubCy);
  for (let x = hubCx; x < CHUNK; x++) tiles[exitRight*CHUNK + x] = T.CORRIDOR;
  carveLine(tiles, hubCx, exitRight, hubCx, hubCy);

  // ── Biome-aware object tables ──────────────────────────────
  // Torch variants by biome
  const torchVariants = {
    dungeon: ['torch_iron','torch_iron','torch_iron','brazier'],
    crypt:   ['torch_skull','torch_skull','torch_bone','brazier'],
    cave:    ['torch_crude','mushroom_glow','mushroom_glow','torch_crude'],
    ice:     ['torch_ice','torch_ice','crystal_shard','crystal_shard'],
    lava:    ['brazier','brazier','torch_iron','lava_vent'],
  };
  const torchOpts = torchVariants[biome.id] || torchVariants.dungeon;

  // Scatter props by biome
  const propTable = {
    dungeon: ['barrel','crate','bones','web_corner','shield_wall','urn'],
    crypt:   ['sarcophagus','bones','bones','candle_ring','web_corner','urn'],
    cave:    ['stalagmite','mushroom_red','bones','crystal_shard','stalagmite','stalagmite'],
    ice:     ['ice_spike','ice_spike','crystal_shard','bones','frozen_barrel'],
    lava:    ['lava_rock','bones','ash_pile','lava_rock','ash_pile'],
  };
  const props = propTable[biome.id] || propTable.dungeon;

  for (const room of rooms) {
    // Torches in corners
    if (rng() < 0.65) {
      const corners = [
        {lx: room.rx+1,        ly: room.ry+1},
        {lx: room.rx+room.rw-2, ly: room.ry+1},
        {lx: room.rx+1,        ly: room.ry+room.rh-2},
        {lx: room.rx+room.rw-2, ly: room.ry+room.rh-2},
      ];
      for (const c of corners) {
        if (c.lx >= 0 && c.lx < CHUNK && c.ly >= 0 && c.ly < CHUNK &&
            tiles[c.ly*CHUNK+c.lx] === T.FLOOR && rng() < 0.5) {
          const tv = torchOpts[Math.floor(rng() * torchOpts.length)];
          objects.push({type: tv, lx: c.lx, ly: c.ly});
        }
      }
    }

    // 1–3 scatter props per room
    const numProps = 1 + Math.floor(rng() * 3);
    for (let p = 0; p < numProps; p++) {
      const ox = room.rx + 1 + Math.floor(rng() * (room.rw - 2));
      const oy = room.ry + 1 + Math.floor(rng() * (room.rh - 2));
      if (ox >= 0 && ox < CHUNK && oy >= 0 && oy < CHUNK && tiles[oy*CHUNK+ox] === T.FLOOR) {
        const prop = props[Math.floor(rng() * props.length)];
        objects.push({type: prop, lx: ox, ly: oy});
      }
    }

    // Rare chest — combat mode gets more
    if (rng() < (gameMode === 'hardcore' ? 0.45 : gameMode === 'combat' ? 0.22 : 0.10)) {
      const ox = room.rx + 1 + Math.floor(rng()*(room.rw-2));
      const oy = room.ry + 1 + Math.floor(rng()*(room.rh-2));
      if (ox >= 0 && ox < CHUNK && oy >= 0 && oy < CHUNK && tiles[oy*CHUNK+ox] === T.FLOOR)
        objects.push({type:'chest', lx:ox, ly:oy});
    }

    // Coins — combat mode gets more
    const numCoins = gameMode === 'hardcore'
      ? Math.floor(rng() * 10) + 4
      : gameMode === 'combat'
      ? Math.floor(rng() * 6) + 1
      : Math.floor(rng() * 2);
    for (let c = 0; c < numCoins; c++) {
      const ox = room.rx + Math.floor(rng()*room.rw);
      const oy = room.ry + Math.floor(rng()*room.rh);
      if (ox >= 0 && ox < CHUNK && oy >= 0 && oy < CHUNK && tiles[oy*CHUNK+ox] === T.FLOOR)
        objects.push({type:'coin', lx:ox, ly:oy});
    }

    // Gems — combat mode gets more
    if (rng() < (gameMode === 'hardcore' ? 0.50 : gameMode === 'combat' ? 0.22 : 0.07)) {
      const ox = room.rx + 1 + Math.floor(rng()*(room.rw-2));
      const oy = room.ry + 1 + Math.floor(rng()*(room.rh-2));
      if (ox >= 0 && ox < CHUNK && oy >= 0 && oy < CHUNK && tiles[oy*CHUNK+ox] === T.FLOOR) {
        const gemType = ['ruby','emerald','sapphire'][Math.floor(rng()*3)];
        objects.push({type:'gem', gemType, lx:ox, ly:oy});
      }
    }

    // Oil flasks — generous spawn so danger feels fair
    if (rng() < 0.55) {
      const ox = room.rx + 1 + Math.floor(rng()*(room.rw-2));
      const oy = room.ry + 1 + Math.floor(rng()*(room.rh-2));
      if (ox >= 0 && ox < CHUNK && oy >= 0 && oy < CHUNK && tiles[oy*CHUNK+ox] === T.FLOOR)
        objects.push({type:'oil_flask', lx:ox, ly:oy});
    }
    // Second flask chance in larger rooms
    if (rng() < 0.30) {
      const ox = room.rx + 1 + Math.floor(rng()*(room.rw-2));
      const oy = room.ry + 1 + Math.floor(rng()*(room.rh-2));
      if (ox >= 0 && ox < CHUNK && oy >= 0 && oy < CHUNK && tiles[oy*CHUNK+ox] === T.FLOOR)
        objects.push({type:'oil_flask', lx:ox, ly:oy});
    }

    // Health potions — spawn in most rooms
    if (rng() < 0.50) {
      const ox = room.rx + 1 + Math.floor(rng()*(room.rw-2));
      const oy = room.ry + 1 + Math.floor(rng()*(room.rh-2));
      if (ox >= 0 && ox < CHUNK && oy >= 0 && oy < CHUNK && tiles[oy*CHUNK+ox] === T.FLOOR)
        objects.push({type:'health_potion', lx:ox, ly:oy});
    }

    // Special rooms — only in hub room, rare
    if (room === rooms[0]) {
      const roll = rng();
      const ox = hubCx, oy = hubCy;
      if (roll < 0.08) {
        objects.push({type:'shrine', lx:ox, ly:oy});
      } else if (roll < 0.15) {
        objects.push({type:'vault', lx:ox, ly:oy, opened:false});
      } else if (roll < 0.20) {
        objects.push({type:'cursed_altar', lx:ox, ly:oy, used:false});
      } else if (roll < 0.28) {
        // Merchant NPC — spawns slightly offset from hub center
        const mx = Math.min(hubCx+1, room.rx+room.rw-2);
        const my = Math.min(hubCy+1, room.ry+room.rh-2);
        objects.push({type:'merchant', lx:mx, ly:my, visited:false});
      }
    }
  } // end for rooms

  const floorVariants = new Uint8Array(CHUNK*CHUNK);
  for (let i = 0; i < CHUNK*CHUNK; i++) floorVariants[i] = Math.floor(rng()*4);

  // ── Environmental hazards ──
  for (let y = 0; y < CHUNK; y++) {
    for (let x = 0; x < CHUNK; x++) {
      const idx = y*CHUNK+x;
      if (tiles[idx] !== T.FLOOR) continue; // corridors never get hazards
      const hr = rng();
      if (biome.id === 'lava' && hr < 0.12) {
        tiles[idx] = T.LAVA;
      } else if ((biome.id === 'cave' || biome.id === 'crypt') && hr < 0.07) {
        tiles[idx] = T.DARK_PATCH;
      } else if (biome.id === 'ice' && hr < 0.18) {
        tiles[idx] = T.ICE_PATCH;
      } else if ((biome.id === 'dungeon' || biome.id === 'crypt' || biome.id === 'cave') && hr < 0.04) {
        // pressure plates only in rooms (not corridors)
        if (tiles[idx] === T.FLOOR) tiles[idx] = T.PRESSURE;
      }
    }
  }

  // ── Secret room (30% chance) ──
  let secretRoom = null;
  if (rng() < 0.30 && rooms.length > 0) {
    // Pick a random room wall to attach to
    for (let attempt = 0; attempt < 12; attempt++) {
      const baseRoom = rooms[Math.floor(rng() * rooms.length)];
      // Try each of the 4 sides
      const side = Math.floor(rng() * 4); // 0=top 1=right 2=bottom 3=left
      const sw = 3 + Math.floor(rng() * 3); // 3-5 tiles wide
      const sh = 3 + Math.floor(rng() * 3);
      let srx, sry;
      if (side === 0) { srx = baseRoom.rx + Math.floor(rng()*(baseRoom.rw-sw)); sry = baseRoom.ry - sh - 1; }
      else if (side === 1) { srx = baseRoom.rx + baseRoom.rw + 1; sry = baseRoom.ry + Math.floor(rng()*(baseRoom.rh-sh)); }
      else if (side === 2) { srx = baseRoom.rx + Math.floor(rng()*(baseRoom.rw-sw)); sry = baseRoom.ry + baseRoom.rh + 1; }
      else { srx = baseRoom.rx - sw - 1; sry = baseRoom.ry + Math.floor(rng()*(baseRoom.rh-sh)); }

      // Check bounds
      if (srx < 1 || sry < 1 || srx+sw >= CHUNK-1 || sry+sh >= CHUNK-1) continue;

      // The shared wall tile position
      let wallLx, wallLy;
      if (side === 0) { wallLx = srx + Math.floor(sw/2); wallLy = sry + sh; }
      else if (side === 1) { wallLx = srx - 1; wallLy = sry + Math.floor(sh/2); }
      else if (side === 2) { wallLx = srx + Math.floor(sw/2); wallLy = sry - 1; }
      else { wallLx = srx + sw; wallLy = sry + Math.floor(sh/2); }

      // Carve secret room tiles (leave as WALL for now — all black)
      for (let dy = 0; dy < sh; dy++)
        for (let dx = 0; dx < sw; dx++)
          tiles[(sry+dy)*CHUNK+(srx+dx)] = T.WALL; // stays wall (dark) — SECRET_WALL is the entry

      // Mark the shared wall as secret wall
      if (wallLx >= 0 && wallLx < CHUNK && wallLy >= 0 && wallLy < CHUNK) {
        tiles[wallLy*CHUNK+wallLx] = T.SECRET_WALL;
      }

      secretRoom = { rx: srx, ry: sry, rw: sw, rh: sh, wallLx, wallLy, broken: false };
      break;
    }
  }

  stripLootFromHazards(tiles, objects);
  return { tiles, objects, floorVariants, biome, secretRoom };
}


// ═══════════════════════════════════════════════════════════
// STORY WORLD SYSTEM
//
// Layout — each act is a self-contained 10x10 chunk zone.
// Act N occupies: cx in [0..9], cy in [(N-1)*10 .. N*10-1]
//
//   Act 1 (dungeon): cy 0..9
//   Act 2 (crypt):   cy 10..19
//   Act 3 (cave):    cy 20..29
//   Act 4 (ice):     cy 30..39
//   Act 5 (lava):    cy 40..49
//
// Player starts at tile (4*16+8, 8) = wx=72, wy=8 — top center of Act 1
// Boss is always in the chunk at cx=5, cy = actIdx*10+9 (bottom-right area)
// A sealed gate row of WALL tiles blocks entry to the next act.
// Gate opens when current act boss is killed.
// Outside x=[0..9] or y=[0..49] — impassable (handled in isWalkable).
// ═══════════════════════════════════════════════════════════

const S_ACT_W  = 10;  // chunks wide per act
const S_ACT_H  = 10;  // chunks tall per act
const S_BIOMES = ['dungeon','crypt','cave','ice','lava'];

// Which act does this chunk belong to? (1-based, null if out of bounds)
function sActOf(cx, cy) {
  if (cx < 0 || cx >= S_ACT_W) return null;
  const a = Math.floor(cy / S_ACT_H) + 1;
  return (a >= 1 && a <= 5) ? a : null;
}

// Biome for a story chunk
function sBiomeOf(cx, cy) {
  const a = sActOf(cx, cy);
  if (!a) return BIOMES[0];
  return BIOMES.find(b => b.id === S_BIOMES[a-1]) || BIOMES[0];
}

// Is this the designated boss chunk for act A?
// Boss chunk = cx=5, last chunk row of act (localCy = S_ACT_H-1)
function isBossChunk(cx, cy) {
  const a = sActOf(cx, cy);
  if (!a) return false;
  const localCy = cy - (a-1)*S_ACT_H;
  return cx === 5 && localCy === S_ACT_H-1;
}

// Is this the gate chunk (bottom row of act, NOT boss chunk)?
function isGateChunk(cx, cy) {
  const a = sActOf(cx, cy);
  if (!a || a >= 5) return false; // act 5 has no gate
  const localCy = cy - (a-1)*S_ACT_H;
  return localCy === S_ACT_H-1;
}

// World-tile position of the act boss spawn
function bossSpawnTile(actNum) {
  const bossChunkCx = 5;
  const bossChunkCy = (actNum-1)*S_ACT_H + (S_ACT_H-1);
  // center of boss chunk
  return { wx: bossChunkCx*CHUNK + Math.floor(CHUNK/2),
           wy: bossChunkCy*CHUNK + Math.floor(CHUNK/2) };
}

// World-tile start position for act N (top-center)
function actStartTile(actNum) {
  return { wx: 5*CHUNK + 8, wy: (actNum-1)*S_ACT_H*CHUNK + 4 };
}

// ── Story chunk generator ────────────────────────────────────
function generateStoryChunk(cx, cy) {
  const actNum = sActOf(cx, cy);
  const biome  = sBiomeOf(cx, cy);
  const rng    = mulberry32((cx * 0xDEAD) ^ (cy * 0xBEEF) ^ 0x57012);
  const tiles  = new Uint8Array(CHUNK * CHUNK);
  const objects = [];
  const floorVariants = new Uint8Array(CHUNK*CHUNK);
  for (let i = 0; i < CHUNK*CHUNK; i++) floorVariants[i] = Math.floor(rng()*4);

  // All walls to start
  // tiles are 0 (T.WALL) by default

  if (!actNum) {
    // Out of bounds chunk — pure wall, return empty
    stripLootFromHazards(tiles, objects);
    return { tiles, objects, floorVariants, biome: BIOMES[0], secretRoom: null };
  }

  const boss = isBossChunk(cx, cy);
  const localCy = cy - (actNum-1)*S_ACT_H;
  const localCx = cx;

  // ── Boss chunk: one large arena room + boss spawn ────────
  if (boss) {
    // Big central arena
    const arenaX = 2, arenaY = 2, arenaW = CHUNK-4, arenaH = CHUNK-4;
    for (let dy = 0; dy < arenaH; dy++)
      for (let dx = 0; dx < arenaW; dx++)
        tiles[(arenaY+dy)*CHUNK+(arenaX+dx)] = T.FLOOR;

    // Entrance corridor from top
    for (let y = 0; y < arenaY; y++) tiles[y*CHUNK + Math.floor(CHUNK/2)] = T.CORRIDOR;

    // Dramatic decor: torches on all arena walls
    const torchT = biome.id==='dungeon'?'brazier':biome.id==='crypt'?'torch_skull':biome.id==='cave'?'mushroom_glow':biome.id==='ice'?'torch_ice':'lava_vent';
    const corners = [[arenaX,arenaY],[arenaX+arenaW-1,arenaY],[arenaX,arenaY+arenaH-1],[arenaX+arenaW-1,arenaY+arenaH-1]];
    for (const [lx,ly] of corners) objects.push({type:torchT, lx, ly});
    // Mid-wall torches
    objects.push({type:torchT, lx:arenaX+Math.floor(arenaW/2), ly:arenaY});
    objects.push({type:torchT, lx:arenaX+Math.floor(arenaW/2), ly:arenaY+arenaH-1});
    objects.push({type:torchT, lx:arenaX, ly:arenaY+Math.floor(arenaH/2)});
    objects.push({type:torchT, lx:arenaX+arenaW-1, ly:arenaY+Math.floor(arenaH/2)});

    // Biome hazards in arena edges
    const actBossInfo = STORY_ACTS[actNum-1];
    for (let dy = 1; dy < arenaH-1; dy++) {
      for (let dx = 1; dx < arenaW-1; dx++) {
        const idx = (arenaY+dy)*CHUNK+(arenaX+dx);
        if (tiles[idx] !== T.FLOOR) continue;
        // Only edge tiles get hazards
        if (dx > 2 && dx < arenaW-3 && dy > 2 && dy < arenaH-3) continue;
        const hr = rng();
        if (biome.id==='lava' && hr<0.3) tiles[idx]=T.LAVA;
        else if (biome.id==='ice' && hr<0.3) tiles[idx]=T.ICE_PATCH;
      }
    }

    // Lore inscription object (flavor)
    objects.push({type:'skull', lx:arenaX+1, ly:arenaY+arenaH-2});

    stripLootFromHazards(tiles, objects);
    return { tiles, objects, floorVariants, biome, secretRoom: null, isBossArena: true, actNum };
  }

  // ── Gate row chunks: sealed wall with corridor pass-through ─
  // (player can't enter until boss is dead — enforced in isWalkable)
  if (isGateChunk(cx, cy)) {
    // Narrow passage corridor through center, rest is solid wall
    const passX = Math.floor(CHUNK/2);
    for (let y = 0; y < CHUNK; y++) tiles[y*CHUNK+passX] = T.CORRIDOR;
    // Gate marker objects so player can see it
    objects.push({type:'skull', lx:passX-1, ly:Math.floor(CHUNK/2)});
    objects.push({type:'skull', lx:passX+1, ly:Math.floor(CHUNK/2)});
    stripLootFromHazards(tiles, objects);
    return { tiles, objects, floorVariants, biome, secretRoom: null, isGate: true, actNum };
  }

  // ── Normal story chunk: large rooms connected by corridors ──
  const rooms = [];

  // More rooms than procedural mode (4–7), larger size
  const numRooms = 4 + Math.floor(rng() * 4);
  for (let r = 0; r < numRooms; r++) {
    for (let attempt = 0; attempt < 20; attempt++) {
      const rw = 5 + Math.floor(rng() * 5);  // 5–9
      const rh = 4 + Math.floor(rng() * 5);  // 4–8
      const rx = 1 + Math.floor(rng() * (CHUNK - rw - 2));
      const ry = 1 + Math.floor(rng() * (CHUNK - rh - 2));
      // No overlap check — story chunks are big enough
      rooms.push({rx, ry, rw, rh});
      break;
    }
  }

  // Carve all rooms
  for (const room of rooms) {
    for (let dy = 0; dy < room.rh; dy++)
      for (let dx = 0; dx < room.rw; dx++)
        tiles[(room.ry+dy)*CHUNK+(room.rx+dx)] = T.FLOOR;
  }

  // Connect rooms in a chain
  for (let i = 1; i < rooms.length; i++) {
    const a = rooms[i-1], b = rooms[i];
    const ax = a.rx+Math.floor(a.rw/2), ay = a.ry+Math.floor(a.rh/2);
    const bx = b.rx+Math.floor(b.rw/2), by = b.ry+Math.floor(b.rh/2);
    carveLine(tiles, ax, ay, bx, by);
  }

  // Exits: connect to neighboring chunks via corridors from hub room center
  const hub = rooms[0];
  const hubX = hub.rx + Math.floor(hub.rw/2);
  const hubY = hub.ry + Math.floor(hub.rh/2);

  // Top exit (always present unless top row of act)
  if (localCy > 0) {
    const ex = getExitPos(cx, cy);
    for (let y = 0; y <= hubY; y++) tiles[y*CHUNK+ex] = T.CORRIDOR;
    carveLine(tiles, ex, hubY, hubX, hubY);
  }
  // Bottom exit (unless bottom 2 rows — gated)
  if (localCy < S_ACT_H-2) {
    const ex = getExitPos(cx, cy+1);
    for (let y = hubY; y < CHUNK; y++) tiles[y*CHUNK+ex] = T.CORRIDOR;
    carveLine(tiles, ex, hubY, hubX, hubY);
  } else if (localCy === S_ACT_H-2) {
    // Second-to-last row connects to gate row
    const ex = Math.floor(CHUNK/2);
    for (let y = hubY; y < CHUNK; y++) tiles[y*CHUNK+ex] = T.CORRIDOR;
    carveLine(tiles, ex, hubY, hubX, hubY);
  }
  // Left exit
  if (localCx > 0) {
    const ey = getExitPos(cy, cx);
    for (let x = 0; x <= hubX; x++) tiles[ey*CHUNK+x] = T.CORRIDOR;
    carveLine(tiles, hubX, ey, hubX, hubY);
  }
  // Right exit
  if (localCx < S_ACT_W-1) {
    const ey = getExitPos(cy, cx+1);
    for (let x = hubX; x < CHUNK; x++) tiles[ey*CHUNK+x] = T.CORRIDOR;
    carveLine(tiles, hubX, ey, hubX, hubY);
  }

  // ── Props & loot (generous for story) ───────────────────────
  const torchVariants = {
    dungeon:['torch_iron','torch_iron','brazier'],
    crypt:  ['torch_skull','torch_bone','torch_skull'],
    cave:   ['torch_crude','mushroom_glow','mushroom_glow'],
    ice:    ['torch_ice','crystal_shard','torch_ice'],
    lava:   ['brazier','lava_vent','brazier'],
  };
  const propTable = {
    dungeon:['barrel','crate','bones','web_corner','shield_wall','urn'],
    crypt:  ['sarcophagus','bones','candle_ring','web_corner','urn'],
    cave:   ['stalagmite','mushroom_red','crystal_shard','stalagmite'],
    ice:    ['ice_spike','crystal_shard','frozen_barrel','ice_spike'],
    lava:   ['lava_rock','ash_pile','lava_rock'],
  };
  const torchOpts = torchVariants[biome.id]||torchVariants.dungeon;
  const props     = propTable[biome.id]||propTable.dungeon;

  for (const room of rooms) {
    // Torches in corners
    const corners2 = [
      [room.rx+1, room.ry+1],[room.rx+room.rw-2,room.ry+1],
      [room.rx+1, room.ry+room.rh-2],[room.rx+room.rw-2,room.ry+room.rh-2],
    ];
    for (const [lx,ly] of corners2) {
      if (lx>=0&&lx<CHUNK&&ly>=0&&ly<CHUNK&&tiles[ly*CHUNK+lx]===T.FLOOR&&rng()<0.7) {
        objects.push({type:torchOpts[Math.floor(rng()*torchOpts.length)], lx, ly});
      }
    }
    // Props
    for (let p = 0; p < 2+Math.floor(rng()*3); p++) {
      const lx = room.rx+1+Math.floor(rng()*(room.rw-2));
      const ly = room.ry+1+Math.floor(rng()*(room.rh-2));
      if (lx>=0&&lx<CHUNK&&ly>=0&&ly<CHUNK&&tiles[ly*CHUNK+lx]===T.FLOOR)
        objects.push({type:props[Math.floor(rng()*props.length)], lx, ly});
    }
    // Oil flasks — generous
    for (let f = 0; f < 2; f++) {
      if (rng()<0.6) {
        const lx=room.rx+1+Math.floor(rng()*(room.rw-2));
        const ly=room.ry+1+Math.floor(rng()*(room.rh-2));
        if (lx>=0&&lx<CHUNK&&ly>=0&&ly<CHUNK&&tiles[ly*CHUNK+lx]===T.FLOOR)
          objects.push({type:'oil_flask', lx, ly});
      }
    }
    // Health potions
    if (rng()<0.65) {
      const lx=room.rx+1+Math.floor(rng()*(room.rw-2));
      const ly=room.ry+1+Math.floor(rng()*(room.rh-2));
      if (lx>=0&&lx<CHUNK&&ly>=0&&ly<CHUNK&&tiles[ly*CHUNK+lx]===T.FLOOR)
        objects.push({type:'health_potion', lx, ly});
    }
    // Coins (moderate)
    for (let co=0;co<3+Math.floor(rng()*5);co++) {
      const lx=room.rx+Math.floor(rng()*room.rw);
      const ly=room.ry+Math.floor(rng()*room.rh);
      if (lx>=0&&lx<CHUNK&&ly>=0&&ly<CHUNK&&tiles[ly*CHUNK+lx]===T.FLOOR)
        objects.push({type:'coin', lx, ly});
    }
    // Gem
    if (rng()<0.35) {
      const lx=room.rx+1+Math.floor(rng()*(room.rw-2));
      const ly=room.ry+1+Math.floor(rng()*(room.rh-2));
      if (lx>=0&&lx<CHUNK&&ly>=0&&ly<CHUNK&&tiles[ly*CHUNK+lx]===T.FLOOR) {
        const gemType=['ruby','emerald','sapphire'][Math.floor(rng()*3)];
        objects.push({type:'gem', gemType, lx, ly});
      }
    }
    // Chest (decent chance)
    if (rng()<0.28) {
      const lx=room.rx+1+Math.floor(rng()*(room.rw-2));
      const ly=room.ry+1+Math.floor(rng()*(room.rh-2));
      if (lx>=0&&lx<CHUNK&&ly>=0&&ly<CHUNK&&tiles[ly*CHUNK+lx]===T.FLOOR)
        objects.push({type:'chest', lx, ly});
    }
    // Special rooms in hub
    if (room===rooms[0]) {
      const roll=rng(), lx=hubX, ly=hubY;
      if      (roll<0.12) objects.push({type:'shrine', lx, ly});
      else if (roll<0.22) objects.push({type:'vault',  lx, ly, opened:false});
      else if (roll<0.35) objects.push({type:'merchant', lx, ly, visited:false});
      else if (roll<0.40) objects.push({type:'cursed_altar', lx, ly, used:false});
    }
  }

  // Biome hazards (lighter than infinite mode)
  for (let y=0;y<CHUNK;y++) for (let x=0;x<CHUNK;x++) {
    const idx=y*CHUNK+x;
    if (tiles[idx]!==T.FLOOR) continue;
    const hr=rng();
    if      (biome.id==='lava'  && hr<0.08) tiles[idx]=T.LAVA;
    else if (biome.id==='ice'   && hr<0.12) tiles[idx]=T.ICE_PATCH;
    else if (biome.id==='cave'  && hr<0.05) tiles[idx]=T.DARK_PATCH;
    else if (biome.id==='crypt' && hr<0.04) tiles[idx]=T.DARK_PATCH;
    else if ((biome.id==='dungeon'||biome.id==='crypt') && hr<0.03) tiles[idx]=T.PRESSURE;
  }

  // Lore pickup: 1 per chunk, 40% chance, gives a named lore fragment
  if (rng()<0.40 && rooms.length>1) {
    const room2=rooms[1];
    const lx=room2.rx+1+Math.floor(rng()*(room2.rw-2));
    const ly=room2.ry+1+Math.floor(rng()*(room2.rh-2));
    if (lx>=0&&lx<CHUNK&&ly>=0&&ly<CHUNK&&tiles[ly*CHUNK+lx]===T.FLOOR) {
      const loreId=`${actNum}_${cx}_${cy}`;
      objects.push({type:'lore_pickup', lx, ly, actNum, loreId});
    }
  }

  stripLootFromHazards(tiles, objects);
  return { tiles, objects, floorVariants, biome, secretRoom: null };
}
// ── End story world system ──────────────────────────────────

function getChunk(cx, cy) {
  const k = chunkKey(cx, cy);
  if (!chunks.has(k)) {
    if (gameMode === 'story') {
      chunks.set(k, generateStoryChunk(cx, cy));
    } else {
      chunks.set(k, generateChunk(cx, cy));
    }
  }
  return chunks.get(k);
}

function getTile(wx, wy) {
  const cx = Math.floor(wx / CHUNK);
  const cy = Math.floor(wy / CHUNK);
  const lx = ((wx % CHUNK) + CHUNK) % CHUNK;
  const ly = ((wy % CHUNK) + CHUNK) % CHUNK;
  return getChunk(cx, cy).tiles[ly * CHUNK + lx];
}

function isWalkable(wx, wy) {
  if (gameMode === 'story') {
    const cx = Math.floor(wx / CHUNK), cy = Math.floor(wy / CHUNK);
    // Outside story world bounds = wall
    if (cx < 0 || cx >= S_ACT_W || cy < 0 || cy >= 5 * S_ACT_H) return false;
    const a = sActOf(cx, cy);
    // Next act is locked until current boss is dead
    if (a && a > storyAct) return false;
    // Gate row of current act is locked until boss is dead for this act
    if (a && a === storyAct && isGateChunk(cx, cy) && !storyActsCleared.includes(a)) return false;
  }
  const t = getTile(wx, wy);
  return t !== T.WALL && t !== T.SECRET_WALL;
}

// ─── Persistent best scores ───────────────────────────────────
function loadBest() {
  try {
    return JSON.parse(localStorage.getItem('dungeon_best') || '{}');
  } catch { return {}; }
}
function saveBest(stats) {
  // also persist kills
  try {
    const prev = loadBest();
    const next = {
      tiles:  Math.max(stats.tiles,  prev.tiles  || 0),
      gold:   Math.max(stats.gold,   prev.gold   || 0),
      depth:  Math.max(stats.depth,  prev.depth  || 0),
      runs:   (prev.runs || 0) + 1,
    };
    localStorage.setItem('dungeon_best', JSON.stringify(next));
    return next;
  } catch { return {}; }
}
