    ctx.fillText('\u25c6 ' + (deathStats.echoes||0) + ' ECHOES EARNED  \u2014  total: ' + META.echoes, W/2, echY+10);

    // Corpse line
    ctx.font = '5px "Press Start 2P"';
    ctx.fillStyle = '#334422';
    ctx.fillText('your remains lie where you fell \u2014 find them to recover your gold', W/2, echY + 26);
  }

  // Blink prompt
  if (age > 1800 && Math.floor(age/500) % 2 === 0) {
    ctx.font = '8px "Press Start 2P"';
    ctx.fillStyle = '#ff4444'; ctx.textAlign = 'center';
    ctx.fillText('PRESS  R  TO DESCEND AGAIN', W/2, py + ph - 18);
  }
  ctx.textAlign = 'left';
  ctx.restore();
}


// ─── Story / Cutscene ────────────────────────────────────────

function startCutscene(panels, onDone) {
  storyCutscene = { panels, panelIndex: 0, onDone };
  shopOpen = false; loreOpen = false; inventoryOpen = false;
  merchantOpen = false; boostOpen = false;
}

function advanceCutscene() {
  if (!storyCutscene) return;
  storyCutscene.panelIndex++;
  if (storyCutscene.panelIndex >= storyCutscene.panels.length) {
    const done = storyCutscene.onDone;
    storyCutscene = null;
    if (done) done();
  }
}

function beginStoryAct(actNum) {
  storyAct = actNum;
  const act = STORY_ACTS[actNum - 1];
  // Boss is at the bottom-center of this act's chunk zone
  const spawn = bossSpawnTile(actNum);
  storyObjectiveWx = spawn.wx;
  storyObjectiveWy = spawn.wy;
  storyCompass = true;
  if (actNum > 1) {
    // Move player to top of new act
    const start = actStartTile(actNum);
    player.wx = start.wx; player.wy = start.wy;
    player.px = player.wx * TILE; player.py = player.wy * TILE;
    player.hp = player.maxHp; // full heal between acts
    oil = maxOil();
  }
  startCutscene(act.introPanels, null);
  SFX.play('act_start');
  banners.push({ text: `ACT ${actNum}: ${act.name}`, color: '#aaddff', life: 5000, maxLife: 5000 });
}

function checkStoryBossSpawn() {
  if (gameMode !== 'story') return;
  const pcx = Math.floor(player.wx / CHUNK);
  const pcy = Math.floor(player.wy / CHUNK);
  if (!isBossChunk(pcx, pcy)) return;
  // Player is in the boss arena — spawn boss if not already present
  if (enemies.some(e => e.isStoryBoss)) return;
  // Check this arena belongs to current act
  const a = sActOf(pcx, pcy);
  if (a !== storyAct) return;
  const act = STORY_ACTS[storyAct - 1];
  if (!act) return;
  const spawn = bossSpawnTile(storyAct);
  const bossDef = {
    name: act.bossName, color: act.bossColor,
    hp: act.bossHp, dmg: act.bossDmg, reward: 1000 + storyAct * 300,
    size: 18, moveInterval: act.bossMoveInterval,
    lore: act.bossLore, range: 14,
  };
  enemies.push({
    wx: spawn.wx, wy: spawn.wy, px: spawn.wx*TILE, py: spawn.wy*TILE,
    type: 'boss', def: bossDef,
    hp: bossDef.hp, maxHp: bossDef.hp,
    moveTimer: 0, spawnChunk: `story_act${storyAct}`,
    faceDx: 0, faceDy: 1, hitFlash: 0,
    isStoryBoss: true, actNum: storyAct,
  });
  banners.push({ text: act.bossName, color: act.bossColor, life: 4000, maxLife: 4000 });
  triggerShake(8, 800);
  triggerFlash(act.bossColor + '44', 800);
}

function onStoryBossKill(e) {
  const actIdx = e.actNum - 1;
  const act = STORY_ACTS[actIdx];
  if (!act) return;
  if (!storyActsCleared.includes(e.actNum)) storyActsCleared.push(e.actNum);

  // Spawn generous reward loot around boss death spot
  const rcx = Math.floor(e.wx/CHUNK), rcy = Math.floor(e.wy/CHUNK);
  const ch2 = getChunk(rcx, rcy);
  const rlx = Math.max(1,Math.min(CHUNK-2, ((e.wx%CHUNK)+CHUNK)%CHUNK));
  const rly = Math.max(1,Math.min(CHUNK-2, ((e.wy%CHUNK)+CHUNK)%CHUNK));
  ch2.objects.push({type:'chest',         lx:rlx,   ly:rly});
  ch2.objects.push({type:'chest',         lx:rlx+2, ly:rly});
  ch2.objects.push({type:'health_potion', lx:rlx,   ly:rly+2});
  ch2.objects.push({type:'gem', gemType:'ruby',    lx:rlx-1, ly:rly});
  ch2.objects.push({type:'gem', gemType:'emerald', lx:rlx+1, ly:rly-1});
  ch2.objects.push({type:'oil_flask',     lx:rlx+2, ly:rly+2});

  // Gate is now open — chunks will recalculate isWalkable
  SFX.play('door_open');
  banners.push({ text: 'GATE OPENED — DESCEND', color: '#aaddff', life: 4000, maxLife: 4000 });
  triggerFlash('#aaddff22', 1000);

  if (e.actNum >= 5) {
    startCutscene(act.bossPanels, () => showVictory());
  } else {
    startCutscene(act.bossPanels, () => beginStoryAct(e.actNum + 1));
  }
}

let victoryScreen = false;
function showVictory() {
  victoryScreen = true;
  SFX.play('victory');
  const _vdep = Math.round(Math.sqrt(player.wx**2+player.wy**2)/5);
  const _ve = endRunMeta({ depth: _vdep, gold, kills: _runKills, actsCleared: 5, mode: gameMode, survived: true, cursedMultiplier: curseEchoMultiplier });
  setTimeout(() => banners.push({ text: `+${_ve} ECHOES EARNED`, color: '#cc88ff', life: 4000, maxLife: 4000 }), 3000);
  banners.push({ text: 'YOU BROUGHT HER HOME.', color: '#aaddff', life: 999999, maxLife: 999999 });
}

function drawCutscene(timestamp) {
  if (!storyCutscene) return;
  const panel = storyCutscene.panels[storyCutscene.panelIndex];
  const total = storyCutscene.panels.length;
  const idx = storyCutscene.panelIndex;

  ctx.fillStyle = 'rgba(0,0,0,0.96)';
  ctx.fillRect(0, 0, W, H);

  // Subtle scanlines
  ctx.fillStyle = 'rgba(170,220,255,0.015)';
  for (let sy3 = 0; sy3 < H; sy3 += 3) ctx.fillRect(0, sy3, W, 1);

  // Panel art — simple pixel illustration per art type
  drawCutsceneArt(panel.art, timestamp);

  // Text
  const lines = panel.text.split('\n');
  const startY = H * 0.65;
  ctx.textAlign = 'center';
  lines.forEach((line, li) => {
    ctx.font = li === 0 ? '7px "Press Start 2P"' : '6px "Press Start 2P"';
    ctx.fillStyle = li === 0 ? '#ddeeff' : '#8899aa';
    ctx.fillText(line, W/2, startY + li * 18);
  });

  // Progress dots
  for (let d = 0; d < total; d++) {
    ctx.fillStyle = d === idx ? '#aaddff' : '#223344';
    ctx.fillRect(W/2 - (total*8)/2 + d*10, H - 28, 6, 6);
  }

  // Prompt
  const blink = Math.floor(timestamp / 500) % 2 === 0;
  ctx.font = '5px "Press Start 2P"';
  ctx.fillStyle = blink ? '#446688' : '#223344';
  ctx.fillText('SPACE — CONTINUE', W/2, H - 14);
  ctx.textAlign = 'left';
}

function drawCutsceneArt(artType, timestamp) {
  const cx2 = W/2, cy2 = H * 0.32;
  const t2 = timestamp * 0.001;

  ctx.save();
  ctx.globalAlpha = 0.9;

  if (artType === 'stairs') {
    // Stone staircase descending
    for (let s = 0; s < 7; s++) {
      ctx.fillStyle = s%2===0 ? '#333344' : '#222233';
      ctx.fillRect(cx2-40+s*8, cy2-30+s*10, 80-s*14, 12);
      ctx.fillStyle = 'rgba(255,160,30,0.15)';
      ctx.fillRect(cx2-40+s*8, cy2-30+s*10, 80-s*14, 2);
    }
    // Glow at bottom
    ctx.fillStyle = 'rgba(255,80,0,0.12)';
    ctx.fillRect(cx2-20, cy2+40, 40, 20);
  } else if (artType === 'pack') {
    // Leather pack
    ctx.fillStyle = '#664422'; ctx.fillRect(cx2-24, cy2-20, 48, 40);
    ctx.fillStyle = '#885533'; ctx.fillRect(cx2-22, cy2-18, 44, 36);
    ctx.fillStyle = '#553311'; ctx.fillRect(cx2-8, cy2-24, 16, 8);
    ctx.fillStyle = '#ffcc44'; ctx.fillRect(cx2-4, cy2-4, 8, 6);
  } else if (artType === 'sketch') {
    // Rough sketch of a large figure
    ctx.strokeStyle = '#ccbbaa'; ctx.lineWidth = 1;
    ctx.strokeRect(cx2-30, cy2-30, 60, 60);
    ctx.fillStyle = '#553322'; ctx.fillRect(cx2-2, cy2-28, 4, 20);
    ctx.fillRect(cx2-14, cy2-18, 28, 24);
    ctx.fillRect(cx2-18, cy2-2, 8, 20);
    ctx.fillRect(cx2+10, cy2-2, 8, 20);
    ctx.fillStyle = '#664433'; ctx.fillRect(cx2-8, cy2+18, 6, 14);
    ctx.fillRect(cx2+2, cy2+18, 6, 14);
  } else if (artType === 'dark') {
    // Just a lone lantern glow
    const flick = 0.7 + 0.3 * Math.sin(t2 * 3);
    const grd = ctx.createRadialGradient(cx2, cy2, 0, cx2, cy2, 60*flick);
    grd.addColorStop(0, `rgba(255,160,30,${0.3*flick})`);
    grd.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grd; ctx.fillRect(cx2-80, cy2-80, 160, 160);
    ctx.fillStyle = '#ffcc44'; ctx.fillRect(cx2-3, cy2-3, 6, 8);
    ctx.fillStyle = '#ff6600'; ctx.fillRect(cx2-2, cy2-6, 4, 4);
  } else if (artType === 'crypt_enter') {
    // Arch doorway
    ctx.fillStyle = '#2a1a2a';
    ctx.fillRect(cx2-35, cy2-30, 70, 60);
    ctx.fillStyle = '#0a000a';
    ctx.beginPath(); ctx.arc(cx2, cy2-10, 28, Math.PI, 0);
    ctx.rect(cx2-28, cy2-10, 56, 30); ctx.fill();
    ctx.strokeStyle = '#664477'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(cx2, cy2-10, 28, Math.PI, 0); ctx.stroke();
  } else if (artType === 'sword') {
    // Broken sword
    ctx.fillStyle = '#888899';
    ctx.save(); ctx.translate(cx2, cy2); ctx.rotate(-0.4);
    ctx.fillRect(-3, -28, 6, 28);
    ctx.rotate(0.6);
    ctx.fillRect(-3, 2, 6, 22);
    ctx.restore();
    ctx.fillStyle = '#664422'; ctx.fillRect(cx2-12, cy2-4, 24, 5);
    ctx.fillStyle = '#aa2222';
    for (let d = 0; d < 4; d++) ctx.fillRect(cx2-8+d*5, cy2-12-d*2, 2, 2);
  } else if (artType === 'skeletons') {
    for (let s = 0; s < 3; s++) {
      const sx2 = cx2 - 40 + s*40, sy2 = cy2;
      ctx.fillStyle = '#ccbbaa';
      ctx.fillRect(sx2-3, sy2-18, 6, 6); // head
      ctx.fillRect(sx2-4, sy2-12, 8, 10); // body
      ctx.fillRect(sx2-6, sy2-10, 4, 8); ctx.fillRect(sx2+2, sy2-10, 4, 8); // arms
      ctx.fillRect(sx2-3, sy2-2, 3, 10); ctx.fillRect(sx2, sy2-2, 3, 10); // legs
    }
  } else if (artType === 'journal') {
    ctx.fillStyle = '#554433'; ctx.fillRect(cx2-24, cy2-30, 48, 60);
    ctx.fillStyle = '#996644'; ctx.fillRect(cx2-22, cy2-28, 44, 56);
    ctx.fillStyle = '#221100';
    for (let l = 0; l < 6; l++) ctx.fillRect(cx2-16, cy2-18+l*9, 32, 2);
    ctx.fillStyle = '#ff4444'; ctx.fillRect(cx2-16, cy2+18, 16, 2);
  } else if (artType === 'cave_enter') {
    ctx.fillStyle = '#1a2a1a';
    ctx.beginPath(); ctx.arc(cx2, cy2+10, 45, Math.PI, 0); ctx.fill();
    ctx.fillStyle = '#448833';
    for (let g = 0; g < 8; g++) {
      const gx = cx2-40+g*12, gy = cy2+10-Math.floor(Math.random()*0+20);
      ctx.fillRect(gx, gy, 4, 4);
    }
    ctx.fillStyle = 'rgba(80,200,80,0.12)'; ctx.fillRect(cx2-30, cy2-10, 60, 40);
  } else if (artType === 'glow') {
    for (let g = 0; g < 12; g++) {
      const gx = cx2-50+Math.sin(g*1.2)*40, gy = cy2-20+Math.cos(g*0.8)*30;
      const hue = g%3===0?'80,220,80':g%3===1?'80,180,220':'180,80,220';
      ctx.fillStyle = `rgba(${hue},${0.4+Math.sin(t2+g)*0.2})`;
      ctx.fillRect(gx-2, gy-2, 5, 5);
    }
  } else if (artType === 'carving') {
    ctx.fillStyle = '#334433'; ctx.fillRect(cx2-50, cy2-30, 100, 60);
    ctx.fillStyle = '#ddcc88'; ctx.font = '6px "Press Start 2P"'; ctx.textAlign = 'center';
    ctx.fillText('do not', cx2, cy2-6);
    ctx.fillText('follow me', cx2, cy2+8);
    ctx.textAlign = 'left';
  } else if (artType === 'vault_enter') {
    ctx.fillStyle = '#0a1828'; ctx.fillRect(cx2-50, cy2-30, 100, 60);
    ctx.fillStyle = '#aaddff';
    for (let ic = 0; ic < 8; ic++) {
      ctx.fillRect(cx2-40+ic*12, cy2+20, 3, -(15+ic%3*8));
    }
  } else if (artType === 'seal') {
    // Octagonal seal shape
    ctx.strokeStyle = '#4488aa'; ctx.lineWidth = 2;
    ctx.beginPath();
    for (let s = 0; s < 8; s++) {
      const ang = (s/8)*Math.PI*2 - Math.PI/8;
      const r = 36;
      s===0 ? ctx.moveTo(cx2+Math.cos(ang)*r, cy2+Math.sin(ang)*r)
            : ctx.lineTo(cx2+Math.cos(ang)*r, cy2+Math.sin(ang)*r);
    }
    ctx.closePath(); ctx.stroke();
    ctx.fillStyle = 'rgba(68,136,170,0.12)'; ctx.fill();
    // Crack
    ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(cx2-8, cy2-20); ctx.lineTo(cx2+12, cy2+18); ctx.stroke();
  } else if (artType === 'maren') {
    // Frozen figure
    ctx.fillStyle = '#aaddff';
    ctx.fillRect(cx2-8, cy2-28, 16, 56); // body silhouette
    ctx.fillStyle = '#cceeff'; ctx.fillRect(cx2-6, cy2-34, 12, 10); // head
    ctx.fillStyle = 'rgba(170,220,255,0.3)';
    ctx.fillRect(cx2-20, cy2-40, 40, 70); // ice block
    ctx.strokeStyle = '#88bbdd'; ctx.lineWidth = 1;
    ctx.strokeRect(cx2-20, cy2-40, 40, 70);
  } else if (artType === 'maren_close') {
    // Eyes open
    ctx.fillStyle = '#aaddff'; ctx.fillRect(cx2-10, cy2-12, 20, 16);
    ctx.fillStyle = '#ddeeff'; ctx.fillRect(cx2-7, cy2-8, 14, 10);
    ctx.fillStyle = '#224466'; ctx.fillRect(cx2-4, cy2-6, 4, 6); // eyes
    ctx.fillRect(cx2+1, cy2-6, 4, 6);
    ctx.fillStyle = '#aaddff';
    ctx.fillRect(cx2-2, cy2-6, 1, 2); ctx.fillRect(cx2+3, cy2-6, 1, 2); // glint
  } else if (artType === 'boss_fall') {
    // Shattered fragments
    for (let f = 0; f < 10; f++) {
      const ang2 = (f/10)*Math.PI*2;
      const r2 = 20+f*3;
      ctx.fillStyle = `rgba(${200+f*5},${100-f*8},0,0.7)`;
      ctx.fillRect(cx2+Math.cos(ang2)*r2-3, cy2+Math.sin(ang2)*r2-3, 6, 6);
    }
    ctx.fillStyle = '#ff440033'; ctx.fillRect(cx2-40, cy2-40, 80, 80);
  } else if (artType === 'mark') {
    // Maren's symbol scratched in wall
    ctx.fillStyle = '#333344'; ctx.fillRect(cx2-40, cy2-30, 80, 60);
    ctx.strokeStyle = '#aaaaff'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(cx2-10, cy2-10); ctx.lineTo(cx2, cy2-20); ctx.lineTo(cx2+10, cy2-10);
    ctx.moveTo(cx2, cy2-20); ctx.lineTo(cx2, cy2+10);
    ctx.stroke();
  } else if (artType === 'cold_air') {
    const wv = Math.sin(t2*2)*8;
    ctx.strokeStyle = 'rgba(170,220,255,0.5)'; ctx.lineWidth = 1;
    for (let w2 = 0; w2 < 5; w2++) {
      ctx.beginPath();
      ctx.moveTo(cx2-40, cy2-20+w2*10);
      ctx.quadraticCurveTo(cx2+wv, cy2-20+w2*10, cx2+40, cy2-20+w2*10);
      ctx.stroke();
    }
  } else if (artType === 'bottom') {
    // Deep red void
    const grd2 = ctx.createRadialGradient(cx2, cy2, 0, cx2, cy2, 60);
    grd2.addColorStop(0, 'rgba(60,0,80,0.6)');
    grd2.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grd2; ctx.fillRect(cx2-80, cy2-80, 160, 160);
  } else if (artType === 'abyss') {
    // Swirling void
    const rot = t2 * 0.5;
    for (let r2 = 0; r2 < 5; r2++) {
      const ang2 = rot + r2 * 1.2;
      const rad = 10 + r2*10;
      ctx.fillStyle = `rgba(${30+r2*8},0,${50+r2*12},0.6)`;
      ctx.beginPath();
      ctx.arc(cx2+Math.cos(ang2)*rad, cy2+Math.sin(ang2)*rad, 8-r2, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(cx2, cy2, 12, 0, Math.PI*2); ctx.fill();
  } else if (artType === 'abyss_close') {
    const prog = (Math.sin(t2)+1)/2;
    ctx.fillStyle = `rgba(30,0,50,${prog*0.8})`;
    ctx.beginPath(); ctx.arc(cx2, cy2, 40*(1-prog)+4, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#6622aa'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(cx2, cy2, 44*(1-prog), 0, Math.PI*2); ctx.stroke();
  } else if (artType === 'still') {
    // Empty chamber
    ctx.fillStyle = '#111118'; ctx.fillRect(cx2-50, cy2-30, 100, 60);
    ctx.fillStyle = '#222230';
    for (let s = 0; s < 6; s++) ctx.fillRect(cx2-48+s*18, cy2+18, 14, 12);
  } else if (artType === 'sword_raise') {
    ctx.fillStyle = '#888899'; ctx.fillRect(cx2-3, cy2-40, 6, 50);
    ctx.fillStyle = '#aaaacc'; ctx.fillRect(cx2-2, cy2-44, 4, 12);
    ctx.fillStyle = '#ffaa00'; ctx.fillRect(cx2-12, cy2-22, 24, 5);
    ctx.fillStyle = '#ffdd88'; ctx.fillRect(cx2-10, cy2-22, 6, 3);
  } else if (artType === 'ascent') {
    // Upward arrows
    ctx.strokeStyle = '#aaddff'; ctx.lineWidth = 2;
    for (let a = 0; a < 4; a++) {
      const ay = cy2+30-a*20;
      const alpha = 0.3+a*0.18;
      ctx.strokeStyle = `rgba(170,220,255,${alpha})`;
      ctx.beginPath(); ctx.moveTo(cx2-15, ay); ctx.lineTo(cx2, ay-12); ctx.lineTo(cx2+15, ay); ctx.stroke();
    }
  } else if (artType === 'carry') {
    // Figure carrying another
    ctx.fillStyle = '#886644'; // carrier
    ctx.fillRect(cx2-6, cy2-24, 12, 28);
    ctx.fillRect(cx2-4, cy2-32, 8, 10);
    ctx.fillStyle = '#aaddff'; // maren, draped over
    ctx.fillRect(cx2+2, cy2-28, 18, 8);
    ctx.fillRect(cx2+4, cy2-20, 14, 16);
  } else if (artType === 'surface') {
    // Light from above
    const grd3 = ctx.createRadialGradient(cx2, cy2-50, 5, cx2, cy2-50, 80);
    grd3.addColorStop(0, 'rgba(255,240,200,0.6)');
    grd3.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grd3; ctx.fillRect(cx2-90, cy2-130, 180, 160);
    // Staircase going up
    for (let s = 0; s < 5; s++) {
      ctx.fillStyle = '#3a3d52';
      ctx.fillRect(cx2-20+s*8, cy2+s*8, 40-s*8, 10);
    }
  }

  ctx.restore();
}

function drawVictoryScreen(timestamp) {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = 'rgba(170,220,255,0.04)';
  for (let y = 0; y < H; y += 4) ctx.fillRect(0, y, W, 1);

  const t2 = timestamp * 0.001;
  const pulse = 0.7 + Math.sin(t2) * 0.3;

  ctx.shadowColor = `rgba(170,220,255,${pulse})`;
  ctx.shadowBlur = 20;
  ctx.font = '14px "Press Start 2P"';
  ctx.fillStyle = '#aaddff';
  ctx.textAlign = 'center';
  ctx.fillText('YOU BROUGHT HER HOME.', W/2, H/2 - 40);
  ctx.shadowBlur = 0;

  ctx.font = '6px "Press Start 2P"';
  ctx.fillStyle = '#446688';
  ctx.fillText('The dungeon is sealed.', W/2, H/2);
  ctx.fillText('The staircase will not open again.', W/2, H/2 + 18);

  ctx.fillStyle = '#224455';
  ctx.fillText(`Gold collected: ${gold}g`, W/2, H/2 + 50);
  ctx.fillText(`Tiles explored: ${exploredCount}`, W/2, H/2 + 66);

  const blink = Math.floor(timestamp/600)%2===0;
  ctx.fillStyle = blink ? '#336688' : '#223344';
  ctx.fillText('ENTER — return to menu', W/2, H - 30);
  ctx.textAlign = 'left';
}

function resetRun() {
  // Reset run state — but keep corpse in the world
  oil = maxOil();
  gold = 0;
  exploredCount = 0;
  totalCollected = 0;
  shrinesUsed = 0;
  vaultsOpened = 0;
  explored.clear();
  collected.clear();
  chunks.clear();
  biomeCache.clear();
  floatingTexts.length = 0;
  banners.length = 0;
  discoveredLandmarks.clear();
  for (const m of milestones) m.claimed = false;
  for (const u of upgrades) u.level = 0;
  applyUpgrades();

  player.wx = 2; player.wy = 2;
  player.px = 2*TILE; player.py = 2*TILE;
  for (let i = 0; i < 50; i++) {
    if (isWalkable(player.wx, player.wy)) break;
    player.wx++; player.wy++;
  }
  player.px = player.wx * TILE;
  player.py = player.wy * TILE;
  // Biome ambience
  if (gameStarted && !isDead && !storyCutscene && !victoryScreen) {
    const _bpcx = Math.floor(player.wx/CHUNK), _bpcy = Math.floor(player.wy/CHUNK);
    const _curBiome = getChunkBiome(_bpcx, _bpcy);
    SFX.setAmbience(_curBiome.id);
  }

  markVisible();

  enemies.length = 0;
  spawnedChunks.clear();
  groundPoundCooldown = 0;
  groundPoundDuration = 0;
  player.hp = player.maxHp;
  player.attackCooldown = 0;
  player.attackDuration = 0;
  player.invincible = 0;
  player.chargeTime = 0;
  player.dashCooldown = 0;
  player.dashDuration = 0;
  player.parryCooldown = 0;
  player.parryWindow = 0;
  player.bowCooldown = 0;
  player.regenTimer = 0;
  player.weapon = 'sword';
  bombCount = 0;
  boneCount = 0;
  projectiles.length = 0;
  player.bloodCharm = false;
  player.cursedBlade = false;
  player.voidCloaks = 0;
  player.depthCandleTimer = 0;
  player.boostSpeedTimer = 0;
  player.boostDmgTimer = 0;
  player.goldMultiTimer = 0;
  player.goldMagnetTimer = 0;
  player.oilFilterTimer = 0;
  player.spiderRing = false;
  player.shadowCloak = false;
  player.lavaBoots = false;
  player.wraithWard = false;
  player.boneShield = false;
  player.treasureEye = false;
  player.darkPatchTimer = 0;
  player.icePatchTimer = 0;
  isDead = false;
  shopOpen = false;
  loreOpen = false;
  inventoryOpen = false;
  merchantOpen = false;
  boostInventory = [];
  boostOpen = false;
  shakeAmt = 0;

  SFX.stopAmbience();
  activeCurses = [];
  curseEchoMultiplier = 1.0;
  pursuer = null;
  _runKills = 0;
  discoveredSynergies = new Set();
  ghost = null;
  MUSIC.stop();
  player.phaseTimer = 0;

  // Reset story state
  storyAct = 0;

  storyCutscene = null;
  storyCompass = false;
  victoryScreen = false;
  storyLoreCollected = [];
  // Return to start menu so player can pick mode again
  gameStarted = false;
}

function blendColor(hex1, hex2, t) {
  t = Math.max(0, Math.min(1, t));
  const r1 = parseInt(hex1.slice(1,3),16), g1 = parseInt(hex1.slice(3,5),16), b1 = parseInt(hex1.slice(5,7),16);
  const r2 = parseInt(hex2.slice(1,3),16), g2 = parseInt(hex2.slice(3,5),16), b2 = parseInt(hex2.slice(5,7),16);
  const r = Math.round(r1 + (r2-r1)*t);
  const g = Math.round(g1 + (g2-g1)*t);
  const b = Math.round(b1 + (b2-b1)*t);
  return `rgb(${r},${g},${b})`;
}

function drawTorch(ctx, sx, sy, flick, t, seed, style='iron') {
  // Glow (all styles)
  const glowR = (8 + flick * 6) * (1 + Math.sin(t*0.01+seed)*0.1);
  const glowColor = style === 'bone' ? '200,160,80' : style === 'crude' ? '255,140,20' : '255,160,30';
  const glow = ctx.createRadialGradient(sx+8, sy+6, 0, sx+8, sy+6, glowR);
  glow.addColorStop(0, `rgba(${glowColor},${0.4*flick})`);
  glow.addColorStop(1, 'rgba(255,80,0,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(sx+8-glowR, sy+6-glowR, glowR*2, glowR*2);

  // Flame
  const frame = Math.floor(t / 120) % 4;
  const fireColors = style === 'bone'
    ? ['#aaaa44','#cccc66','#eeee88','#ffffff']
    : ['#ff4400','#ff7700','#ffaa00','#ffee00'];
  ctx.fillStyle = fireColors[(frame+2)%4]; ctx.fillRect(sx+7, sy+4, 2, 2);
  ctx.fillStyle = fireColors[(frame+1)%4]; ctx.fillRect(sx+6, sy+3, 4, 3);
  ctx.fillStyle = fireColors[frame];       ctx.fillRect(sx+7, sy+1, 2, 3);
  ctx.fillStyle = '#ffffff';               ctx.fillRect(sx+7, sy+2, 1, 1);

  // Mount / stem by style
  if (style === 'iron') {
    ctx.fillStyle = '#555566'; ctx.fillRect(sx+5, sy+8, 6, 5);
    ctx.fillStyle = '#333344'; ctx.fillRect(sx+6, sy+7, 4, 2);
    ctx.fillStyle = '#666677'; ctx.fillRect(sx+7, sy+7, 2, 6);
  } else if (style === 'skull') {
    // skull mount
    ctx.fillStyle = '#888877'; ctx.fillRect(sx+5, sy+8, 6, 5);
    ctx.fillStyle = '#000000'; ctx.fillRect(sx+6, sy+9, 2, 2); // eye
    ctx.fillStyle = '#000000'; ctx.fillRect(sx+9, sy+9, 1, 2);
    ctx.fillStyle = '#5a3a10'; ctx.fillRect(sx+7, sy+13, 2, 2); // stem
  } else if (style === 'bone') {
    ctx.fillStyle = '#ccbb99'; ctx.fillRect(sx+7, sy+7, 2, 6);
    ctx.fillStyle = '#eeddbb'; ctx.fillRect(sx+7, sy+7, 1, 3);
    ctx.fillStyle = '#ccbb99'; ctx.fillRect(sx+5, sy+12, 6, 2);
  } else { // crude
    ctx.fillStyle = '#5a3a10'; ctx.fillRect(sx+7, sy+7, 2, 6);
    ctx.fillStyle = '#7a5020'; ctx.fillRect(sx+7, sy+7, 1, 6);
    ctx.fillStyle = '#3a2008'; ctx.fillRect(sx+5, sy+12, 6, 2);
  }
}

function drawBrazier(ctx, sx, sy, flick, t, seed) {
  const glowR = (10 + flick * 8);
  const glow = ctx.createRadialGradient(sx+8, sy+7, 0, sx+8, sy+7, glowR);
  glow.addColorStop(0, `rgba(255,140,20,${0.5*flick})`);
  glow.addColorStop(1, 'rgba(255,60,0,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(sx+8-glowR, sy+7-glowR, glowR*2, glowR*2);
  // Bowl
  ctx.fillStyle = '#444444'; ctx.fillRect(sx+3, sy+9, 10, 5);
  ctx.fillStyle = '#333333'; ctx.fillRect(sx+4, sy+9, 8, 2);
  ctx.fillStyle = '#555555'; ctx.fillRect(sx+3, sy+9, 1, 5);
  // Legs
  ctx.fillStyle = '#333333';
  ctx.fillRect(sx+3, sy+13, 2, 3); ctx.fillRect(sx+11, sy+13, 2, 3);
  ctx.fillRect(sx+7, sy+14, 2, 2);
  // Flames
  const frame = Math.floor(t/100)%4;
  const fc = ['#ff3300','#ff6600','#ff9900','#ffcc00'];
  ctx.fillStyle = fc[frame];       ctx.fillRect(sx+5, sy+5, 6, 5);
  ctx.fillStyle = fc[(frame+1)%4]; ctx.fillRect(sx+6, sy+3, 4, 4);
  ctx.fillStyle = fc[(frame+2)%4]; ctx.fillRect(sx+7, sy+2, 2, 3);
  ctx.fillStyle = '#ffff88';       ctx.fillRect(sx+7, sy+3, 1, 1);
}

function drawTorchIce(ctx, sx, sy, lit, t, wx, wy) {
  if (lit < 0.05) return;
  const a = Math.min(1, lit*2);
  const pulse = 0.5 + Math.abs(Math.sin(t*0.004+wx+wy))*0.5;
  const glowR = 10 + pulse*4;
  const glow = ctx.createRadialGradient(sx+8, sy+5, 0, sx+8, sy+5, glowR);
  glow.addColorStop(0, `rgba(120,200,255,${0.35*pulse*a})`);
  glow.addColorStop(1, 'rgba(60,100,200,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(sx+8-glowR, sy+5-glowR, glowR*2, glowR*2);
  // Crystal top
  ctx.fillStyle = `rgba(180,230,255,${a})`; ctx.fillRect(sx+6, sy+2, 4, 6);
  ctx.fillStyle = `rgba(220,245,255,${a})`; ctx.fillRect(sx+7, sy+1, 2, 3);
  ctx.fillStyle = `rgba(100,180,255,${a*pulse})`; ctx.fillRect(sx+7, sy+3, 2, 2);
  // Mount
  ctx.fillStyle = `rgba(80,120,160,${a})`; ctx.fillRect(sx+6, sy+8, 4, 6);
  ctx.fillStyle = `rgba(60,90,130,${a})`; ctx.fillRect(sx+5, sy+13, 6, 2);
}

function drawLavaVent(ctx, sx, sy, t, wx, wy) {
  const pulse = Math.abs(Math.sin(t*0.003 + wx*0.7 + wy*0.5));
  const glowR = 8 + pulse * 6;
  const glow = ctx.createRadialGradient(sx+8, sy+12, 0, sx+8, sy+12, glowR);
  glow.addColorStop(0, `rgba(255,100,0,${0.6*pulse})`);
  glow.addColorStop(1, 'rgba(200,40,0,0)');
  ctx.fillStyle = glow; ctx.fillRect(sx, sy+4, 16, 16);
  // Vent hole
  ctx.fillStyle = '#1a0800'; ctx.fillRect(sx+4, sy+10, 8, 5);
  ctx.fillStyle = '#2a0a00'; ctx.fillRect(sx+5, sy+11, 6, 3);
  // Lava glow inside
  ctx.fillStyle = `rgba(255,${60+Math.floor(pulse*80)},0,${0.7+pulse*0.3})`;
  ctx.fillRect(sx+5, sy+12, 6, 2);
  // Bubbles
  if (pulse > 0.6) {
    ctx.fillStyle = `rgba(255,180,0,${(pulse-0.6)*2})`;
    ctx.fillRect(sx+6, sy+10, 2, 2); ctx.fillRect(sx+10, sy+9, 2, 2);
  }
}

function drawMushroom(ctx, sx, sy, lit, t, wx, wy, isRed) {
  if (lit < 0.05) return;
  const a = Math.min(1, lit*2);
  const pulse = isRed ? 1 : 0.7 + Math.abs(Math.sin(t*0.003+wx+wy))*0.3;
  if (!isRed) {
    const glowR = 7 + pulse*3;
    const glow = ctx.createRadialGradient(sx+8, sy+8, 0, sx+8, sy+8, glowR);
    glow.addColorStop(0, `rgba(100,255,180,${0.3*pulse*a})`);
    glow.addColorStop(1, 'rgba(0,180,100,0)');
    ctx.fillStyle = glow; ctx.fillRect(sx, sy, 16, 16);
  }
  const capCol = isRed ? `rgba(200,40,20,${a})` : `rgba(${Math.floor(50+pulse*80)},220,${Math.floor(100+pulse*80)},${a})`;
  const spotCol = isRed ? `rgba(255,220,200,${a})` : `rgba(200,255,220,${a})`;
  // Stem
  ctx.fillStyle = `rgba(200,180,150,${a})`;
  ctx.fillRect(sx+6, sy+9, 4, 6);
  ctx.fillStyle = `rgba(170,150,120,${a})`;
  ctx.fillRect(sx+6, sy+9, 1, 6);
  // Cap
  ctx.fillStyle = capCol;
  ctx.fillRect(sx+3, sy+6, 10, 4); ctx.fillRect(sx+4, sy+4, 8, 3);
  ctx.fillRect(sx+5, sy+3, 6, 2); ctx.fillRect(sx+6, sy+2, 4, 2);
  // Spots
  ctx.fillStyle = spotCol;
  ctx.fillRect(sx+5, sy+5, 2, 2); ctx.fillRect(sx+9, sy+6, 2, 2);
  ctx.fillRect(sx+7, sy+4, 2, 1);
}

function drawCrystal(ctx, sx, sy, lit, wx, wy) {
  if (lit < 0.05) return;
  const a = Math.min(1, lit*2);
  const seed = wx*3 + wy*7;
  const rng2 = mulberry32(seed);
  const hues = [[100,200,255],[180,100,255],[100,255,200],[255,200,100]];
  const h = hues[((seed % hues.length) + hues.length) % hues.length];
  const glowR = 8;
  const glow = ctx.createRadialGradient(sx+8, sy+8, 0, sx+8, sy+8, glowR);
  glow.addColorStop(0, `rgba(${h[0]},${h[1]},${h[2]},${0.3*a})`);
  glow.addColorStop(1, `rgba(${h[0]},${h[1]},${h[2]},0)`);
  ctx.fillStyle = glow; ctx.fillRect(sx, sy, 16, 16);
  // Crystal spires (3 varying heights)
  const heights = [8, 12, 7];
  const xpos    = [4, 7, 11];
  const widths  = [3, 4, 3];
  for (let i = 0; i < 3; i++) {
    ctx.fillStyle = `rgba(${h[0]},${h[1]},${h[2]},${a*0.8})`;
    ctx.fillRect(sx+xpos[i], sy+15-heights[i], widths[i], heights[i]);
    ctx.fillStyle = `rgba(255,255,255,${a*0.5})`;
    ctx.fillRect(sx+xpos[i], sy+15-heights[i], 1, Math.floor(heights[i]/2));
  }
}

function drawBarrel(ctx, sx, sy, lit, frozen=false) {

  ctx.fillRect(sx+5, sy+3, 6, 1); ctx.fillRect(sx+5, sy+14, 6, 1);

function drawBones(ctx, sx, sy, lit, wx, wy) {

function drawCandleRing(ctx, sx, sy, lit, t, wx, wy) {
  if (lit < 0.05) return;
  const a = Math.min(1, lit*2);
  const positions = [{x:3,y:4},{x:9,y:4},{x:3,y:10},{x:9,y:10},{x:6,y:3},{x:6,y:11}];
  for (const p of positions) {
    const seed = wx*3+wy*7+p.x*13+p.y*5;
    const flick = torchFlicker(seed, t);
    // tiny flame
    const frame = Math.floor(t/150+seed)%3;
    const fc = ['#ff6600','#ff9900','#ffcc00'];
    ctx.fillStyle = `rgba(255,200,50,${a*flick*0.3})`;
    ctx.fillRect(sx+p.x-1, sy+p.y-1, 4, 4);
    ctx.fillStyle = fc[frame];
    ctx.globalAlpha = a * flick;
    ctx.fillRect(sx+p.x, sy+p.y-1, 2, 2);
    ctx.globalAlpha = 1;
    ctx.fillStyle = `rgba(120,80,30,${a})`; // wax
    ctx.fillRect(sx+p.x, sy+p.y+1, 2, 3);
  }
}

}

}

function drawLavaRock(ctx, sx, sy, lit, wx, wy) {

function drawAshPile(ctx, sx, sy, lit) {

function drawCorpse(ctx, sx, sy, lit, t) {
  if (lit < 0.02) {
    // Always show a faint glow even in darkness so player can find it
    ctx.fillStyle = 'rgba(0,255,180,0.08)';
    ctx.fillRect(sx-4, sy-4, 24, 24);
    return;
  }
  const a = Math.min(1, lit * 2);
  const pulse = 0.5 + Math.abs(Math.sin(t * 0.0015)) * 0.5;

  // Spectral glow
  const glowR = 12 + pulse * 6;
  const glow = ctx.createRadialGradient(sx+8, sy+8, 0, sx+8, sy+8, glowR);
  glow.addColorStop(0, `rgba(0,255,180,${0.3 * pulse * a})`);
  glow.addColorStop(1, 'rgba(0,180,120,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(sx+8-glowR, sy+8-glowR, glowR*2, glowR*2);

  // Body lying flat
  ctx.fillStyle = `rgba(30,22,44,${a})`; // cloak
  ctx.fillRect(sx+2, sy+8, 12, 5);
  ctx.fillRect(sx+3, sy+7, 10, 2);
  // Head
  ctx.fillStyle = `rgba(180,140,100,${a})`;
  ctx.fillRect(sx+1, sy+9, 4, 4);
  // Hood
  ctx.fillStyle = `rgba(25,18,38,${a})`;
  ctx.fillRect(sx+1, sy+8, 5, 3);
  // Scattered coins glint
  ctx.fillStyle = `rgba(255,220,50,${a * pulse * 0.8})`;
  ctx.fillRect(sx+7, sy+11, 2, 2);
  ctx.fillRect(sx+11, sy+9, 2, 2);
  ctx.fillRect(sx+9, sy+13, 2, 2);
  // Lantern, still faintly glowing
  ctx.fillStyle = `rgba(255,140,0,${a * pulse * 0.5})`;
  ctx.fillRect(sx+13, sy+10, 3, 3);

  // "REMAINS" label
  if (lit > 0.3) {
    ctx.font = '5px "Press Start 2P"';
    ctx.fillStyle = `rgba(0,255,180,${a * pulse})`;
    ctx.textAlign = 'center';
    ctx.fillText('REMAINS', sx+8, sy+4);
    ctx.textAlign = 'left';
  }
}

function drawCorpseCompass(timestamp) {
  if (!corpse) return;
  const dx = corpse.wx - player.wx;
  const dy = corpse.wy - player.wy;
  const dist = Math.sqrt(dx*dx + dy*dy);

  // Don't draw if right on top of it
  if (dist < 3) return;

  const angle = Math.atan2(dy, dx);
  const pulse = 0.6 + Math.abs(Math.sin(timestamp * 0.002)) * 0.4;

  // Compass ring — fixed position top-center
  const cx2 = W / 2;
  const cy2 = 28;
  const r = 14;

  // Ring
  ctx.beginPath();
  ctx.arc(cx2, cy2, r, 0, Math.PI*2);
  ctx.strokeStyle = `rgba(0,255,180,${0.4 * pulse})`;
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.fillStyle = `rgba(0,0,0,0.5)`;
  ctx.fill();

  // Arrow
  const ax = cx2 + Math.cos(angle) * (r - 3);
  const ay = cy2 + Math.sin(angle) * (r - 3);
  ctx.fillStyle = `rgba(0,255,180,${pulse})`;
  ctx.beginPath();
  ctx.arc(ax, ay, 3, 0, Math.PI*2);
  ctx.fill();

  // Center dot
  ctx.fillStyle = `rgba(0,255,180,${0.6})`;
  ctx.fillRect(cx2-1, cy2-1, 3, 3);

  // Distance label
  const tilesDist = Math.round(dist);
  ctx.font = '5px "Press Start 2P"';
  ctx.fillStyle = `rgba(0,255,180,${pulse})`;
  ctx.textAlign = 'center';
  ctx.fillText(`${tilesDist}`, cx2, cy2 + r + 10);
  ctx.fillText('REMAINS', cx2, cy2 + r + 19);
  ctx.textAlign = 'left';

  // Edge arrow if corpse is off screen
  const screenDx = corpse.wx * TILE - player.px;
  const screenDy = corpse.wy * TILE - player.py;
  const sx2 = screenDx + W/2;
  const sy2 = screenDy + H/2;
  if (sx2 < 20 || sx2 > W-20 || sy2 < 20 || sy2 > H-20) {
    // Clamp to screen edge
    const margin = 22;
    const ex = Math.max(margin, Math.min(W-margin, sx2));
    const ey = Math.max(margin, Math.min(H-margin, sy2));
    ctx.fillStyle = `rgba(0,255,180,${pulse * 0.9})`;
    ctx.save();
    ctx.translate(ex, ey);
    ctx.rotate(angle);
    ctx.fillRect(-5, -2, 10, 4);
    ctx.fillRect(3, -4, 4, 8);
    ctx.restore();
  }
}

function drawOilFlask(ctx, sx, sy, lit, t, wx, wy) {
  if (lit < 0.05) return;
  const a = Math.min(1, lit*2.5);
  const bob = Math.round(Math.sin(t*0.004 + wx*0.8 + wy*1.2) * 1.5);

  // Oil liquid inside (orange)
  ctx.fillStyle = `rgba(255,140,0,${a*0.85})`;
  ctx.fillRect(sx+5, sy+9+bob, 6, 4);

  // Neck + cork
  ctx.fillStyle = `rgba(80,60,20,${a})`;
  ctx.fillRect(sx+6, sy+4+bob, 4, 3);
  ctx.fillStyle = `rgba(160,100,40,${a})`; // cork
  ctx.fillRect(sx+6, sy+3+bob, 4, 2);
  // Shine
  ctx.fillStyle = `rgba(255,220,100,${a*0.4})`;

}

function drawHealthPotion(ctx, sx, sy, lit, t, wx, wy) {
  if (lit < 0.05) return;
  const a = Math.min(1, lit * 2.5);
  const bob = Math.round(Math.sin(t * 0.004 + wx * 1.3 + wy * 0.7) * 1.5);
  // Red glow
  ctx.fillStyle = `rgba(255,0,60,${a * 0.18})`;
  ctx.fillRect(sx + 2, sy + 3 + bob, 12, 12);
  // Flask body (round bottom)
  ctx.fillStyle = `rgba(60,15,15,${a})`; // dark red glass
  ctx.fillRect(sx + 5, sy + 6 + bob, 6, 7);
  ctx.fillRect(sx + 4, sy + 8 + bob, 8, 4);
  // Red liquid inside
  ctx.fillStyle = `rgba(220,30,60,${a * 0.9})`;
  ctx.fillRect(sx + 5, sy + 9 + bob, 6, 4);
  ctx.fillRect(sx + 4, sy + 10 + bob, 8, 2);
  // Liquid surface shimmer
  ctx.fillStyle = `rgba(255,80,100,${a * 0.5})`;
  ctx.fillRect(sx + 5, sy + 9 + bob, 6, 1);
  // Neck
  ctx.fillStyle = `rgba(60,15,15,${a})`;
  ctx.fillRect(sx + 6, sy + 4 + bob, 4, 3);
  // Cork (light tan)
  ctx.fillStyle = `rgba(180,130,70,${a})`;
  ctx.fillRect(sx + 6, sy + 3 + bob, 4, 2);
  // Glass shine highlight
  ctx.fillStyle = `rgba(255,160,180,${a * 0.45})`;
  ctx.fillRect(sx + 5, sy + 7 + bob, 2, 3);
  // Cross symbol on flask
  ctx.fillStyle = `rgba(255,100,120,${a * 0.7})`;
  ctx.fillRect(sx + 7, sy + 9 + bob, 2, 4);
  ctx.fillRect(sx + 6, sy + 10 + bob, 4, 2);
}

function drawShrine(ctx, sx, sy, lit, t, wx, wy, used) {
  if (lit < 0.05) return;
  const a = Math.min(1, lit*2);
  const pulse = used ? 0 : 0.5 + Math.abs(Math.sin(t*0.002 + wx + wy)) * 0.5;
  // Base
  ctx.fillStyle = `rgba(100,80,140,${a})`; ctx.fillRect(sx+3, sy+10, 10, 5);
  ctx.fillStyle = `rgba(70,55,100,${a})`;  ctx.fillRect(sx+2, sy+13, 12, 2);
  // Pillar
  ctx.fillStyle = `rgba(130,100,180,${a})`; ctx.fillRect(sx+6, sy+5, 4, 6);
  ctx.fillStyle = `rgba(160,130,210,${a})`; ctx.fillRect(sx+6, sy+5, 1, 6);
  // Top gem / orb
  if (!used) {
    const gr = ctx.createRadialGradient(sx+8, sy+4, 0, sx+8, sy+4, 5+pulse*3);
    gr.addColorStop(0, `rgba(200,150,255,${a*pulse})`);
    gr.addColorStop(1, 'rgba(100,50,200,0)');
    ctx.fillStyle = gr; ctx.fillRect(sx+3, sy-1, 10, 10);
    ctx.fillStyle = `rgba(220,180,255,${a})`; ctx.fillRect(sx+6, sy+2, 4, 4);
    ctx.fillStyle = `rgba(255,230,255,${a*0.8})`; ctx.fillRect(sx+7, sy+2, 2, 2);
  } else {
    ctx.fillStyle = `rgba(80,60,100,${a})`; ctx.fillRect(sx+6, sy+2, 4, 4);
  }
  // Step text hint
  if (!used && lit > 0.3) {
    ctx.font = '4px "Press Start 2P"';
    ctx.fillStyle = `rgba(200,150,255,${a*pulse})`;
    ctx.textAlign = 'center';
    ctx.fillText('STEP ON', sx+8, sy-2);
    ctx.textAlign = 'left';
  }
}

function drawVault(ctx, sx, sy, lit, t, wx, wy, opened) {
  if (lit < 0.05) return;
  const a = Math.min(1, lit*2);
  const shimmer = opened ? 0 : 0.4 + Math.abs(Math.sin(t*0.003+wx+wy))*0.3;
  // Door frame
  ctx.fillStyle = `rgba(80,65,40,${a})`; ctx.fillRect(sx+2, sy+3, 12, 12);
  ctx.fillStyle = `rgba(120,95,50,${a})`; ctx.fillRect(sx+2, sy+3, 12, 2);
  ctx.fillStyle = `rgba(60,48,28,${a})`; ctx.fillRect(sx+2, sy+3, 2, 12);
  // Door
  ctx.fillStyle = opened ? `rgba(20,15,8,${a})` : `rgba(160,130,60,${a})`;
  ctx.fillRect(sx+4, sy+5, 8, 9);
  if (!opened) {
    // Lock
    ctx.fillStyle = `rgba(220,190,80,${a})`; ctx.fillRect(sx+7, sy+8, 3, 3);
    ctx.fillStyle = `rgba(255,220,100,${a})`; ctx.fillRect(sx+8, sy+7, 1, 2);
    // Gold glow
    ctx.fillStyle = `rgba(255,200,50,${a*shimmer*0.4})`;
    ctx.fillRect(sx, sy+1, 16, 14);
  }
  // Cost hint
  if (!opened && lit > 0.3) {
    ctx.font = '4px "Press Start 2P"';
    ctx.fillStyle = `rgba(255,220,80,${a*shimmer})`;
    ctx.textAlign = 'center';
    ctx.fillText(`${VAULT_COST}g`, sx+8, sy+1);
    ctx.textAlign = 'left';
  }
}

function drawCursedAltar(ctx, sx, sy, lit, t, wx, wy, used) {
  if (lit < 0.05) return;
  const a = Math.min(1, lit*2);
  const pulse = used ? 0 : 0.4 + Math.abs(Math.sin(t*0.004+wx*1.1+wy*0.9))*0.4;
  // Base slab
  ctx.fillStyle = `rgba(50,20,50,${a})`; ctx.fillRect(sx+2, sy+9, 12, 5);
  ctx.fillStyle = `rgba(70,30,70,${a})`; ctx.fillRect(sx+2, sy+9, 12, 2);
  // Altar top
  ctx.fillStyle = `rgba(80,30,80,${a})`; ctx.fillRect(sx+3, sy+6, 10, 4);
  ctx.fillStyle = `rgba(110,40,110,${a})`; ctx.fillRect(sx+3, sy+6, 10, 1);
  // Runes
  if (!used) {
    ctx.fillStyle = `rgba(255,80,255,${a*pulse})`;
    ctx.fillRect(sx+4, sy+7, 2, 2); ctx.fillRect(sx+8, sy+7, 2, 2);
    ctx.fillRect(sx+6, sy+10, 4, 1); ctx.fillRect(sx+3, sy+11, 2, 1);
    // Mist / glow
    const gr = ctx.createRadialGradient(sx+8, sy+8, 0, sx+8, sy+8, 10+pulse*4);
    gr.addColorStop(0, `rgba(200,0,200,${a*pulse*0.35})`);
    gr.addColorStop(1, 'rgba(100,0,100,0)');
    ctx.fillStyle = gr; ctx.fillRect(sx-2, sy-2, 20, 20);
  }
  if (!used && lit > 0.3) {

    ctx.fillStyle = `rgba(255,100,255,${a*pulse})`;

    ctx.fillText('CURSED', sx+8, sy+2);

  }
}

function drawChest(ctx, sx, sy, lit) {
  if (lit < 0.05) return;

  ctx.fillStyle = `rgba(100,70,0,${a})`;
  ctx.fillRect(sx+2, sy+7, 12, 8);
  ctx.fillStyle = `rgba(60,40,0,${a})`;
  ctx.fillRect(sx+2, sy+7, 12, 3);
  ctx.fillStyle = `rgba(180,140,20,${a})`;
  ctx.fillRect(sx+6, sy+9, 4, 3);
  ctx.fillRect(sx+2, sy+7, 12, 1);
  ctx.fillStyle = `rgba(220,180,40,${a})`;
  ctx.fillRect(sx+7, sy+10, 2, 2);
}

function drawSkull(ctx, sx, sy, lit) {
  if (lit < 0.05) return;
  const a = Math.min(1, lit * 2);
  ctx.fillStyle = `rgba(180,178,160,${a})`;
  ctx.fillRect(sx+4, sy+5, 8, 7);
  ctx.fillRect(sx+5, sy+4, 6, 1);
  ctx.fillRect(sx+5, sy+12, 6, 2);
  ctx.fillStyle = `rgba(0,0,0,${a})`;
  ctx.fillRect(sx+5, sy+7, 2, 2);
  ctx.fillRect(sx+9, sy+7, 2, 2);
  ctx.fillRect(sx+7, sy+9, 2, 1);

function drawCoin(ctx, sx, sy, lit, t, wx, wy) {
  if (lit < 0.05) return;
  const a = Math.min(1, lit * 2.5);
  const bob = Math.round(Math.sin(t * 0.004 + wx * 1.3 + wy * 0.7) * 2);
  const spin = Math.floor(t / 200 + wx + wy) % 4;
  // Glow
  ctx.fillStyle = `rgba(255,220,50,${a * 0.18})`;
  ctx.fillRect(sx+2, sy+4+bob, 12, 10);
  // Coin body (simulate spin with width)
  const widths = [8, 5, 2, 5];
  const cw = widths[spin];
  const cx2 = sx + 8 - cw/2;
  ctx.fillStyle = `rgba(220,180,20,${a})`;
  ctx.fillRect(cx2, sy+5+bob, cw, 7);
  ctx.fillStyle = `rgba(255,230,60,${a})`;
  ctx.fillRect(cx2, sy+5+bob, cw, 2);
  if (cw >= 5) {
    ctx.fillStyle = `rgba(180,140,10,${a})`;
    ctx.fillRect(cx2, sy+11+bob, cw, 1);
  }
}

function drawGem(ctx, sx, sy, lit, gemType, t, wx, wy) {
  if (lit < 0.05) return;
  const a = Math.min(1, lit * 2.5);
  const bob = Math.round(Math.sin(t * 0.003 + wx * 0.9 + wy * 1.1) * 1.5);
  const colorMap = {
    ruby:     { mid:'#ff2244', hi:'#ff6688', dark:'#880022' },
    emerald:  { mid:'#22cc66', hi:'#66ffaa', dark:'#006633' },
    sapphire: { mid:'#2266ff', hi:'#66aaff', dark:'#002299' },
  };
  const c = colorMap[gemType] || colorMap.ruby;
  const pulse = 0.10 + Math.abs(Math.sin(t * 0.005 + wx + wy)) * 0.08;

  // Glow
  ctx.globalAlpha = a * pulse * 2;
  ctx.fillStyle = c.mid;
  ctx.fillRect(sx+1, sy+2+bob, 14, 14);
  ctx.globalAlpha = 1;

  // Body — diamond cross shape
  ctx.fillStyle = `rgba(${hexToRgb(c.mid)},${a})`;
  ctx.fillRect(sx+5, sy+4+bob, 6, 8);
  ctx.fillRect(sx+4, sy+5+bob, 8, 6);
  ctx.fillRect(sx+6, sy+3+bob, 4, 10);
  ctx.fillRect(sx+3, sy+6+bob, 10, 4);

  // Highlight
  ctx.fillStyle = `rgba(${hexToRgb(c.hi)},${a})`;
  ctx.fillRect(sx+6, sy+4+bob, 2, 3);
  ctx.fillRect(sx+5, sy+5+bob, 2, 2);

  // Shadow edge
  ctx.fillStyle = `rgba(${hexToRgb(c.dark)},${a})`;
  ctx.fillRect(sx+7, sy+9+bob, 3, 3);
}

function hexToRgb(hex) {
  const h = hex.length > 7 ? hex.slice(0, 7) : hex; // strip alpha if 8-char
  const r = parseInt(h.slice(1,3),16);
  const g = parseInt(h.slice(3,5),16);
  const b = parseInt(h.slice(5,7),16);
  if (isNaN(r) || isNaN(g) || isNaN(b)) return '255,255,255';
  return `${r},${g},${b}`;
}

function drawFloatingTexts(timestamp) {
  ctx.save();
  for (const ft of floatingTexts) {
    const progress = 1 - ft.life / ft.maxLife;
    const screenX = ft.px - camX;
    const screenY = ft.py - camY - progress * 32;
    const alpha = ft.life > ft.maxLife * 0.3 ? 1 : ft.life / (ft.maxLife * 0.3);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = ft.color;
    ctx.font = '6px "Press Start 2P"';
    ctx.textAlign = 'center';
    // Shadow
    ctx.fillStyle = '#000';
    ctx.fillText(ft.text, screenX+1, screenY+1);
    ctx.fillStyle = ft.color;
    ctx.fillText(ft.text, screenX, screenY);
  }
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
  ctx.restore();
}


function drawPlayer(ctx, sx, sy, t) {

  // Shadow

  ctx.fillRect(sx+5, py, 6, 2);

  ctx.fillRect(sx+6, py+4, 1, 1);

  lg.addColorStop(0, 'rgba(255,200,50,0.15)');
  lg.addColorStop(1, 'rgba(255,100,0,0)');
  ctx.fillStyle = lg;
  ctx.fillRect(sx+6, py+1, 16, 16);

// ─── Movement ────────────────────────────────────────────────
let lastTime = 0;
let moveRepeat = 0;


function breakSecretWall(scx, scy, slx, sly, swx, swy) {
  const chunk = getChunk(scx, scy);
  chunk.tiles[sly*CHUNK+slx] = T.FLOOR; // open the passage
  if (!chunk.secretRoom) return;
  const sr = chunk.secretRoom;
  sr.broken = true;
  // Carve the secret room floor
  for (let dy = 0; dy < sr.rh; dy++)
    for (let dx = 0; dx < sr.rw; dx++)
      chunk.tiles[(sr.ry+dy)*CHUNK+(sr.rx+dx)] = T.FLOOR;
  // Spawn guaranteed loot inside
  const lootRng = mulberry32((scx*1337)^(scy*7331)^0xBEEF);
  const lx1 = sr.rx + 1, ly1 = sr.ry + 1;
  const lx2 = sr.rx + Math.floor(sr.rw/2), ly2 = sr.ry + Math.floor(sr.rh/2);
  const lx3 = sr.rx + sr.rw - 2, ly3 = sr.ry + sr.rh - 2;
  chunk.objects.push({type:'chest',       lx:lx1, ly:ly1});
  chunk.objects.push({type:'health_potion',lx:lx2, ly:ly2});
  const gType = ['ruby','emerald','sapphire'][Math.floor(lootRng()*3)];
  chunk.objects.push({type:'gem', gemType:gType, lx:lx3, ly:ly3});
  // 40% chance: free weapon scroll (extra gem + oil flask)
  if (lootRng() < 0.40) {
    chunk.objects.push({type:'oil_flask', lx:sr.rx+1, ly:sr.ry+sr.rh-2});
    const g2 = ['ruby','emerald','sapphire'][Math.floor(lootRng()*3)];
    chunk.objects.push({type:'gem', gemType:g2, lx:sr.rx+sr.rw-2, ly:sr.ry+1});
  }
  triggerShake(8, 500);
  triggerFlash('#ffffff44', 400);
  spawnFloatText(swx, swy, '★ SECRET ROOM!', '#ffddaa');
  banners.push({text:'SECRET ROOM FOUND!', color:'#ffddaa', life:4000, maxLife:4000});
}

function tryMove(dx, dy) {
  const nx = player.wx + dx;
  const ny = player.wy + dy;
  // Secret wall: only charged sword can break it
  const destTile = getTile(nx, ny);
  if (destTile === T.SECRET_WALL) return false; // blocked — use sword to break

  if (isWalkable(nx, ny)) {
    player.wx = nx;
    player.wy = ny;
    player.targetWx = nx;
    player.targetWy = ny;
    if (ghost && ghost.active) ghost.moveCount = (ghost.moveCount||0) + 1;

    // ── Hazard tile effects ──
    if ((META.selectedClass === 'pyromancer' || hasPerk('ember_heart')) && destTile === T.LAVA) {
      player.hp = Math.min(player.maxHp, player.hp + 1);
      if (hasPerk('ember_heart')) spawnFloatText(player.wx, player.wy, '+1 EMBER', '#ff6622');
    }
    if (destTile === T.LAVA && !player.lavaBoots && META.selectedClass !== 'pyromancer' && !hasPerk('ember_heart')) {
      if (player.invincible <= 0) {
        player.hp = Math.max(0, player.hp - 1);
        oil = Math.max(0, oil - 5);
        player.invincible = 400;
        spawnFloatText(nx, ny, '-1HP 🔥', '#ff4400');
        triggerFlash('#ff330022', 150);
        if (player.hp <= 0) {
          if (gameMode === 'story') {
            player.hp = Math.max(1, Math.floor(player.maxHp * 0.5));
            oil = maxOil();
            const _rs2 = actStartTile(storyAct || 1);
            player.wx = _rs2.wx; player.wy = _rs2.wy;
            player.px = player.wx*TILE; player.py = player.wy*TILE;
            enemies.length = 0; spawnedChunks.clear();
            triggerFlash('#000000aa', 800);
          } else {
            isDead = true; deathTimestamp = Date.now();
            const dep = Math.round(Math.sqrt(player.wx**2+player.wy**2)/5);
            deathStats = { tiles: exploredCount, gold, depth: dep };
            saveBest(deathStats);
            corpse = { wx: player.wx, wy: player.wy, gold, tiles: exploredCount, depth: dep, oil: maxOil(), upgradeLevels: upgrades.map(u=>u.level), weapon: player.weapon, bombs: bombCount, bloodCharm: player.bloodCharm, cursedBlade: player.cursedBlade, voidCloaks: player.voidCloaks, expires: gameMode === 'hardcore' ? Date.now() + 90000 : null };
            triggerFlash('#000000', 1200);
          }
        }
      }
    } else if (destTile === T.DARK_PATCH) {
      player.darkPatchTimer = 2000;
      spawnFloatText(nx, ny, '⚫ DARKNESS', '#334466');
    } else if (destTile === T.ICE_PATCH) {
      player.icePatchTimer = 3000;
    } else if (destTile === T.PRESSURE && !player.spiderRing) {
      // Trigger once — mark it as triggered
      const pcx = Math.floor(nx/CHUNK), pcy = Math.floor(ny/CHUNK);
      const plx = ((nx%CHUNK)+CHUNK)%CHUNK, ply = ((ny%CHUNK)+CHUNK)%CHUNK;
      const pchunk = getChunk(pcx, pcy);
      if (pchunk.tiles[ply*CHUNK+plx] === T.PRESSURE) {
        pchunk.tiles[ply*CHUNK+plx] = T.FLOOR; // disarm after trigger
        const count = gameMode === 'hardcore' ? 3 + Math.floor(Math.random()*2) : 2;
        const biome = pchunk.biome;
        // Force-spawn enemies near plate
        const rngP = mulberry32((nx*999)^(ny*777)^Date.now());
        const validDefs = Object.entries(ENEMY_TYPES).filter(([,d])=>d.biomes.includes(pchunk.biome.id))[0];
        const eDef = validDefs ? validDefs[1] : Object.values(ENEMY_TYPES)[0];
        for (let s = 0; s < count; s++) {
          const ex = nx + (rngP()>0.5?1:-1)*(1+Math.floor(rngP()*2));
          const ey = ny + (rngP()>0.5?1:-1)*(1+Math.floor(rngP()*2));
          if (isWalkable(ex,ey)) enemies.push({type:Object.keys(ENEMY_TYPES)[0], def:eDef, wx:ex, wy:ey, hp:eDef.hp, maxHp:eDef.hp, moveTimer:200, hitFlash:0, spawnChunk:`${pcx},${pcy}`});
        }
        triggerShake(5, 400);
        triggerFlash('#ff440033', 300);
        spawnFloatText(nx, ny, '⚠ PRESSURE PLATE!', '#ff8800');
      }
    }
    return true;
  }
  return false;
}

function markVisible() {
  const range = player.lightRadius;
  for (let dy = -range; dy <= range; dy++) {
    for (let dx = -range; dx <= range; dx++) {
      if (dx*dx+dy*dy <= range*range) {
        markExplored(player.wx+dx, player.wy+dy);
      }
    }
  }
  checkLandmarkDiscovery();
}

// ─── Pause when tab is hidden ────────────────────────────────
let paused = false;
document.addEventListener('visibilitychange', () => {
  paused = document.hidden;
  if (!paused) lastTime = performance.now(); // reset so dt doesn't spike on return
});
function loop(timestamp) {
  if (paused) { lastTime = timestamp; requestAnimationFrame(loop); return; }
  const dt = Math.min(timestamp - lastTime, 100);
  lastTime = timestamp;
  torchTime = timestamp;

  // ── Start menu ──────────────────────────────────────────────
  if (!gameStarted) {
    ctx.clearRect(0, 0, W, H);
    if (vaultOpen) {
      ctx.fillStyle = '#050300';
      ctx.fillRect(0, 0, W, H);
      drawVaultScreen(timestamp);
    } else if (loreOpen) {
      ctx.fillStyle = '#050300';
      ctx.fillRect(0, 0, W, H);
      drawLoreMenu(timestamp);
    } else {
      drawStartMenu(timestamp);
    }
    requestAnimationFrame(loop);
    return;
  }

  // Restart on R when dead
  if (isDead) {
    if (keys['r'] || keys['R']) resetRun();
    drawScene(timestamp);
    requestAnimationFrame(loop);
    return;
  }

  // Tick screenshake
  if (shakeTimer > 0) {
    shakeTimer -= dt;
    if (shakeTimer <= 0) { shakeAmt = 0; shakeTimer = 0; }
  }

  // Tick flash
  if (flashLife > 0) flashLife = Math.max(0, flashLife - dt);

  // Tick banners
  for (const b of banners) b.life -= dt;
  banners.splice(0, banners.length, ...banners.filter(b => b.life > 0));

  // Input — blocked while shop/lore open
  const sprint = keys['Shift'];
  const iceSlowed = player.icePatchTimer > 0;
  const speedBoosted = (player.boostSpeedTimer || 0) > 0;
  const delay = sprint ? player.sprintDelay : (iceSlowed ? player.moveDelay * 2 : speedBoosted ? Math.floor(player.moveDelay * 0.5) : player.moveDelay);
  const moved = (shopOpen || loreOpen || merchantOpen || boostOpen || inventoryOpen) ? null :
    keys['ArrowUp']    || keys['w'] || keys['W'] ? 'up' :
    keys['ArrowDown']  || keys['s'] || keys['S'] ? 'down' :
    keys['ArrowLeft']  || keys['a'] || keys['A'] ? 'left' :
    keys['ArrowRight'] || keys['d'] || keys['D'] ? 'right' : null;

  if (moved) {
    moveRepeat += dt;
    if (moveRepeat === dt || moveRepeat >= delay) {
      if (moveRepeat >= delay) moveRepeat = delay * 0.6;
      const dx = moved === 'left' ? -1 : moved === 'right' ? 1 : 0;
      const dy = moved === 'up'   ? -1 : moved === 'down'  ? 1 : 0;
      // Track facing direction
      if (dx !== 0 || dy !== 0) { player.faceDx = dx; player.faceDy = dy; }
      if (tryMove(dx, dy)) {
        const stepTile = getTile(player.wx, player.wy);
        if (stepTile === 3) SFX.play('step_lava');
        else if (stepTile === 6) SFX.play('step_ice');
        else if (Math.floor(Date.now()/150)%3===0) SFX.play('step');
        tryCollect(player.wx, player.wy);
        // Drain oil per step
        const drainAmt = gameMode === 'story' ? OIL_DRAIN_PER_STEP * 0.4 : (player.oilFilterTimer||0) > 0 ? OIL_DRAIN_PER_STEP * 0.5 : OIL_DRAIN_PER_STEP;
        oil = Math.max(0, oil - drainAmt);
        // HP regen: 1 HP per 40 steps
        player.regenTimer = (player.regenTimer || 0) + 1;
        if (player.regenTimer >= 40) {
          player.regenTimer = 0;
          if (player.hp < player.maxHp) {
            player.hp = Math.min(player.maxHp, player.hp + 1);
            spawnFloatText(player.wx, player.wy, '+1 HP', '#44ff88');
          }
        }
        if (oil <= 0) {
          isDead = true;
          deathTimestamp = timestamp;
          const depth2 = Math.round(Math.sqrt(player.wx**2+player.wy**2)/5);
          deathStats = { tiles: exploredCount, gold, depth: depth2 };
          saveBest(deathStats);
          corpse = { wx: player.wx, wy: player.wy, gold, tiles: exploredCount, depth: depth2, oil: maxOil(), upgradeLevels: upgrades.map(u => u.level), weapon: player.weapon, bombs: bombCount, bloodCharm: player.bloodCharm, cursedBlade: player.cursedBlade, voidCloaks: player.voidCloaks, expires: gameMode === 'hardcore' ? Date.now() + 90000 : null };
          triggerFlash('#000000', 1200);
        } else if (oil < maxOil() * 0.15 && Math.floor(oil) % 5 === 0) {
          triggerShake(2, 200);
        }
      }
    }
  } else {
    moveRepeat = 0;
  }

  // Tick all combat systems
  tickCombatPlayer(dt);

  // Hazard timers
  if (player.darkPatchTimer > 0) player.darkPatchTimer = Math.max(0, player.darkPatchTimer - dt);
  if (player.icePatchTimer  > 0) player.icePatchTimer  = Math.max(0, player.icePatchTimer  - dt);
  if (player.depthCandleTimer > 0) player.depthCandleTimer = Math.max(0, player.depthCandleTimer - dt);

  // Boost timers
  if (player.boostSpeedTimer > 0) { player.boostSpeedTimer = Math.max(0, player.boostSpeedTimer - dt); }
  if (player.boostDmgTimer   > 0) { player.boostDmgTimer   = Math.max(0, player.boostDmgTimer   - dt); }
  if (player.goldMultiTimer  > 0) { player.goldMultiTimer  = Math.max(0, player.goldMultiTimer  - dt); }
  if (player.goldMagnetTimer > 0) { player.goldMagnetTimer = Math.max(0, player.goldMagnetTimer - dt); }
  if (player.oilFilterTimer  > 0) { player.oilFilterTimer  = Math.max(0, player.oilFilterTimer  - dt); }

  // Corpse expiry in hardcore
  if (corpse && corpse.expires && Date.now() > corpse.expires) {
    corpse = null;
    banners.push({text:'YOUR REMAINS CRUMBLED...', color:'#884444', life:3500, maxLife:3500});
  }

  if (!shopOpen && !loreOpen && !inventoryOpen && !merchantOpen && !boostOpen && !storyCutscene && !victoryScreen && gameMode !== 'easy') {
    checkStoryBossSpawn();
    if (!ghost || !ghost.active) tickEnemies(dt, timestamp);
    tickGroundPound(dt);
    tickProjectiles(dt);
  }
  tickPursuer(dt);
  tickGhost(dt);
  // Update music state
  if (MUSIC.running) {
    if (isDead) {
      MUSIC.setState('dead');
    } else if (oil < maxOil() * 0.25) {
      MUSIC.setState('lowoil');
    } else if (enemies.some(e => { const dx=Math.abs(e.wx-player.wx),dy=Math.abs(e.wy-player.wy); return dx+dy<10; })) {
      MUSIC.setState('combat');
    } else {
      MUSIC.setState('explore');
    }
  }

  // Apply oil to light radius (shrinks when low)
  if (!isDead) {
    const baseRadius = 7 + getUpgradeValue('light') * 2;
    player.lightRadius = oil < maxOil() * 0.2
      ? baseRadius * (0.3 + (oil/20) * 0.7)
      : baseRadius;
  }

  // Smooth pixel movement
  const targetPx = player.wx * TILE;
  const targetPy = player.wy * TILE;
  player.px += (targetPx - player.px) * 0.25;
  player.py += (targetPy - player.py) * 0.25;
  if (Math.abs(player.px - targetPx) < 0.5) player.px = targetPx;
  if (Math.abs(player.py - targetPy) < 0.5) player.py = targetPy;

  // Biome ambience
  if (gameStarted && !isDead && !storyCutscene && !victoryScreen) {
    const _bpcx = Math.floor(player.wx/CHUNK), _bpcy = Math.floor(player.wy/CHUNK);
    const _curBiome = getChunkBiome(_bpcx, _bpcy);
    SFX.setAmbience(_curBiome.id);
  }

  markVisible();
  checkMilestones();

  // Tick floating texts
  for (const ft of floatingTexts) ft.life -= dt;
  floatingTexts.splice(0, floatingTexts.length, ...floatingTexts.filter(ft => ft.life > 0));

  // Apply screenshake to canvas transform
  if (shakeAmt > 0) {
    const sx2 = (Math.random()-0.5) * shakeAmt * 2;
    const sy2 = (Math.random()-0.5) * shakeAmt * 2;
    ctx.save();
    ctx.translate(sx2, sy2);
  }

  drawScene(timestamp);

  if (shakeAmt > 0) ctx.restore();

  requestAnimationFrame(loop);
}

// ─── Init ────────────────────────────────────────────────────
// Start in a valid floor tile
for (let attempts = 0; attempts < 50; attempts++) {
  if (isWalkable(player.wx, player.wy)) break;
  player.wx++; player.wy++;
}
player.px = player.wx * TILE;
player.py = player.wy * TILE;
applyUpgrades(); // initialize all player stats from upgrades
markVisible();
requestAnimationFrame(loop);
</script>
</body>
