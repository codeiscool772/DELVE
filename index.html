      lines: [
        '◆ 5 acts with a true ending',
        '◆ Named bosses & cutscenes',
        '◆ Lore fragments to collect',
        '◆ Die = return to act start',
        '◆ Reduced oil drain',
        '◆ Maren is waiting.',
      ],
    },
  ];

  const cardW = 148, cardH = 148;
  const spacing = 10;
  // 2x2 layout for 4 modes
  const totalW = cardW * 2 + spacing;
  const startX = W/2 - totalW/2;
  const cardY = 140;

  modes.forEach((mode, i) => {
    const col = i % 2, row = Math.floor(i / 2);
    const cx2 = startX + col * (cardW + spacing);
    const cy3 = cardY + row * (cardH + spacing);
    const selected = startMenuCursor === i;
    const pulse = selected ? 0.7 + Math.sin(t * 0.004) * 0.3 : 0;

    // Card bg
    ctx.fillStyle = mode.darkColor;
    ctx.fillRect(cx2, cy3, cardW, cardH);

    // Hardcore skull bg pattern
    if (mode.id === 'hardcore' && selected) {
      ctx.fillStyle = 'rgba(255,0,30,0.04)';
      for (let gy2 = cy3; gy2 < cy3+cardH; gy2 += 8) ctx.fillRect(cx2, gy2, cardW, 1);
    }
    // Story starfield
    if (mode.id === 'story' && selected) {
      ctx.fillStyle = 'rgba(170,220,255,0.06)';
      for (let gy2 = cy3; gy2 < cy3+cardH; gy2 += 6) ctx.fillRect(cx2, gy2, cardW, 1);
    }

    // Border
    ctx.strokeStyle = selected ? mode.color : mode.borderColor;
    ctx.lineWidth = selected ? 2 : 1;
    if (selected) {
      ctx.shadowColor = mode.color;
      ctx.shadowBlur = 12 * pulse;
    }
    ctx.strokeRect(cx2, cy3, cardW, cardH);
    ctx.shadowBlur = 0;
    ctx.lineWidth = 1;

    // Mode label
    ctx.font = '8px "Press Start 2P"';
    ctx.fillStyle = selected ? mode.color : mode.borderColor;
    ctx.textAlign = 'center';
    ctx.fillText(mode.label, cx2 + cardW/2, cy3 + 20);

    // Bullet lines
    ctx.font = '5px "Press Start 2P"';
    ctx.textAlign = 'left';
    mode.lines.forEach((line, li) => {
      const isBonus = line.startsWith('★') || line.startsWith('◆');
      const isPenalty = line.startsWith('☠');
      ctx.fillStyle = selected
        ? (isBonus ? (mode.id==='story'?'#aaddff':'#ffdd44') : isPenalty ? '#ff6666' : '#aaaaaa')
        : (isBonus ? (mode.id==='story'?'#224466':'#665500') : isPenalty ? '#551111' : '#555555');
      ctx.fillText(line, cx2 + 10, cy3 + 36 + li * 15);
    });

    // Selected indicator
    if (selected) {
      ctx.font = '5px "Press Start 2P"';
      ctx.fillStyle = mode.color;
      ctx.textAlign = 'center';
      ctx.fillText('▼ SELECTED ▼', cx2 + cardW/2, cy3 + cardH - 8);
    }
  });

  const bottomY = cardY + cardH*2 + spacing + 16;
  ctx.font = '6px "Press Start 2P"';
  ctx.fillStyle = '#443322';
  ctx.textAlign = 'center';
  ctx.fillText('← → ↑ ↓  or  A / D / W / S  to choose', W/2, bottomY);

  ctx.fillStyle = '#ffaa44';
  ctx.font = '7px "Press Start 2P"';
  ctx.fillText('ENTER or SPACE — BEGIN', W/2, bottomY + 18);

  ctx.fillStyle = '#443322';
  ctx.font = '5px "Press Start 2P"';
  ctx.fillText('?  —  open help', W/2, bottomY + 34);

  // Vault button
  const vbY = bottomY + 56, vbW = 160, vbH = 22;
  const vbX = W/2 - vbW/2;
  ctx.fillStyle = '#0d0510';
  ctx.fillRect(vbX, vbY, vbW, vbH);
  ctx.strokeStyle = '#cc88ff';
  ctx.lineWidth = 1;
  ctx.strokeRect(vbX, vbY, vbW, vbH);
  ctx.font = '6px "Press Start 2P"';
  ctx.fillStyle = '#cc88ff';
  ctx.textAlign = 'center';
  ctx.fillText('[ V ] VAULT', W/2, vbY + 14);
  // Echo count under button
  ctx.font = '5px "Press Start 2P"';
  ctx.fillStyle = '#664488';
  ctx.fillText(`◆ ${META.echoes} echoes`, W/2, vbY + 32);

  // Active class indicator
  const cls2 = CLASS_DEFS[META.selectedClass];
  if (cls2) {
    ctx.fillStyle = cls2.color;
    ctx.fillText(cls2.name, W/2, vbY + 44);
  }
  // Active perks
  if (META.equippedPerks.length > 0) {
    ctx.fillStyle = '#554466';
    ctx.fillText(META.equippedPerks.map(p => PERK_DEFS[p]?.name || p).join(' · '), W/2, vbY + 56);
  }

  ctx.textAlign = 'left';
}


function drawVaultScreen(timestamp) {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  const PAD = 14;
  const vx = PAD, vy = PAD, vw = W - PAD*2, vh = H - PAD*2;

  ctx.fillStyle = '#06030a';
  ctx.fillRect(vx, vy, vw, vh);
  ctx.strokeStyle = '#cc88ff'; ctx.lineWidth = 2;
  ctx.strokeRect(vx, vy, vw, vh);
  ctx.strokeStyle = '#220033'; ctx.lineWidth = 1;
  ctx.strokeRect(vx+4, vy+4, vw-8, vh-8);

  // Header row
  ctx.font = '9px "Press Start 2P"';
  ctx.fillStyle = '#cc88ff'; ctx.textAlign = 'left';
  ctx.fillText('THE VAULT', vx+12, vy+18);
  ctx.font = '7px "Press Start 2P"';
  ctx.fillStyle = '#ffdd44'; ctx.textAlign = 'right';
  ctx.fillText('\u25c6 ' + META.echoes + ' ECHOES', vx+vw-12, vy+18);
  ctx.textAlign = 'left';

  // Divider
  ctx.strokeStyle = '#331144'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(vx+10, vy+26); ctx.lineTo(vx+vw-10, vy+26); ctx.stroke();

  // Tabs — full-width row
  const tabY = vy + 32;
  const tabH = 20;
  const tabW = Math.floor((vw - 4) / VAULT_TABS.length);
  VAULT_TABS.forEach((tab, i) => {
    const tx = vx + i * tabW;
    const active = vaultTab === i;
    ctx.fillStyle = active ? '#220033' : '#0a0510';
    ctx.fillRect(tx, tabY, tabW, tabH);
    ctx.strokeStyle = active ? '#cc88ff' : '#441166';
    ctx.lineWidth = active ? 2 : 1;
    ctx.strokeRect(tx, tabY, tabW, tabH);
    ctx.font = '7px "Press Start 2P"';
    ctx.fillStyle = active ? '#cc88ff' : '#553366';
    ctx.textAlign = 'center';
    ctx.fillText(tab, tx + tabW/2, tabY + 13);
  });
  ctx.textAlign = 'left';

  // Tab underline hint
  ctx.font = '5px "Press Start 2P"';
  ctx.fillStyle = '#442255';
  ctx.textAlign = 'center';
  ctx.fillText('A / D  to switch tabs', W/2, tabY + tabH + 10);
  ctx.textAlign = 'left';

  const contentY = tabY + tabH + 16;
  const contentH = vh - (contentY - vy) - 20;

  if (vaultTab === 0)      drawVaultScreenClass(vx, contentY, vw, contentH);
  else if (vaultTab === 1) drawVaultScreenPerks(vx, contentY, vw, contentH);
  else                     drawVaultScreenRecords(vx, contentY, vw, contentH);

  // Footer
  ctx.font = '5px "Press Start 2P"';
  ctx.fillStyle = '#331144';
  ctx.textAlign = 'center';
  ctx.fillText('ESC \u2014 close vault', W/2, vy + vh - 6);
  ctx.textAlign = 'left';
}

// ── CLASS TAB ─────────────────────────────────────────────
function drawVaultScreenClass(x, y, w, h) {
  const classes = Object.values(CLASS_DEFS);
  const PAD = 14;
  // Left panel: list
  const listW = Math.floor(w * 0.38);
  const detailX = x + listW + 2;
  const detailW = w - listW - 4;
  const rowH = 28;

  classes.forEach((cls, i) => {
    const ry = y + i * rowH;
    const hovered = vaultCursor === i;
    const selected = META.selectedClass === cls.id;
    const unlocked = META.unlockedClasses.includes(cls.id);

    // Row bg
    ctx.fillStyle = hovered ? '#1e0830' : selected ? '#150525' : '#080510';
    ctx.fillRect(x, ry, listW, rowH - 2);

    // Left accent bar
    ctx.fillStyle = hovered || selected ? cls.color : '#330044';
    ctx.fillRect(x, ry, 3, rowH - 2);

    // Cursor arrow
    if (hovered) {
      ctx.font = '7px "Press Start 2P"';
      ctx.fillStyle = '#cc88ff';
      ctx.fillText('\u25b6', x + 6, ry + 18);
    }

    // Name
    ctx.font = '7px "Press Start 2P"';
    ctx.fillStyle = unlocked ? cls.color : '#443355';
    ctx.fillText(cls.name, x + 18, ry + 12);

    // Status tag
    ctx.font = '5px "Press Start 2P"';
    if (selected) {
      ctx.fillStyle = cls.color;
      ctx.fillText('\u2713 ACTIVE', x + 18, ry + 22);
    } else if (unlocked) {
      ctx.fillStyle = '#553366';
      ctx.fillText('unlocked', x + 18, ry + 22);
    } else {
      ctx.fillStyle = '#cc88ff';
      ctx.fillText('\u25c6 ' + cls.cost, x + 18, ry + 22);
    }

    // Divider
    ctx.strokeStyle = '#1a0828'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, ry + rowH - 1); ctx.lineTo(x + listW, ry + rowH - 1); ctx.stroke();
  });

  // Detail panel — show hovered class
  const cls = classes[Math.max(0, Math.min(vaultCursor, classes.length-1))];
  if (cls) {
    const dp = detailX + 12;
    let cy2 = y + 10;

    ctx.fillStyle = '#0a0512';
    ctx.fillRect(detailX, y, detailW - 2, h);
    ctx.strokeStyle = '#331144'; ctx.lineWidth = 1;
    ctx.strokeRect(detailX, y, detailW - 2, h);

    // Class name
    ctx.font = '8px "Press Start 2P"';
    ctx.fillStyle = cls.color;
    ctx.fillText(cls.name, dp, cy2 + 10); cy2 += 26;

    // Lore line
    ctx.font = '6px "Press Start 2P"';
    ctx.fillStyle = '#554466';
    wrapText(cls.lore, dp, cy2, detailW - 28, 10, '#554466', '5px'); cy2 += 28;

    // Divider
    ctx.strokeStyle = '#221133';
    ctx.beginPath(); ctx.moveTo(dp, cy2); ctx.lineTo(detailX + detailW - 14, cy2); ctx.stroke();
    cy2 += 12;

    // Stats
    const st = cls.stats;
    const statRows = [
      ['HP',    st.hp,      '#ff6688'],
      ['OIL DRAIN', 'x' + st.oilMult.toFixed(1), st.oilMult > 1 ? '#ff8844' : '#44ffaa'],
      ['DASH CD', st.dashCooldown === 0 ? 'NONE' : st.dashCooldown + 'ms', st.dashCooldown === 0 ? '#44ffaa' : '#aaaaaa'],
      ['LIGHT', (st.lightBonus >= 0 ? '+' : '') + st.lightBonus, st.lightBonus > 0 ? '#ffdd44' : st.lightBonus < 0 ? '#ff4466' : '#aaaaaa'],
    ];
    ctx.font = '6px "Press Start 2P"';
    for (const [label, val, col2] of statRows) {
      ctx.fillStyle = '#664477';
      ctx.fillText(label, dp, cy2);
      ctx.fillStyle = col2;
      ctx.textAlign = 'right';
      ctx.fillText(String(val), detailX + detailW - 16, cy2);
      ctx.textAlign = 'left';
      cy2 += 14;
    }

    cy2 += 6;
    // Desc
    wrapText(cls.desc, dp, cy2, detailW - 28, 10, '#887799', '5px');
    cy2 += 36;

    // Divider
    ctx.strokeStyle = '#221133';
    ctx.beginPath(); ctx.moveTo(dp, cy2); ctx.lineTo(detailX + detailW - 14, cy2); ctx.stroke();
    cy2 += 14;

    // Action
    const unlocked = META.unlockedClasses.includes(cls.id);
    const isSelected = META.selectedClass === cls.id;
    if (isSelected) {
      ctx.font = '6px "Press Start 2P"'; ctx.fillStyle = cls.color;
      ctx.fillText('\u2713 ACTIVE CLASS', dp, cy2);
    } else if (unlocked) {
      ctx.font = '6px "Press Start 2P"'; ctx.fillStyle = '#44ffaa';
      ctx.fillText('ENTER  \u2014  select this class', dp, cy2);
    } else {
      const canAfford = META.echoes >= cls.cost;
      ctx.font = '6px "Press Start 2P"';
      ctx.fillStyle = canAfford ? '#ffdd44' : '#ff4444';
      ctx.fillText('ENTER  \u2014  unlock  (\u25c6 ' + cls.cost + ')', dp, cy2);
      if (!canAfford) {
        ctx.fillStyle = '#553344'; cy2 += 12;
        ctx.font = '5px "Press Start 2P"';
        ctx.fillText('need ' + (cls.cost - META.echoes) + ' more echoes', dp, cy2);
      }
    }
  }
}

// ── PERKS TAB ─────────────────────────────────────────────
// Single scrollable list on left, detail panel on right
function drawVaultScreenPerks(x, y, w, h) {
  const perks = Object.values(PERK_DEFS);
  const rowH = 26;
  const visRows = Math.floor((h - 30) / rowH);
  const listW = Math.floor(w * 0.45);
  const detailX = x + listW + 2;
  const detailW = w - listW - 4;

  // Scroll so selected row stays visible
  const scrollStart = Math.max(0, vaultCursor - Math.floor(visRows / 2));
  const scrollEnd = scrollStart + visRows;

  // Clip list panel
  ctx.save();
  ctx.beginPath(); ctx.rect(x, y, listW, h - 28); ctx.clip();

  perks.forEach((perk, i) => {
    if (i < scrollStart || i >= scrollEnd) return;
    const ry = y + (i - scrollStart) * rowH;
    const hovered   = vaultCursor === i;
    const equipped  = META.equippedPerks.includes(perk.id);
    const owned     = META.unlockedPerks.includes(perk.id);
    const locked    = !!(perk.lockedUntil && !META.achievementsUnlocked.includes(perk.lockedUntil));

    // Row bg
    ctx.fillStyle = hovered ? '#1e0830' : equipped ? '#150520' : '#080510';
    ctx.fillRect(x, ry, listW, rowH - 2);

    // Left accent
    ctx.fillStyle = equipped ? perk.color : hovered ? '#aa55ff' : locked ? '#221133' : owned ? '#553377' : '#332244';
    ctx.fillRect(x, ry, 3, rowH - 2);

    // Cursor arrow
    if (hovered) {
      ctx.font = '7px "Press Start 2P"'; ctx.fillStyle = '#cc88ff';
      ctx.fillText('\u25b6', x + 5, ry + 17);
    }

    // Name
    ctx.font = '6px "Press Start 2P"';
    ctx.fillStyle = locked ? '#332244' : owned ? (equipped ? perk.color : '#cc99ee') : '#664466';
    ctx.fillText(perk.name, x + 17, ry + 11);

    // Status tag
    ctx.font = '5px "Press Start 2P"';
    if (locked) {
      ctx.fillStyle = '#331133';
      ctx.fillText('LOCKED', x + 17, ry + 21);
    } else if (equipped) {
      ctx.fillStyle = perk.color;
      ctx.fillText('\u2713 EQUIPPED', x + 17, ry + 21);
    } else if (owned) {
      ctx.fillStyle = '#553366';
      ctx.fillText('owned', x + 17, ry + 21);
    } else {
      ctx.fillStyle = '#cc88ff';
      ctx.fillText('\u25c6 ' + perk.cost, x + 17, ry + 21);
    }

    // Divider
    ctx.strokeStyle = '#1a0828'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, ry + rowH - 1); ctx.lineTo(x + listW, ry + rowH - 1); ctx.stroke();
  });
  ctx.restore();

  // Scroll indicator
  if (perks.length > visRows) {
    ctx.font = '5px "Press Start 2P"'; ctx.fillStyle = '#442255'; ctx.textAlign = 'center';
    const pct = scrollStart / Math.max(1, perks.length - visRows);
    ctx.fillText('\u2191\u2193  ' + (vaultCursor+1) + '/' + perks.length, x + listW/2, y + h - 18);
    ctx.textAlign = 'left';
  }

  // Equipped bar at bottom of list
  const barY = y + h - 14;
  ctx.font = '5px "Press Start 2P"';
  ctx.fillStyle = '#553366';
  ctx.fillText('EQUIPPED (' + META.equippedPerks.length + '/3):', x, barY);
  let bx = x + 108;
  if (META.equippedPerks.length === 0) {
    ctx.fillStyle = '#331144'; ctx.fillText('none', bx, barY);
  } else {
    for (const pid of META.equippedPerks) {
      const pd = PERK_DEFS[pid]; if (!pd) continue;
      ctx.fillStyle = pd.color;
      ctx.fillText(pd.name, bx, barY);
      bx += ctx.measureText(pd.name).width + 12;
    }
  }

  // ── Detail panel ──────────────────────────────────────
  const perk = perks[Math.max(0, Math.min(vaultCursor, perks.length-1))];
  if (!perk) return;
  const dp = detailX + 12;
  let cy2 = y + 10;

  ctx.fillStyle = '#0a0512';
  ctx.fillRect(detailX, y, detailW - 2, h);
  ctx.strokeStyle = '#331144'; ctx.lineWidth = 1;
  ctx.strokeRect(detailX, y, detailW - 2, h);

  const equipped  = META.equippedPerks.includes(perk.id);
  const owned     = META.unlockedPerks.includes(perk.id);
  const locked    = !!(perk.lockedUntil && !META.achievementsUnlocked.includes(perk.lockedUntil));

  // Perk name
  ctx.font = '8px "Press Start 2P"';
  ctx.fillStyle = locked ? '#443355' : owned ? perk.color : '#664466';
  ctx.fillText(perk.name, dp, cy2 + 10); cy2 += 26;

  // Status badge
  ctx.font = '6px "Press Start 2P"';
  if (equipped) {
    ctx.fillStyle = perk.color;
    ctx.fillText('\u2713 EQUIPPED', dp, cy2); cy2 += 16;
  } else if (owned) {
    ctx.fillStyle = '#44ffaa';
    ctx.fillText('OWNED', dp, cy2); cy2 += 16;
  } else if (locked) {
    ctx.fillStyle = '#553355';
    ctx.fillText('\u25a0 LOCKED', dp, cy2); cy2 += 16;
  } else {
    ctx.fillStyle = '#cc88ff';
    ctx.fillText('\u25c6 ' + perk.cost + ' ECHOES', dp, cy2); cy2 += 16;
  }

  // Divider
  ctx.strokeStyle = '#221133';
  ctx.beginPath(); ctx.moveTo(dp, cy2); ctx.lineTo(detailX + detailW - 14, cy2); ctx.stroke();
  cy2 += 12;

  // Description
  wrapText(perk.desc, dp, cy2, detailW - 28, 11, '#aa88bb', '6px'); cy2 += 36;

  // Lock condition
  if (locked) {
    ctx.strokeStyle = '#221133';
    ctx.beginPath(); ctx.moveTo(dp, cy2); ctx.lineTo(detailX + detailW - 14, cy2); ctx.stroke();
    cy2 += 12;
    const achDef = ACHIEVEMENT_DEFS.find(a => a.id === perk.lockedUntil);
    ctx.font = '5px "Press Start 2P"'; ctx.fillStyle = '#553355';
    ctx.fillText('UNLOCK REQUIRES:', dp, cy2); cy2 += 11;
    if (achDef) wrapText(achDef.desc, dp, cy2, detailW - 28, 10, '#443344', '5px');
    return;
  }

  ctx.strokeStyle = '#221133';
  ctx.beginPath(); ctx.moveTo(dp, cy2); ctx.lineTo(detailX + detailW - 14, cy2); ctx.stroke();
  cy2 += 14;

  // Action
  if (!owned) {
    const canAfford = META.echoes >= perk.cost;
    ctx.font = '6px "Press Start 2P"';
    ctx.fillStyle = canAfford ? '#ffdd44' : '#ff4444';
    ctx.fillText('ENTER  \u2014  buy perk', dp, cy2); cy2 += 14;
    if (!canAfford) {
      ctx.font = '5px "Press Start 2P"'; ctx.fillStyle = '#553344';
      ctx.fillText('need ' + (perk.cost - META.echoes) + ' more echoes', dp, cy2);
    }
  } else if (equipped) {
    ctx.font = '6px "Press Start 2P"'; ctx.fillStyle = '#ff8866';
    ctx.fillText('ENTER  \u2014  unequip', dp, cy2);
  } else {
    const canEquip = META.equippedPerks.length < 3;
    ctx.font = '6px "Press Start 2P"';
    ctx.fillStyle = canEquip ? '#44ffaa' : '#ff4444';
    ctx.fillText(canEquip ? 'ENTER  \u2014  equip' : 'ENTER  \u2014  swap out', dp, cy2); cy2 += 14;
    if (!canEquip) {
      ctx.font = '5px "Press Start 2P"'; ctx.fillStyle = '#553344';
      ctx.fillText('(unequip one first)', dp, cy2);
    }
  }
}

// ── RECORDS TAB ───────────────────────────────────────────
function drawVaultScreenRecords(x, y, w, h) {
  const PAD = 14;
  const colW = Math.floor((w - 4) / 2);
  let ly = y + 8;   // left col
  let ry2 = y + 8;  // right col
  const rx = x + colW + 4;

  // Left: stats
  ctx.font = '7px "Press Start 2P"'; ctx.fillStyle = '#cc88ff';
  ctx.fillText('STATISTICS', x + PAD, ly); ly += 18;

  const stats2 = [
    ['Runs',          META.achievements.totalRuns],
    ['Kills',         META.achievements.totalKills],
    ['Gold collected',META.achievements.totalGold],
    ['Deepest depth', META.achievements.deepestDepth],
    ['Acts cleared',  META.achievements.actsCleared],
    ['Boss kills',    META.achievements.bossKills],
    ['Deaths',        META.achievements.totalDeaths],
    ['Cursed clears', META.achievements.cursedRunsCompleted],
  ];
  for (const [label, val] of stats2) {
    ctx.font = '5px "Press Start 2P"';
    ctx.fillStyle = '#775588';
    ctx.fillText(label, x + PAD, ly);
    ctx.fillStyle = '#ffdd44'; ctx.textAlign = 'right';
    ctx.fillText(String(val), x + colW - 8, ly);
    ctx.textAlign = 'left';
    ly += 13;
  }

  // Right: achievements
  ctx.font = '7px "Press Start 2P"'; ctx.fillStyle = '#cc88ff';
  ctx.fillText('ACHIEVEMENTS', rx, ry2); ry2 += 18;

  for (const def of ACHIEVEMENT_DEFS) {
    if (ry2 > y + h - 10) break;
    const done = META.achievementsUnlocked.includes(def.id);
    ctx.font = '5px "Press Start 2P"';
    ctx.fillStyle = done ? '#44ff88' : '#332244';
    ctx.fillText((done ? '\u2713 ' : '\u25a1 ') + def.label, rx, ry2);
    if (done) {
      ctx.fillStyle = '#cc88ff'; ctx.textAlign = 'right';
      ctx.fillText('+' + def.reward + '\u25c6', x + w - 8, ry2);
      ctx.textAlign = 'left';
    }
    ry2 += 13;
  }
}

function wrapText(text, x, y, maxW, lineH, color, font) {
  ctx.font = font + ' "Press Start 2P"';
  ctx.fillStyle = color;
  const words = text.split(' ');
  let line = '', cy2 = y;
  for (const word of words) {
    const test = line + (line ? ' ' : '') + word;
    if (ctx.measureText(test).width > maxW && line) {
      ctx.fillText(line, x, cy2);
      line = word; cy2 += lineH;
    } else line = test;
  }
  if (line) ctx.fillText(line, x, cy2);
}


function drawLoreMenu(timestamp) {
  ctx.fillStyle = 'rgba(0,0,0,0.92)';
  ctx.fillRect(0, 0, W, H);

  const PAD = 18;
  const mx = PAD, my = PAD;
  const mw = W - PAD*2, mh = H - PAD*2;

  // Panel bg
  ctx.fillStyle = '#060402';
  ctx.fillRect(mx, my, mw, mh);
  ctx.strokeStyle = '#ff9900';
  ctx.lineWidth = 2;
  ctx.strokeRect(mx, my, mw, mh);
  ctx.strokeStyle = '#3a1800';
  ctx.lineWidth = 1;
  ctx.strokeRect(mx+5, my+5, mw-10, mh-10);

  // Corner gems
  for (const [cx2,cy2] of [[mx+9,my+9],[mx+mw-17,my+9],[mx+9,my+mh-17],[mx+mw-17,my+mh-17]]) {
    ctx.fillStyle = '#ff6600'; ctx.fillRect(cx2, cy2, 8, 8);
    ctx.fillStyle = '#ffaa44'; ctx.fillRect(cx2+1, cy2+1, 3, 3);
  }

  // Title
  ctx.font = '13px "Press Start 2P"';
  ctx.fillStyle = '#ff9900';
  ctx.textAlign = 'center';
  ctx.fillText('∞  DELVE', W/2, my + 34);
  ctx.font = '7px "Press Start 2P"';
  ctx.fillStyle = '#664400';
  ctx.fillText('THE INFINITE DARK', W/2, my + 50);

  // Tab bar
  const THEADER = 62;
  const tabCount = LORE_TABS.length;
  const tabW = Math.floor((mw - 20) / tabCount);
  const tabH = 26;
  const tabY = my + THEADER;
  const tabStartX = mx + 10;

  LORE_TABS.forEach((tab, i) => {
    const tx = tabStartX + i * tabW;
    const active = i === loreTab;
    ctx.fillStyle = active ? '#1e0e00' : '#0c0600';
    ctx.fillRect(tx, tabY, tabW - 3, tabH);
    ctx.strokeStyle = active ? '#ff9900' : '#442200';
    ctx.lineWidth = active ? 2 : 1;
    ctx.strokeRect(tx, tabY, tabW - 3, tabH);
    ctx.font = '8px "Press Start 2P"';
    ctx.fillStyle = active ? '#ffcc44' : '#664400';
    ctx.textAlign = 'center';
    ctx.fillText(tab, tx + (tabW-3)/2, tabY + 17);
  });

  // Content clip region
  const contentX = mx + 18;
  const contentY = tabY + tabH + 10;
  const contentW = mw - 36;
  const contentH = mh - (contentY - my) - 28;

  ctx.save();
  ctx.beginPath();
  ctx.rect(contentX, contentY, contentW, contentH);
  ctx.clip();

  ctx.textAlign = 'left';
  const scroll = loreScrolls[loreTab];
  const drawY = contentY - scroll;

  if (loreTab === 0) drawLoreTabLore(contentX, drawY, contentW);
  else if (loreTab === 1) drawLoreTabStory(contentX, drawY, contentW);
  else if (loreTab === 2) drawLoreTabControls(contentX, drawY, contentW);
  else if (loreTab === 3) drawLoreTabCombat(contentX, drawY, contentW);
  else if (loreTab === 4) drawLoreTabEnemies(contentX, drawY, contentW);
  else if (loreTab === 5) drawLoreTabItems(contentX, drawY, contentW);
  else if (loreTab === 6) drawLoreTabBiomes(contentX, drawY, contentW);
  else if (loreTab === 7) drawLoreTabModes(contentX, drawY, contentW);
  else if (loreTab === 8) drawLoreTabCombos(contentX, drawY, contentW);

  ctx.restore();

  // Scroll hint
  ctx.font = '6px "Press Start 2P"';
  ctx.fillStyle = '#442200';
  ctx.textAlign = 'center';
  ctx.fillText('SCROLL TO READ MORE   ◄ A / D ► TABS   ESC CLOSE', W/2, my + mh - 10);
  ctx.textAlign = 'left';
}

// ── helpers ──────────────────────────────────────────────────
function lSec(title, color, x, cy) {
  ctx.font = '9px "Press Start 2P"';
  ctx.fillStyle = color;
  ctx.fillText(title, x, cy); cy += 8;
  ctx.fillStyle = color.replace(/[^,]+(?=\))/, '0.3');
  ctx.fillStyle = '#331a00';
  ctx.fillRect(x, cy, 9999, 1); cy += 12;
  return cy;
}

function lLine(text, x, cy, color, size, gap) {
  ctx.font = `${size}px "Press Start 2P"`;
  ctx.fillStyle = color;
  ctx.fillText(text, x, cy);
  return cy + gap;
}

function drawLoreTabStory(x, cy, w) {
  cy = lSec('MAREN', '#aaddff', x, cy);

    'of dark places. That was always the problem.',

  for (const l of intro) {

  }
  cy += 16;

  const acts = [
    { num:1, col:'#cc8855', title:'ACT I — THE UPPER DARK',
      lines:["The dungeon is old. Older than the city above it.", "Rooms generate ahead of your lantern and seal behind you.", "The Warden has been at its post for centuries.", "It does not know what it is guarding. It guards anyway."] },
    { num:2, col:'#aa7799', title:'ACT II — THE CRYPT',
      lines:["Someone buried their dead here with great care and great fear.", "The dead did not stay buried.", "Maren's sword is here. Snapped. The blood on the hilt is not hers.", "The Bone Sovereign collects what it finds."] },
    { num:3, col:'#558844', title:'ACT III — THE LIVING DARK',
      lines:["The cave breathes. Not like wind. Like lungs.", "Words in Maren's hand: do not follow me.", "The Hollow is not a creature. It is a cavity given hunger.", "You keep walking."] },
    { num:4, col:'#4488aa', title:'ACT IV — THE VAULT',
      lines:["The Ice Vault is not a dungeon. It is a prison.", "Something was sealed here before the dungeon existed.", "You find Maren. Frozen. Standing upright. Eyes open.", "The ice is keeping her alive. Barely."] },
    { num:5, col:'#8844aa', title:'ACT V — THE BOTTOM',
      lines:["This is the bottom. There is nothing below this.", "The Abyss does not move toward you. It does not need to.", "It has been pulling everything toward itself for longer than the dungeon existed.", "You raise your sword."] },

  for (const act of acts) {

      cy = lLine(l, x+8, cy, cleared ? '#667755' : current ? '#446688' : '#332222', 6, 13);
    }
    cy += 14;
  }

function applyUpgrades() {
  tileCacheDirty = true; // light radius may change
  player.lightRadius = 7 + (player._classLightBonus || 0) + getUpgradeValue('light') * 2 + (hasPerk('echo_sight') ? 1 : 0);
  const speedLvl = getUpgradeValue('speed');
  player.moveDelay   = Math.max(60, 150 - speedLvl * 20);
  player.sprintDelay = Math.max(30, 60  - speedLvl * 8);
  player.attackDamage = 1 + getUpgradeValue('sword');
  player.attackCooldownMax = Math.max(150, 300 - getUpgradeValue('attackspeed') * 50);
  player.armor = getUpgradeValue('armor') + (player._perkArmor || 0);
  player.chargeMax = Math.max(300, 600 - getUpgradeValue('attackspeed') * 100);
  // Hardcore: less max HP, but armor still helps a bit
  player.maxHp = gameMode === 'hardcore'
    ? 12 + getUpgradeValue('armor') * 2
    : 20 + getUpgradeValue('armor') * 4;
}

function useBoost(idx) {
  const b = boostInventory[idx];
  if (!b) return;
  boostInventory.splice(idx, 1);
  if (boostCursor >= boostInventory.length) boostCursor = Math.max(0, boostInventory.length - 1);
  switch (b.id) {
    case 'hp50':      { const h=Math.min(50,player.maxHp-player.hp); player.hp+=h; spawnFloatText(player.wx,player.wy-1,`+${h}HP`,'#ff4466'); break; }
    case 'hp_full':   { player.hp=player.maxHp; spawnFloatText(player.wx,player.wy-1,'FULL HP!','#ff88aa'); break; }

  const bw=480, bh=380;

  } else {

    const rows=Math.ceil(boostInventory.length/perRow);
    const totalH=rows*(slotH+gap)-gap;
    const startY=by+bh/2-totalH/2;

    boostInventory.forEach((b2,i)=>{
      const col=i%perRow, row=Math.floor(i/perRow);
      const sx2=bx+bw/2-perRow*(slotW+gap)/2 + col*(slotW+gap);
      const sy2=startY+row*(slotH+gap);
      const sel=i===boostCursor;
      const pulse=sel?0.6+Math.sin(timestamp*0.006)*0.4:0;

      ctx.fillStyle=sel?'#0a1810':'#050a08';
      ctx.fillRect(sx2,sy2,slotW,slotH);
      ctx.strokeStyle=sel?b2.color:'#113322'; ctx.lineWidth=sel?2:1;

      ctx.fillRect(sx2+2,sy2+2,16,12);
      ctx.font='5px "Press Start 2P"';
      ctx.fillStyle='#44ffaa';

      // ENTER hint on selected
      if(sel){
        ctx.fillStyle=b2.color;
        ctx.fillText('[ ENTER = USE NOW ]',sx2+8,sy2+slotH-10);
      }
    });
  }

  ctx.font='5px "Press Start 2P"';
  ctx.fillStyle='#224433';
  ctx.textAlign='center';
  ctx.fillText('A/D: SELECT     ENTER: USE     Z/ESC: CLOSE', W/2, by+bh-10);

function rollMerchantStock(seedWx, seedWy) {
  // Deterministic seed based on position only — never changes for same merchant
  const rng2 = mulberry32((seedWx * 999) ^ (seedWy * 777) ^ 0xDEADBEEF);

  function pickFrom(pool, count) {
    const remaining = [...pool];
    const picked = [];
    while (picked.length < count && remaining.length > 0) {
      const totalW = remaining.reduce((s, i) => s + i.weight, 0);
      let roll = rng2() * totalW;
      for (let i = 0; i < remaining.length; i++) {
        roll -= remaining[i].weight;
        if (roll <= 0) {
          picked.push({ ...remaining[i], bought: false });
          remaining.splice(i, 1);
          break;
        }
      }
    }
    return picked;
  }

  const consumables = MERCHANT_ITEMS.filter(i => i.type === 'consumable');
  const boosts      = MERCHANT_ITEMS.filter(i => i.type === 'boost');
  const exclusives  = MERCHANT_ITEMS.filter(i => i.type === 'exclusive');

  return [
    ...pickFrom(consumables, 2),
    ...pickFrom(boosts, 2),
    ...pickFrom(exclusives, 2),
  ];
}

function applyMerchantItem(item) {
  if (item.bought) return;
  if (gold < item.cost) { spawnFloatText(player.wx, player.wy-1, 'NOT ENOUGH GOLD', '#ff4444'); return; }
  gold -= item.cost;
  item.bought = true;

  // BOOST: add to inventory instead of using now
  if (item.type === 'boost') {
    boostInventory.push({ ...BOOST_DEFS[item.boostId], id: item.boostId });
    spawnFloatText(player.wx, player.wy-1, item.name + ' SAVED!', '#88ffdd');
    triggerFlash('#88ffdd22', 200);
    return;
  }

  switch (item.id) {
    case 'm_health':  { const h=Math.ceil(player.maxHp*0.75); player.hp=Math.min(player.maxHp,player.hp+h); spawnFloatText(player.wx,player.wy-1,`+${h}HP`,'#ff4466'); break; }

    case 'm_bombs6':  { bombCount+=6; spawnFloatText(player.wx,player.wy-1,'+6 BOMBS','#ff8800'); break; }
    case 'm_bones':   { boneCount+=3; spawnFloatText(player.wx,player.wy-1,'+3 BONES','#ccbbaa'); break; }
    case 'void_cloak':{ player.voidCloaks+=3; spawnFloatText(player.wx,player.wy-1,'VOID CLOAK x3','#aa88ff'); setTimeout(checkSynergyDiscovery,100); break; }
    case 'blood_charm':{ player.bloodCharm=true; spawnFloatText(player.wx,player.wy-1,'BLOOD CHARM!','#ff2244'); setTimeout(checkSynergyDiscovery,100); break; }

    case 'cursed_shard':{ player.cursedBlade=true; spawnFloatText(player.wx,player.wy-1,'CURSED BLADE!','#cc44ff'); setTimeout(checkSynergyDiscovery,100); break; }
    case 'purify_tonic':{ player.darkPatchTimer=0; player.icePatchTimer=0; spawnFloatText(player.wx,player.wy-1,'PURIFIED!','#88ffff'); break; }
    case 'gold_magnet': { player.goldMagnetTimer=120000; spawnFloatText(player.wx,player.wy-1,'GOLD MAGNET!','#ffdd44'); break; }
    case 'oil_filter':  { player.oilFilterTimer=60000; spawnFloatText(player.wx,player.wy-1,'OIL FILTER!','#ff9900'); break; }
    case 'warp_stone':  { player.wx=2;player.wy=2;spawnFloatText(2,2,'WARPED!','#aaaaff');banners.push({text:'WARPED TO ENTRANCE',color:'#aaaaff',life:3000,maxLife:3000}); break; }
    case 'spider_ring': { player.spiderRing=true; spawnFloatText(player.wx,player.wy-1,'SPIDER RING!','#44ff44'); setTimeout(checkSynergyDiscovery,100); break; }
    case 'shadow_cloak':{ player.shadowCloak=true; spawnFloatText(player.wx,player.wy-1,'SHADOW CLOAK!','#6644aa'); setTimeout(checkSynergyDiscovery,100); break; }
    case 'lava_boots':  { player.lavaBoots=true; spawnFloatText(player.wx,player.wy-1,'LAVA BOOTS!','#ff4400'); break; }
    case 'wraith_ward': { player.wraithWard=true; spawnFloatText(player.wx,player.wy-1,'WRAITH WARD!','#4488ff'); break; }
    case 'bone_shield': { player.boneShield=true; spawnFloatText(player.wx,player.wy-1,'BONE SHIELD!','#ccbbaa'); break; }

  triggerFlash('#ffffff11', 200);
}

function revealSecretRooms() {
  const pcx = Math.floor(player.wx/CHUNK), pcy = Math.floor(player.wy/CHUNK);
  for (let dy=-1;dy<=1;dy++) for (let dx=-1;dx<=1;dx++) {
    const ch = getChunk(pcx+dx, pcy+dy);
    if (ch.secretRoom && !ch.secretRoom.broken) {
      const swx = (pcx+dx)*CHUNK + ch.secretRoom.wallLx;
      const swy = (pcy+dy)*CHUNK + ch.secretRoom.wallLy;
      markExplored(swx, swy);
      spawnFloatText(swx, swy, '🔍 SECRET!', '#ffddaa');
    }
  }
}

// ─── Input ───────────────────────────────────────────────────
const keys = {};
document.addEventListener('click', () => { SFX.init(); SFX.resume(); if (!MUSIC.running && SFX.ctx && SFX.master) MUSIC.init(SFX.ctx, SFX.master); });
document.addEventListener('keydown', e => {
  SFX.init(); SFX.resume();
  if (!MUSIC.running && SFX.ctx && SFX.master) MUSIC.init(SFX.ctx, SFX.master);
  keys[e.key] = true;
  e.preventDefault();
  if (e.key === 'Tab' && ghost && ghost.active) { skipGhost(); return; }

  // ── Start menu ──────────────────────────────────────────────
  if (!gameStarted) {
    // Vault navigation
    if (vaultOpen) {
      if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
        if (vaultTab > 0) { vaultTab--; vaultCursor = 0; }
      } else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
        if (vaultTab < VAULT_TABS.length - 1) { vaultTab++; vaultCursor = 0; }
      } else if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
        if (vaultTab === 0) vaultCursor = Math.max(0, vaultCursor - 1);
        else if (vaultTab === 1) vaultCursor = Math.max(0, vaultCursor - 3);
      } else if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') {
        const maxC = vaultTab === 0 ? 2 : Object.keys(PERK_DEFS).length - 1;
        if (vaultTab === 0) vaultCursor = Math.min(maxC, vaultCursor + 1);
        else if (vaultTab === 1) vaultCursor = Math.min(maxC, vaultCursor + 3);
      } else if (e.key === 'Enter' || e.key === ' ') {
        if (vaultTab === 0) {
          // Class tab — buy or select
          const classes = Object.values(CLASS_DEFS);
          const cls3 = classes[vaultCursor];
          if (cls3) {
            if (META.unlockedClasses.includes(cls3.id)) {
              META.selectedClass = cls3.id;
              SFX.play('menu_confirm');
            } else if (META.echoes >= cls3.cost) {
              META.echoes -= cls3.cost;
              META.echoesSpent += cls3.cost;
              META.unlockedClasses.push(cls3.id);
              META.selectedClass = cls3.id;
              SFX.play('menu_confirm');
              banners.push({ text: cls3.name + ' UNLOCKED!', color: cls3.color, life: 3000, maxLife: 3000 });
            } else {
              SFX.play('hurt');
              banners.push({ text: 'NOT ENOUGH ECHOES', color: '#ff4444', life: 2000, maxLife: 2000 });
            }
            metaSave();
          }
        } else if (vaultTab === 1) {
          // Perks tab — buy or equip/unequip
          const perks2 = Object.values(PERK_DEFS);
          const perk2 = perks2[vaultCursor];
          if (!perk2) return;
          const locked2 = perk2.lockedUntil && !META.achievementsUnlocked.includes(perk2.lockedUntil);
          if (locked2) { SFX.play('hurt'); return; }
          if (!META.unlockedPerks.includes(perk2.id)) {
            // Buy
            if (META.echoes >= perk2.cost) {
              META.echoes -= perk2.cost;
              META.echoesSpent += perk2.cost;
              META.unlockedPerks.push(perk2.id);
              SFX.play('chest');
              banners.push({ text: perk2.name + ' UNLOCKED!', color: perk2.color, life: 3000, maxLife: 3000 });
            } else {
              SFX.play('hurt');
              banners.push({ text: 'NOT ENOUGH ECHOES', color: '#ff4444', life: 2000, maxLife: 2000 });
            }
          } else {
            // Toggle equip
            const ei = META.equippedPerks.indexOf(perk2.id);
            if (ei !== -1) {
              META.equippedPerks.splice(ei, 1);
              SFX.play('menu_move');
            } else if (META.equippedPerks.length < 3) {
              META.equippedPerks.push(perk2.id);
              SFX.play('menu_confirm');

              SFX.play('hurt');
              banners.push({ text: 'UNEQUIP A PERK FIRST (max 3)', color: '#ff4444', life: 2000, maxLife: 2000 });
            }
          }
          metaSave();
        }
      } else if (e.key === 'Escape') {
        vaultOpen = false;
      }
      return;
    }

    if (e.key === 'v' || e.key === 'V') {
      vaultOpen = true; vaultCursor = 0; SFX.play('menu_move'); return;
    }
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
      // 2x2 grid: left/right within row, wrap within row only
      startMenuCursor = startMenuCursor % 2 === 0 ? startMenuCursor : startMenuCursor - 1;
      SFX.play('menu_move');
    } else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
      startMenuCursor = startMenuCursor % 2 === 1 ? startMenuCursor : startMenuCursor + 1;
    } else if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
      startMenuCursor = startMenuCursor >= 2 ? startMenuCursor - 2 : startMenuCursor;
    } else if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') {
      startMenuCursor = startMenuCursor <= 1 ? startMenuCursor + 2 : startMenuCursor;
    } else if (e.key === 'Enter' || e.key === ' ') {
      SFX.play('menu_confirm');
      gameMode = ['easy','combat','hardcore','story'][startMenuCursor];
      gameStarted = true;
      _runKills = 0;
      applyClassAndPerks();
      applyUpgrades();
      rollCurses();
      setTimeout(applyCurses, 600);
      if (!tutorialDone()) setTimeout(initGhost, 1200);
      if (gameMode === 'story') {
        storyAct = 1;
        storyActsCleared = [];
        storyLoreCollected = [];
        victoryScreen = false;
        const _s1 = actStartTile(1);
        player.wx = _s1.wx; player.wy = _s1.wy;
        player.px = player.wx * TILE; player.py = player.wy * TILE;
        beginStoryAct(1);
      }
      loreOpen = false;
      triggerFlash('#000000', 600);
    } else if (e.key === '?' || e.key === 'h' || e.key === 'H') {
      loreOpen = !loreOpen; vaultOpen = false;
    } else if (e.key === 'Escape') {
      loreOpen = false; vaultOpen = false;
    } else if (loreOpen) {
      if (e.key === 'ArrowRight') { loreTab = (loreTab + 1) % LORE_TABS.length; loreScrolls[loreTab] = 0; }
      else if (e.key === 'ArrowLeft') { loreTab = (loreTab - 1 + LORE_TABS.length) % LORE_TABS.length; loreScrolls[loreTab] = 0; }
    }
    return;
  }

  // M = toggle sound
  if (e.key === 'm' || e.key === 'M') {
    const on = SFX.toggle();
    banners.push({ text: on ? 'SOUND ON' : 'SOUND OFF', color: '#888888', life: 1500, maxLife: 1500 });
    return;
  }

  // Lore menu toggle
  if (e.key === '?' || e.key === 'h' || e.key === 'H') {
    loreOpen = !loreOpen;
    shopOpen = false;
    return;
  }
  if (e.key === 'Escape') {
    // If quit confirm is showing — ESC cancels it
    if (quitConfirm) { quitConfirm = false; return; }
    // If any menu open — close it
    if (loreOpen || shopOpen || merchantOpen || boostOpen || inventoryOpen) {
      loreOpen = false; shopOpen = false; merchantOpen = false;
      boostOpen = false; inventoryOpen = false;
      _lastEscTime = 0;
      return;
    }
    // Double-tap ESC in-game → show quit confirm
    const now2 = Date.now();
    if (now2 - _lastEscTime < 800) {
      quitConfirm = true;
      _lastEscTime = 0;
    } else {
      _lastEscTime = now2;
    }
    return;
  }

  // Quit confirm dialogue
  if (quitConfirm) {
    if (e.key === 'Enter' || e.key === ' ') { quitConfirm = false; resetRun(); return; }
    return; // block all other keys while confirm is open
  }

  // Lore tab navigation
  if (loreOpen) {
    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
      loreTab = (loreTab + 1) % LORE_TABS.length;
      loreScrolls[loreTab] = 0;
    } else if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
      loreTab = (loreTab - 1 + LORE_TABS.length) % LORE_TABS.length;
      loreScrolls[loreTab] = 0;
    }
    return;
  }

  // Inventory toggle
  if (e.key === 'i' || e.key === 'I') {
    inventoryOpen = !inventoryOpen;
    shopOpen = false;
    loreOpen = false;
    return;
  }

  // Shop toggle
  if (e.key === 'e' || e.key === 'E') {
    shopOpen = !shopOpen;
    inventoryOpen = false;
  merchantOpen = false;
  boostInventory = [];
  boostOpen = false;
    return;
  }

  if (shopOpen) {
    const tabKey = shopTab === 0 ? 'explore' : 'weapons';
    const tabUpgrades = upgrades.filter(u => (u.tab || 'explore') === tabKey);
    if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
      shopCursor = (shopCursor - 1 + tabUpgrades.length) % tabUpgrades.length;
    } else if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') {
      shopCursor = (shopCursor + 1) % tabUpgrades.length;
    } else if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
      shopTab = 0; shopCursor = 0;
    } else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
      shopTab = 1; shopCursor = 0;
    } else if (e.key === 'Enter' || e.key === ' ') {
      const upg = tabUpgrades[shopCursor];
      if (!upg) return;
      const cost = upgradeCost(upg);
      if (upg.isBombs) {
        const _hpCost = hasCurse('bloodprice') ? cost : 0;
      if (hasCurse('bloodprice') ? player.hp > _hpCost : gold >= cost) {
        if (hasCurse('bloodprice')) player.hp -= _hpCost; else gold -= cost;
        bombCount += 3; spawnFloatText(player.wx, player.wy-1, '+3 BOMBS', '#ff8800'); }
      } else if (upg.tab === 'weapons' && upg.level > 0) {
        // Already owned — equip it
        const wid = upg.id === 'torch_weapon' ? 'torch_weapon' : upg.id === 'bow' ? 'bow' : 'sword';
        player.weapon = wid;
        spawnFloatText(player.wx, player.wy-1, upg.name + ' EQUIPPED!', '#ffaa44');
      } else if (upg.level < upg.maxLevel) {
        const canBuy = hasCurse('bloodprice') ? player.hp > cost : gold >= cost;
        if (canBuy) {
          if (hasCurse('bloodprice')) {
            player.hp -= cost;
            spawnFloatText(player.wx, player.wy-1, '-' + cost + ' HP', '#ff4466');
          } else {
            gold -= cost;
          }
          upg.level++;
          applyUpgrades();
          if (upg.tab === 'weapons' && upg.level === 1) {
            player.weapon = upg.id === 'torch_weapon' ? 'torch_weapon' : upg.id === 'bow' ? 'bow' : 'sword';
          }
          spawnFloatText(player.wx, player.wy-1, upg.name + ' LVL ' + upg.level + '!', '#ffcc44');
        } else {
          const msg = hasCurse('bloodprice') ? 'NOT ENOUGH HP' : 'NOT ENOUGH GOLD';
          spawnFloatText(player.wx, player.wy-1, msg, '#ff4444');
        }
      }
    }
    return;
  }

  // Cutscene advance
  if (storyCutscene && (e.key === ' ' || e.key === 'Enter')) {
    advanceCutscene();
    return;
  }
  // Victory screen — return to menu
  if (victoryScreen && (e.key === 'Enter' || e.key === ' ')) {
    victoryScreen = false;
    resetRun();
    return;
  }

  // Z = open/close boost inventory
  if (e.key === 'z' || e.key === 'Z') {
    boostOpen = !boostOpen;
    shopOpen = false; loreOpen = false; merchantOpen = false; inventoryOpen = false;
    return;
  }

  // Boost overlay navigation
  if (boostOpen) {
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
      boostCursor = (boostCursor - 1 + Math.max(1,boostInventory.length)) % Math.max(1,boostInventory.length);
    } else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
      boostCursor = (boostCursor + 1) % Math.max(1,boostInventory.length);
    } else if (e.key === 'Enter' || e.key === ' ') {
      useBoost(boostCursor);
    } else if (e.key === 'Escape') {
      boostOpen = false;
    }
    return;
  }

  // Merchant navigation
  if (merchantOpen) {
    if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
      merchantCursor = (merchantCursor - 1 + merchantStock.length) % merchantStock.length;
    } else if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') {
      merchantCursor = (merchantCursor + 1) % merchantStock.length;
    } else if (e.key === 'Enter' || e.key === ' ') {
      const item = merchantStock[merchantCursor];
      if (item) applyMerchantItem(item);
    } else if (e.key === 'e' || e.key === 'E' || e.key === 'Escape') {
      merchantOpen = false;
  boostInventory = [];
  boostOpen = false;
    }
    return;
  }

  // Inventory navigation
  if (inventoryOpen) {
    const owned = getOwnedWeapons();
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
      invCursor = (invCursor - 1 + owned.length) % owned.length;
    } else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
      invCursor = (invCursor + 1) % owned.length;
    } else if (e.key === 'Enter' || e.key === ' ') {
      const sel = owned[invCursor];
      if (sel) { player.weapon = sel.id; spawnFloatText(player.wx, player.wy - 1, sel.label + ' EQUIPPED!', sel.color); }
    }
    return;
  }

  // Combat keys (blocked in menus)
  if (!shopOpen && !loreOpen && !inventoryOpen && !merchantOpen && !boostOpen && !storyCutscene && !victoryScreen) {
    // SPACE release = attack (or fire charged)
    if (e.key === ' ') { doAttack(); return; }
    // F = ground pound
    if (e.key === 'f' || e.key === 'F') { doGroundPound(); return; }
    // V = dash
    if (e.key === 'v' || e.key === 'V') { doDash(); return; }
    // X = parry
    if (e.key === 'x' || e.key === 'X') { doParry(); return; }
    // G = throw bomb
    if (e.key === 'g' || e.key === 'G') { throwBomb(); return; }
    // B = throw bone &nbsp;|&nbsp; Z = boost inventory (if you have any)
    if (e.key === 'b' || e.key === 'B') { throwBone(); return; }
    // Q = bow shot (if holding bow)
    if (e.key === 'q' || e.key === 'Q') {
      if (player.weapon === 'bow') fireBowShot(false);
      return;
    }
    // 1/2/3 = quick equip sword/torch/bow
    if (e.key === '1') { player.weapon = 'sword'; spawnFloatText(player.wx, player.wy-1, 'SWORD', '#ffdd44'); return; }
    if (e.key === '2') { if (getUpgradeValue('torch_weapon') > 0) { player.weapon = 'torch_weapon'; spawnFloatText(player.wx, player.wy-1, 'TORCH', '#ff6600'); } return; }
    if (e.key === '3') { if (getUpgradeValue('bow') > 0) { player.weapon = 'bow'; spawnFloatText(player.wx, player.wy-1, 'BOW', '#88ccff'); } return; }
  }
});

// ─── Torch flicker ───────────────────────────────────────────
let torchTime = 0;
function torchFlicker(seed, t) {
  const s = Math.sin(t * 0.003 + seed * 7.3) * 0.3 +
            Math.sin(t * 0.007 + seed * 3.1) * 0.2 +
            Math.sin(t * 0.013 + seed * 1.7) * 0.1;
  return 0.7 + s * 0.3;
}

const miniW = 120, miniH = 90;
const miniCanvas = document.createElement('canvas');
miniCanvas.width = miniW; miniCanvas.height = miniH;
const miniCtx = miniCanvas.getContext('2d');

// ─── Tile layer cache ─────────────────────────────────────────
// Offscreen canvas holding raw tile colors (no lighting).
// Redrawn only when the camera's integer tile position changes.
const tileCache = document.createElement('canvas');
tileCache.width = W + TILE * 2;   // one tile bleed on each side
tileCache.height = H + TILE * 2;
const tcCtx = tileCache.getContext('2d');
let tileCacheDirty = true;
let tcLastTx = -9999, tcLastTy = -9999; // camera tile offset when last drawn
let tcLastExploredSize = 0;              // invalidate when new tiles explored

function drawMinimap() {
  const visionBonus = getUpgradeValue('vision');
  const scale = 2 + visionBonus; // bigger minimap view with vision upgrades
  miniCtx.fillStyle = '#000';
  miniCtx.fillRect(0, 0, miniW, miniH);
  const offX = Math.floor(player.wx - miniW/scale/2);
  const offY = Math.floor(player.wy - miniH/scale/2);
  for (let my = 0; my < miniH/scale; my++) {
    for (let mx = 0; mx < miniW/scale; mx++) {
      const wx = offX + mx, wy = offY + my;
      const k = `${wx},${wy}`;
      if (!explored.has(k)) continue;
      const t = getTile(wx, wy);
      if (t === T.WALL) miniCtx.fillStyle = '#221500';
      else if (t === T.FLOOR) miniCtx.fillStyle = '#996633';
      else miniCtx.fillStyle = '#664422';
      miniCtx.fillRect(mx*scale, my*scale, scale, scale);
    }
  }
  // Draw discovered landmarks as purple dots with label
  miniCtx.font = `${Math.max(4, scale+1)}px "Press Start 2P"`;
  for (const [, lm] of discoveredLandmarks) {
    if (!lm.discovered) continue;
    const mdx = (lm.wx - offX) * scale;
    const mdy = (lm.wy - offY) * scale;
    if (mdx < 0 || mdx > miniW || mdy < 0 || mdy > miniH) continue;
    miniCtx.fillStyle = '#cc88ff';
    miniCtx.fillRect(mdx - 2, mdy - 2, 5, 5);
  }
  // Player dot
  const pdx = (player.wx - offX)*scale;
  const pdy = (player.wy - offY)*scale;
  miniCtx.fillStyle = '#00ff88';
  miniCtx.fillRect(pdx-1, pdy-1, 3, 3);
  // Border
  miniCtx.strokeStyle = '#ff9900';
  miniCtx.lineWidth = 1;
  miniCtx.strokeRect(0,0,miniW,miniH);
  // Title
  miniCtx.font = '4px "Press Start 2P"';
  miniCtx.fillStyle = '#664400';
  miniCtx.fillText('MAP', 3, miniH - 3);
}

// ─── Draw ────────────────────────────────────────────────────
function drawScene(timestamp) {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  // Camera centers on player pixel pos
  const targetCamX = player.px - W/2 + TILE/2;
  const targetCamY = player.py - H/2 + TILE/2;
  camX += (targetCamX - camX) * 0.12;
  camY += (targetCamY - camY) * 0.12;

  const startTx = Math.floor(camX / TILE) - 1;
  const startTy = Math.floor(camY / TILE) - 1;
  const endTx = startTx + COLS + 2;
  const endTy = startTy + ROWS + 2;

  // Collect torch lights
  const lights = [];
  for (let wy = startTy; wy <= endTy; wy++) {
    for (let wx = startTx; wx <= endTx; wx++) {
      const cx = Math.floor(wx / CHUNK);
      const cy = Math.floor(wy / CHUNK);
      const lx = ((wx % CHUNK) + CHUNK) % CHUNK;
      const ly = ((wy % CHUNK) + CHUNK) % CHUNK;
      const chunk = getChunk(cx, cy);
      for (const obj of chunk.objects) {
        const isTorchLike = obj.type.startsWith('torch') || obj.type === 'brazier' || obj.type === 'lava_vent' || obj.type === 'mushroom_glow' || obj.type === 'candle_ring' || obj.type === 'crystal_shard';
        if (isTorchLike && obj.lx === lx && obj.ly === ly) {
          const seed = wx * 7 + wy * 13;
          const flick = torchFlicker(seed, timestamp);
          const radius = (obj.type === 'brazier' || obj.type === 'lava_vent') ? 5 :
                         (obj.type === 'mushroom_glow' || obj.type === 'crystal_shard') ? 3 :
                         obj.type === 'torch_ice' ? 3.5 : 4;
          lights.push({wx, wy, flick, seed, radius});
        }
      }
    }
  }
  // Player light
  lights.push({wx: player.wx, wy: player.wy, flick: 1, seed: 999, player: true});

  // Pre-calc light map (tile grid)
  litMap = new Map();
  for (const light of lights) {
    const radius = light.player ? player.lightRadius : (light.radius || 4) + light.flick * 2;
    const px = light.wx, py = light.wy;
    for (let dy = -Math.ceil(radius); dy <= Math.ceil(radius); dy++) {
      for (let dx = -Math.ceil(radius); dx <= Math.ceil(radius); dx++) {
        const d = Math.sqrt(dx*dx+dy*dy);
        if (d > radius) continue;
        const wx = px+dx, wy = py+dy;
        const k = `${wx},${wy}`;
        const brightness = (1 - d/radius) * light.flick * (light.player ? 0.95 : 0.8);
        const cur = litMap.get(k) || 0;
        litMap.set(k, Math.min(1, cur + brightness));
      }
    }
  }

  // ── Tile layer cache ────────────────────────────────────────
  // Invalidate cache when camera tile position changes or new tiles explored
  const camTx = Math.floor(camX / TILE);
  const camTy = Math.floor(camY / TILE);
  if (camTx !== tcLastTx || camTy !== tcLastTy || explored.size !== tcLastExploredSize) {
    tcLastTx = camTx; tcLastTy = camTy;
    tcLastExploredSize = explored.size;
    tileCacheDirty = true;
  }

  if (tileCacheDirty) {
    tileCacheDirty = false;
    tcCtx.fillStyle = '#000';
    tcCtx.fillRect(0, 0, tileCache.width, tileCache.height);

    // Draw tiles at 1px subpixel offset so we can blit with the fractional camX/camY later
    const tcStartTx = camTx - 1;
    const tcStartTy = camTy - 1;

    for (let wy = tcStartTy; wy <= tcStartTy + ROWS + 2; wy++) {
      for (let wx = tcStartTx; wx <= tcStartTx + COLS + 2; wx++) {
        // Cache-local pixel position (origin = tcStartTx*TILE)
        const bx = (wx - tcStartTx) * TILE;
        const by = (wy - tcStartTy) * TILE;

        const cxc = Math.floor(wx / CHUNK);
        const cyc = Math.floor(wy / CHUNK);
        const lx = ((wx % CHUNK) + CHUNK) % CHUNK;
        const ly = ((wy % CHUNK) + CHUNK) % CHUNK;
        const chunk = getChunk(cxc, cyc);
        const tile = chunk.tiles[ly*CHUNK+lx];
        const variant = chunk.floorVariants[ly*CHUNK+lx];
        const biome = chunk.biome;
        const isExplored = explored.has(`${wx},${wy}`);

        if (!isExplored) continue;
        // BLIND curse — only show currently lit tiles, not explored memory
        if (hasCurse('blind') && (litMap ? (litMap.get(`${wx},${wy}`) || 0) : 0) < 0.01) continue;

        if (tile === T.WALL) {
          tcCtx.fillStyle = biome.wallDark;
          tcCtx.fillRect(bx, by, TILE, TILE);
          // Static detail: brick mortar lines (no light-dependent alpha — avg brightness)
          tcCtx.fillStyle = 'rgba(0,0,0,0.3)';
          const brickRow = wy % 2;
          const brickOff = brickRow ? TILE/2 : 0;
          tcCtx.fillRect(bx, by + 7, TILE, 1);
          tcCtx.fillRect(bx + (brickOff % TILE), by, 1, 8);
          tcCtx.fillRect(bx + ((brickOff + TILE/2) % TILE), by + 8, 1, 8);
        } else {
          const bDark = biome.floorDark;
          tcCtx.fillStyle = bDark;
          tcCtx.fillRect(bx, by, TILE, TILE);
          // Static floor edge shadow
          tcCtx.fillStyle = 'rgba(0,0,0,0.35)';
          tcCtx.fillRect(bx, by, TILE, 1);
          tcCtx.fillRect(bx, by, 1, TILE);
          // Floor variant detail
          if (variant === 2) {
            tcCtx.fillStyle = 'rgba(0,0,0,0.2)';
            tcCtx.fillRect(bx+4, by+6, 5, 1);
            tcCtx.fillRect(bx+7, by+6, 1, 5);
          }
          // Biome floor accents (static, no light dependency)
          if (biome.id === 'lava' && variant < 2) {
            tcCtx.fillStyle = 'rgba(120,30,0,0.3)';
            tcCtx.fillRect(bx+2, by+8, 12, 1);
            tcCtx.fillRect(bx+8, by+3, 1, 6);
          }
          if (biome.id === 'ice' && variant === 1) {
            tcCtx.fillStyle = 'rgba(80,120,180,0.15)';
            tcCtx.fillRect(bx+3, by+3, 4, 4);
          }
        }

        // Explored-but-dark overlay (static fog)
        tcCtx.fillStyle = 'rgba(0,0,0,0.70)';
        tcCtx.fillRect(bx, by, TILE, TILE);
      }
    }
  }

  // Blit tile cache — offset by fractional camera position
  const tcOffX = -((camX / TILE - Math.floor(camX / TILE)) * TILE) - TILE;
  const tcOffY = -((camY / TILE - Math.floor(camY / TILE)) * TILE) - TILE;
  ctx.drawImage(tileCache, Math.floor(tcOffX), Math.floor(tcOffY));

  // BLIND curse: black out all explored-but-unlit tiles after cache blit
  if (hasCurse('blind')) {
    ctx.fillStyle = '#000';
    for (let wy = startTy; wy <= endTy; wy++) {
      for (let wx = startTx; wx <= endTx; wx++) {
        if ((litMap.get(`${wx},${wy}`) || 0) >= 0.01) continue; // lit — leave it
        const screenX = Math.floor(wx * TILE - camX);
        const screenY = Math.floor(wy * TILE - camY);
        ctx.fillRect(screenX, screenY, TILE, TILE);
      }
    }
  }

  // ── Per-frame lighting pass ──────────────────────────────────
  // For each visible tile, punch light through the fog overlay using
  // a single dark rectangle whose alpha is (1 - lit). This replaces
  // all the per-tile blendColor calls with a fast globalAlpha pass.
  for (let wy = startTy; wy <= endTy; wy++) {
    for (let wx = startTx; wx <= endTx; wx++) {
      const lit = litMap.get(`${wx},${wy}`) || 0;
      if (lit < 0.01) continue; // black stays black

      const screenX = Math.floor(wx * TILE - camX);
      const screenY = Math.floor(wy * TILE - camY);

      const cxc = Math.floor(wx / CHUNK);
      const cyc = Math.floor(wy / CHUNK);
      const lx = ((wx % CHUNK) + CHUNK) % CHUNK;
      const ly = ((wy % CHUNK) + CHUNK) % CHUNK;
      const chunk = getChunk(cxc, cyc);
      const tile = chunk.tiles[ly*CHUNK+lx];
      const variant = chunk.floorVariants[ly*CHUNK+lx];
      const biome = chunk.biome;
      const isExplored = explored.has(`${wx},${wy}`);

      // First: paint the lit color directly (covers the dark base from cache)
      if (tile === T.WALL) {
        ctx.fillStyle = blendColor(biome.wallDark, biome.wallLit, lit);
        ctx.fillRect(screenX, screenY, TILE, TILE);
        // Edge highlight
        if (lit > 0.08) {
          ctx.fillStyle = `rgba(180,190,255,${lit * 0.10})`;
          ctx.fillRect(screenX, screenY, TILE, 2);
          ctx.fillRect(screenX, screenY, 2, TILE);
          // Brick mortar at actual brightness
          ctx.fillStyle = `rgba(0,0,0,${lit * 0.45})`;
          const brickRow = wy % 2;
          const brickOff = brickRow ? TILE/2 : 0;
          ctx.fillRect(screenX, screenY + 7, TILE, 1);
          ctx.fillRect(screenX + (brickOff % TILE), screenY, 1, 8);
          ctx.fillRect(screenX + ((brickOff + TILE/2) % TILE), screenY + 8, 1, 8);
          if (biome.id === 'lava' && variant === 0 && lit > 0.3) {
            ctx.fillStyle = `rgba(200,60,0,${lit * 0.18})`;
            ctx.fillRect(screenX+4, screenY+10, 8, 2);
          }
          if (biome.id === 'ice' && lit > 0.3) {
            ctx.fillStyle = `rgba(140,200,255,${lit * 0.12})`;
            ctx.fillRect(screenX, screenY+14, TILE, 2);
          }
        }
      } else if (tile === T.SECRET_WALL) {
        // Cracked wall — slightly brighter than normal wall with subtle crack marks
        ctx.fillStyle = blendColor(biome.wallDark, biome.wallLit, lit * 0.7 + 0.08);
        ctx.fillRect(screenX, screenY, TILE, TILE);
        if (lit > 0.1) {
          // Crack lines
          ctx.fillStyle = `rgba(255,240,200,${lit * 0.5})`;
          ctx.fillRect(screenX+4, screenY+3, 1, 6);
          ctx.fillRect(screenX+5, screenY+8, 3, 1);
          ctx.fillRect(screenX+7, screenY+9, 1, 4);
          ctx.fillRect(screenX+10, screenY+4, 1, 5);
          // Subtle glow hint
          ctx.fillStyle = `rgba(255,220,100,${lit * 0.08})`;
          ctx.fillRect(screenX, screenY, TILE, TILE);
        }
      } else {
        // Base floor colour
        ctx.fillStyle = blendColor(biome.floorDark, biome.floorLit, lit);
        ctx.fillRect(screenX, screenY, TILE, TILE);
        if (lit > 0.05) {
          ctx.fillStyle = 'rgba(0,0,0,0.40)';
          ctx.fillRect(screenX, screenY, TILE, 1);
          ctx.fillRect(screenX, screenY, 1, TILE);
        }
        if (lit > 0.15 && variant === 2) {
          ctx.fillStyle = `rgba(0,0,0,${lit * 0.3})`;
          ctx.fillRect(screenX+4, screenY+6, 5, 1);
          ctx.fillRect(screenX+7, screenY+6, 1, 5);
        }
        if (biome.id === 'lava' && variant < 2 && lit > 0.2) {
          ctx.fillStyle = `rgba(255,80,0,${lit * 0.15})`;
          ctx.fillRect(screenX+2, screenY+8, 12, 1);
          ctx.fillRect(screenX+8, screenY+3, 1, 6);
        }
        if (biome.id === 'ice' && variant === 1 && lit > 0.25) {
          ctx.fillStyle = `rgba(200,240,255,${lit * 0.18})`;
          ctx.fillRect(screenX+3, screenY+3, 4, 4);
        }
        // ── Gate portcullis (story mode locked gates) ──
        if (gameMode === 'story') {
          const _gcx2 = Math.floor(wx/CHUNK), _gcy2 = Math.floor(wy/CHUNK);
          if (isGateChunk(_gcx2, _gcy2) && !storyActsCleared.includes(sActOf(_gcx2,_gcy2))) {
            const _corridorX = Math.floor(CHUNK/2);
            const _lxg = ((wx%CHUNK)+CHUNK)%CHUNK;
            if (_lxg === _corridorX && tile !== T.WALL) {
              const _ba = Math.min(1, lit * 2.5);
              ctx.fillStyle = `rgba(40,45,60,${_ba * 0.92})`;
              ctx.fillRect(screenX, screenY, TILE, TILE);
              ctx.fillStyle = `rgba(130,140,165,${_ba})`;
              for (let _b = 0; _b < 3; _b++) ctx.fillRect(screenX + 2 + _b*5, screenY, 2, TILE);
              ctx.fillStyle = `rgba(100,110,135,${_ba * 0.85})`;
              ctx.fillRect(screenX, screenY + 7, TILE, 2);
              if (lit > 0.25) {
                ctx.fillStyle = `rgba(210,170,60,${(lit-0.25)*0.9})`;
                ctx.fillRect(screenX+6, screenY+4, 4, 5);
              }
            }
          }
        }

        // ── Hazard overlays ──
        if (tile === T.LAVA) {
          const pulse = 0.5 + 0.5 * Math.sin(timestamp * 0.004 + wx * 0.7 + wy * 1.1);
          ctx.fillStyle = `rgba(255,${40+Math.floor(pulse*60)},0,${lit * (0.55 + pulse * 0.25)})`;
          ctx.fillRect(screenX, screenY, TILE, TILE);
          ctx.fillStyle = `rgba(255,180,0,${lit * pulse * 0.4})`;
          ctx.fillRect(screenX+3, screenY+5, 10, 3);
          ctx.fillRect(screenX+6, screenY+2, 4, 2);
        } else if (tile === T.DARK_PATCH) {
          const swirl = 0.5 + 0.5 * Math.sin(timestamp * 0.002 + wx + wy);
          ctx.fillStyle = `rgba(10,10,40,${0.6 + swirl * 0.25})`;
          ctx.fillRect(screenX, screenY, TILE, TILE);
          ctx.fillStyle = `rgba(30,40,100,${swirl * 0.3})`;
          ctx.fillRect(screenX+2, screenY+2, TILE-4, TILE-4);
        } else if (tile === T.ICE_PATCH) {
          ctx.fillStyle = `rgba(160,220,255,${lit * 0.35})`;
          ctx.fillRect(screenX, screenY, TILE, TILE);
          // Ice shimmer lines
          ctx.fillStyle = `rgba(255,255,255,${lit * 0.25})`;
          ctx.fillRect(screenX+2, screenY+4, 6, 1);
          ctx.fillRect(screenX+9, screenY+9, 4, 1);
          ctx.fillRect(screenX+4, screenY+12, 5, 1);
        } else if (tile === T.PRESSURE) {
          // Raised plate look — slightly different floor colour with border
          ctx.fillStyle = `rgba(180,160,80,${lit * 0.45})`;
          ctx.fillRect(screenX+1, screenY+1, TILE-2, TILE-2);
          ctx.fillStyle = `rgba(220,200,100,${lit * 0.3})`;
          ctx.fillRect(screenX+2, screenY+2, TILE-4, 2);
          ctx.fillRect(screenX+2, screenY+2, 2, TILE-4);
          ctx.fillStyle = `rgba(100,80,20,${lit * 0.4})`;
          ctx.fillRect(screenX+2, screenY+TILE-4, TILE-4, 2);
          ctx.fillRect(screenX+TILE-4, screenY+2, 2, TILE-4);
        }
      }
    }
  }

  // Draw objects
  for (let wy = startTy; wy <= endTy; wy++) {
    for (let wx = startTx; wx <= endTx; wx++) {
      const cx = Math.floor(wx / CHUNK);
      const cy = Math.floor(wy / CHUNK);
      const lx = ((wx % CHUNK) + CHUNK) % CHUNK;
      const ly = ((wy % CHUNK) + CHUNK) % CHUNK;
      const chunk = getChunk(cx, cy);
      const lit = litMap.get(`${wx},${wy}`) || 0;
      if (lit < 0.05 && !explored.has(`${wx},${wy}`)) continue;

      for (const obj of chunk.objects) {
        if (obj.lx !== lx || obj.ly !== ly) continue;
        const colKey = `${cx},${cy},${lx},${ly}` + obj.type;
        if (collected.has(colKey)) continue; // already picked up
        const screenX = Math.floor(wx * TILE - camX);
        const screenY = Math.floor(wy * TILE - camY);

        if (obj.type === 'torch' || obj.type === 'torch_iron') {
          const seed = wx*7+wy*13;
          const flick = torchFlicker(seed, timestamp);
          drawTorch(ctx, screenX, screenY, flick, timestamp, seed, 'iron');
        } else if (obj.type === 'torch_skull') {
          const seed = wx*7+wy*13;
          drawTorch(ctx, screenX, screenY, torchFlicker(seed,timestamp), timestamp, seed, 'skull');
        } else if (obj.type === 'torch_bone') {
          const seed = wx*7+wy*13;
          drawTorch(ctx, screenX, screenY, torchFlicker(seed,timestamp), timestamp, seed, 'bone');
        } else if (obj.type === 'torch_crude') {
          const seed = wx*7+wy*13;
          drawTorch(ctx, screenX, screenY, torchFlicker(seed,timestamp), timestamp, seed, 'crude');
        } else if (obj.type === 'torch_ice') {
          drawTorchIce(ctx, screenX, screenY, lit, timestamp, wx, wy);
        } else if (obj.type === 'brazier') {
          const seed = wx*5+wy*11;
          drawBrazier(ctx, screenX, screenY, torchFlicker(seed,timestamp), timestamp, seed);
        } else if (obj.type === 'lava_vent') {
          drawLavaVent(ctx, screenX, screenY, timestamp, wx, wy);
        } else if (obj.type === 'mushroom_glow') {
          drawMushroom(ctx, screenX, screenY, lit, timestamp, wx, wy, false);
        } else if (obj.type === 'mushroom_red') {
          drawMushroom(ctx, screenX, screenY, lit, timestamp, wx, wy, true);
        } else if (obj.type === 'crystal_shard') {
          drawCrystal(ctx, screenX, screenY, lit, wx, wy);
        } else if (obj.type === 'barrel' || obj.type === 'frozen_barrel') {
          drawBarrel(ctx, screenX, screenY, lit, obj.type === 'frozen_barrel');
        } else if (obj.type === 'crate') {
          drawCrate(ctx, screenX, screenY, lit);
        } else if (obj.type === 'bones') {
          drawBones(ctx, screenX, screenY, lit, wx, wy);
        } else if (obj.type === 'web_corner') {
          drawWeb(ctx, screenX, screenY, lit);
        } else if (obj.type === 'shield_wall') {
          drawShieldWall(ctx, screenX, screenY, lit);
        } else if (obj.type === 'urn') {
          drawUrn(ctx, screenX, screenY, lit);
        } else if (obj.type === 'sarcophagus') {
          drawSarcophagus(ctx, screenX, screenY, lit);
        } else if (obj.type === 'candle_ring') {
          drawCandleRing(ctx, screenX, screenY, lit, timestamp, wx, wy);
        } else if (obj.type === 'stalagmite') {
          drawStalagmite(ctx, screenX, screenY, lit, wx, wy);
        } else if (obj.type === 'ice_spike') {
          drawIceSpike(ctx, screenX, screenY, lit, wx, wy);
        } else if (obj.type === 'lava_rock') {
          drawLavaRock(ctx, screenX, screenY, lit, wx, wy);
        } else if (obj.type === 'ash_pile') {
          drawAshPile(ctx, screenX, screenY, lit);
        } else if (obj.type === 'oil_flask') {
          drawOilFlask(ctx, screenX, screenY, lit, timestamp, wx, wy);
        } else if (obj.type === 'health_potion') {
          drawHealthPotion(ctx, screenX, screenY, lit, timestamp, wx, wy);
        } else if (obj.type === 'shrine') {
          drawShrine(ctx, screenX, screenY, lit, timestamp, wx, wy, obj.used);
        } else if (obj.type === 'vault') {
          drawVault(ctx, screenX, screenY, lit, timestamp, wx, wy, obj.opened);
        } else if (obj.type === 'cursed_altar') {
          drawCursedAltar(ctx, screenX, screenY, lit, timestamp, wx, wy, obj.used);
        } else if (obj.type === 'bone_pickup') {
          if (lit > 0.08) {
            const ba = Math.min(1, lit*2);
            ctx.fillStyle = `rgba(204,187,170,${ba})`;
            ctx.fillRect(screenX+3, screenY+6, 10, 3);
            ctx.fillRect(screenX+4, screenY+4, 3, 7);
            ctx.fillRect(screenX+9, screenY+4, 3, 7);
          }
        } else if (obj.type === 'merchant') {
          drawMerchant(ctx, screenX, screenY, lit, timestamp, wx, wy);
        } else if (obj.type === 'chest') {
          drawChest(ctx, screenX, screenY, lit);
        } else if (obj.type === 'skull') {
          drawSkull(ctx, screenX, screenY, lit);
        } else if (obj.type === 'coin') {
          drawCoin(ctx, screenX, screenY, lit, timestamp, wx, wy);
        } else if (obj.type === 'gem') {
          drawGem(ctx, screenX, screenY, lit, obj.gemType, timestamp, wx, wy);
        }
      }
    }
  }

  // Draw player
  drawPlayer(ctx, Math.floor(player.px - camX), Math.floor(player.py - camY), timestamp);
  drawPursuer(timestamp);
  drawGhost(timestamp);
  drawCursePopup(timestamp);

  // Draw enemies
  if (!ghost || !ghost.active) drawEnemies(timestamp);

  // Draw attack arc + ground pound wave
  drawAttackArc(timestamp);

  // Draw corpse in world if present
  if (corpse) {
    const csx = Math.floor(corpse.wx * TILE - camX);
    const csy = Math.floor(corpse.wy * TILE - camY);
    const cLit = litMap.get(`${corpse.wx},${corpse.wy}`) || 0;
    drawCorpse(ctx, csx, csy, cLit, timestamp);
  }

  // Floating pickup texts
  drawFloatingTexts(timestamp);

  // Vignette
  const vig = ctx.createRadialGradient(W/2,H/2, H*0.2, W/2,H/2, H*0.9);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,0.85)');
  ctx.fillStyle = vig;
  ctx.fillRect(0,0,W,H);

  // Minimap
  drawMinimap();
  ctx.drawImage(miniCanvas, W - miniW - 8, 8);

  // Landmark name labels in world (discovered, nearby)
  ctx.font = '5px "Press Start 2P"';
  ctx.textAlign = 'center';
  for (const [, lm] of discoveredLandmarks) {
    if (!lm.discovered) continue;
    const sx2 = Math.floor(lm.wx * TILE + TILE/2 - camX);
    const sy2 = Math.floor(lm.wy * TILE - 6 - camY);
    if (sx2 < -100 || sx2 > W+100 || sy2 < -20 || sy2 > H+20) continue;
    const lit2 = litMap.get(`${lm.wx},${lm.wy}`) || 0;
    if (lit2 < 0.05) continue;
    ctx.globalAlpha = Math.min(1, lit2 * 2);
    ctx.fillStyle = '#000';
    ctx.fillText(lm.name, sx2+1, sy2+1);
    ctx.fillStyle = '#ccaaff';
    ctx.fillText(lm.name, sx2, sy2);
    ctx.globalAlpha = 1;
  }
  ctx.textAlign = 'left';

  // Shop key hint (bottom-left corner)
  ctx.font = '5px "Press Start 2P"';
  ctx.fillStyle = shopOpen ? '#ff9900' : '#443300';
  ctx.fillText('[E] SHOP', 8, H - 10);
  ctx.fillStyle = loreOpen ? '#ff9900' : '#443300';

  const barX = W - barW - 10, barY = H - 16;

  const oilColor = oilPct > 0.5 ? '#ff9900' : oilPct > 0.25 ? '#ff5500' : '#ff2200';

  ctx.strokeRect(barX, barY, barW, barH);

  ctx.fillStyle = oilColor;

  ctx.fillStyle = '#0a1a0a'; ctx.fillRect(barX, hpBarY, barW, barH);
  ctx.fillStyle = hpColor;  ctx.fillRect(barX, hpBarY, Math.floor(barW * hpPct), barH);

  const modeLabel = gameMode === 'easy' ? '★ EASY' : gameMode === 'hardcore' ? '☠ HARDCORE' : gameMode === 'story' ? '◆ STORY' : '⚔ COMBAT';

  ctx.fillStyle = modeColor;
  ctx.fillText(modeLabel, 8, 14);

  // Story mode: act indicator + compass
  if (gameMode === 'story' && storyAct > 0) {
    const act = STORY_ACTS[storyAct - 1];
    ctx.font = '5px "Press Start 2P"';
    ctx.fillStyle = '#446688';
    ctx.fillText(`ACT ${storyAct}: ${act.name}`, 8, 26);
    // Act progress dots
    for (let a = 0; a < 5; a++) {

      ctx.fillStyle = done ? '#aaddff' : current ? '#6699bb' : '#112233';

    }
    // Compass arrow pointing toward objective
    if (storyCompass) {
      const pcx2 = Math.floor(player.wx/CHUNK), pcy2 = Math.floor(player.wy/CHUNK);

      const nearGate = !bossCleared && isGateChunk(pcx2, pcy2 + 1);
      const act5 = STORY_ACTS[storyAct-1];
      if (inArena && !bossCleared) {
        // Pulsing boss name warning
        const bp = Math.floor(timestamp/300)%2===0;
        ctx.font = '5px "Press Start 2P"';
        ctx.fillStyle = bp ? (act5 ? act5.bossColor : '#ff4444') : '#223344';

      } else if (nearGate && !bossCleared) {

        ctx.textAlign = 'center';

      } else if (!bossCleared) {

        const dx2 = storyObjectiveWx - player.wx;
        const dy2 = storyObjectiveWy - player.wy;

        ctx.rotate(ang2);
        ctx.fillStyle = '#aaddff';

        ctx.moveTo(12, 0); ctx.lineTo(-8, -6); ctx.lineTo(-8, 6);

  if (gameMode === 'combat' || gameMode === 'hardcore') {

    const wNames = { sword: '⚔ SWORD', torch_weapon: '🔥 TORCH', bow: '🏹 BOW' };
    const wColors = { sword: '#ffdd44', torch_weapon: '#ff6600', bow: '#88ccff' };

      if (chargeFrac >= 1) {

    // Ground pound cooldown label

    ctx.fillStyle = gpReady ? '#ffaa00' : '#443300';
    ctx.fillText('[F] ' + (gpReady ? 'POUND' : '...'), barX, hpBarY - 20);

    // Dash cooldown label

    ctx.fillStyle = dashReady ? '#44aaff' : '#112233';
    ctx.fillText('[V] ' + (dashReady ? 'DASH' : '...'), barX, hpBarY - 8);
  }

  // Active merchant/hazard effect icons
  {
    let iconY2 = 28;
    ctx.font = '5px "Press Start 2P"';
    if (boostInventory.length > 0) { ctx.fillStyle='#44ffaa'; ctx.fillText(`[Z] BOOSTS: ${boostInventory.length}`, 8, iconY2); iconY2+=11; }
    if ((player.boostDmgTimer||0)>0)   { ctx.fillStyle='#ff2200'; ctx.fillText('BERSERK!', 8, iconY2); iconY2+=11; }
    if ((player.boostSpeedTimer||0)>0) { ctx.fillStyle='#44ffaa'; ctx.fillText('HASTE!',   8, iconY2); iconY2+=11; }
    if ((player.goldMultiTimer||0)>0)  { ctx.fillStyle='#ffdd44'; ctx.fillText('3x GOLD',  8, iconY2); iconY2+=11; }
    if (player.bloodCharm) { ctx.fillStyle='#ff2244'; ctx.fillText('BLOOD CHARM', 8, iconY2); iconY2+=11; }
    if (player.cursedBlade){ ctx.fillStyle='#cc44ff'; ctx.fillText('CURSED BLADE',8, iconY2); iconY2+=11; }
    if (player.voidCloaks>0){ ctx.fillStyle='#aa88ff'; ctx.fillText('VOID x'+player.voidCloaks,8,iconY2); iconY2+=11; }
    if (player.depthCandleTimer>0){ ctx.fillStyle='#ffff44'; ctx.fillText('DEPTH CANDLE',8,iconY2); iconY2+=11; }
    if (player.darkPatchTimer>0){ ctx.fillStyle='#334488'; ctx.fillText('BLINDED',8,iconY2); iconY2+=11; }
    if (player.icePatchTimer>0){ ctx.fillStyle='#88ccff'; ctx.fillText('SLOWED',8,iconY2); iconY2+=11; }
    if (corpse && corpse.expires){
      const sl=Math.ceil((corpse.expires-Date.now())/1000);

  if (hudPixels.textContent !== newPixels) hudPixels.textContent = newPixels;

  if (hudDepth.textContent  !== newDepth)  hudDepth.textContent  = newDepth;
}

function drawBanners(timestamp) {
  let by = 56;
  for (const b of banners) {
    const progress = 1 - b.life / b.maxLife;
    const alpha = b.life > b.maxLife * 0.2 ? 1 : b.life / (b.maxLife * 0.2);
    const slideX = progress < 0.1 ? (1 - progress / 0.1) * 80 : 0;
    ctx.save();
    ctx.globalAlpha = alpha;

    // Set font FIRST so measureText is accurate
    ctx.font = '8px "Press Start 2P"';
    const measured = ctx.measureText(b.text).width;
    const PAD_X = 24, PAD_Y = 10, LINE_H = 12;
    const maxTw = W - 32;

    // Word-wrap the text into lines that fit maxTw
    const words = b.text.split(' ');
    const lines = [];
    let line = '';
    for (const word of words) {
      const test = line + (line ? ' ' : '') + word;
      if (ctx.measureText(test).width > maxTw - PAD_X * 2 && line) {
        lines.push(line); line = word;
      } else line = test;
    }
    if (line) lines.push(line);

    // Box dimensions based on wrapped lines
    const lineWidths = lines.map(l => ctx.measureText(l).width);
    const tw = Math.min(maxTw, Math.max(...lineWidths) + PAD_X * 2);
    const th = lines.length * LINE_H + PAD_Y * 2;
    const bx = Math.max(4, (W - tw) / 2 + slideX);

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(bx + 3, by + 3, tw, th);
    // Box
    ctx.fillStyle = '#0a0500';
    ctx.fillRect(bx, by, tw, th);
    ctx.strokeStyle = b.color; ctx.lineWidth = 2;
    ctx.strokeRect(bx, by, tw, th);

    // Text lines
    ctx.fillStyle = b.color;
    ctx.textAlign = 'center';
    lines.forEach((l, i) => {
      ctx.fillText(l, bx + tw / 2, by + PAD_Y + LINE_H * (i + 0.85));
    });
    ctx.textAlign = 'left';
    ctx.restore();
    by += th + 6;
  }
}

let deathStats = null;
function drawDeathScreen(timestamp) {
  const age = timestamp - deathTimestamp;
  const fadeIn = Math.min(1, age / 900);

  ctx.save();
  ctx.globalAlpha = fadeIn * 0.96;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  ctx.globalAlpha = fadeIn;

  const best = loadBest();
  const isNewBestTiles = deathStats && deathStats.tiles >= (best.tiles || 0);
  const isNewBestGold  = deathStats && deathStats.gold  >= (best.gold  || 0);
  const isNewBestDepth = deathStats && deathStats.depth >= (best.depth || 0);
  const isNewBestKills = deathStats && (deathStats.kills||0) >= (best.kills || 0);

  const pw = 560, ph = 420;
  const px = (W-pw)/2, py = (H-ph)/2;

  // Panel
  ctx.fillStyle = '#06010a';
  ctx.fillRect(px, py, pw, ph);
  ctx.strokeStyle = '#880022'; ctx.lineWidth = 2;
  ctx.strokeRect(px, py, pw, ph);
  ctx.strokeStyle = '#330011'; ctx.lineWidth = 1;
  ctx.strokeRect(px+5, py+5, pw-10, ph-10);

  // Corner accents
  ctx.fillStyle = '#cc0022';
  ctx.fillRect(px, py, 8, 2); ctx.fillRect(px, py, 2, 8);
  ctx.fillRect(px+pw-8, py, 8, 2); ctx.fillRect(px+pw-2, py, 2, 8);
  ctx.fillRect(px, py+ph-2, 8, 2); ctx.fillRect(px, py+ph-8, 2, 8);
  ctx.fillRect(px+pw-8, py+ph-2, 8, 2); ctx.fillRect(px+pw-2, py+ph-8, 2, 8);

  // Title
  ctx.textAlign = 'center';
  ctx.font = '14px "Press Start 2P"';
  ctx.fillStyle = '#cc0022';
  ctx.fillText('YOUR LIGHT WENT OUT', W/2, py + 34);

  // Contextual death line
  if (deathStats) {
    const killer = deathStats.killerName || 'the dark';
    const biome  = deathStats.biome || 'the dungeon';
    ctx.font = '6px "Press Start 2P"';
    ctx.fillStyle = '#661122';
    ctx.fillText('slain by ' + killer + '  \u2014  in ' + biome, W/2, py + 50);
    if (deathStats.curses) {
      ctx.fillStyle = '#550033';
      ctx.fillText('cursed run: ' + deathStats.curses, W/2, py + 62);
    }
  }

  // Divider
  ctx.fillStyle = '#330011';
  ctx.fillRect(px+20, py+70, pw-40, 1);

  if (deathStats) {
    // Two columns: THIS RUN  |  ALL TIME
    const colL = px + 40, colR = px + pw/2 + 20;
    let lyy = py + 86, ryy = py + 86;

    ctx.font = '7px "Press Start 2P"';
    ctx.fillStyle = '#993322'; ctx.textAlign = 'left';
    ctx.fillText('THIS RUN', colL, lyy);
    ctx.fillStyle = '#664422';
    ctx.fillText('ALL TIME  (' + (best.runs||1) + ' runs)', colR, ryy);
    lyy += 18; ryy += 18;

    // Vertical divider
    ctx.strokeStyle = '#330011'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(px+pw/2, py+70); ctx.lineTo(px+pw/2, py+ph-50); ctx.stroke();

    const leftStats = [
      { label: 'DEPTH',   val: (deathStats.depth||0).toString(),               star: isNewBestDepth },
      { label: 'KILLS',   val: (deathStats.kills||0).toString(),               star: isNewBestKills },
      { label: 'GOLD',    val: (deathStats.gold||0).toLocaleString()+'g',       star: isNewBestGold },
      { label: 'TILES',   val: (deathStats.tiles||0).toLocaleString(),          star: isNewBestTiles },
      { label: 'SHRINES', val: shrinesUsed.toString(),                          star: false },
      { label: 'VAULTS',  val: vaultsOpened.toString(),                         star: false },
    ];
    const rightStats = [
      { label: 'DEPTH', val: (best.depth||0).toString() },
      { label: 'KILLS', val: (best.kills||0).toString() },
      { label: 'GOLD',  val: (best.gold||0).toLocaleString()+'g' },
      { label: 'TILES', val: (best.tiles||0).toLocaleString() },
    ];

    for (const s of leftStats) {
      ctx.font = '6px "Press Start 2P"';
      ctx.fillStyle = '#664433'; ctx.textAlign = 'left';
      ctx.fillText(s.label, colL, lyy);
      ctx.fillStyle = s.star ? '#ffdd44' : '#ccaa77';
      ctx.textAlign = 'right';
      ctx.fillText(s.val + (s.star ? ' \u2605' : ''), colL + 190, lyy);
      lyy += 16;
    }
    for (const s of rightStats) {
      ctx.font = '6px "Press Start 2P"';
      ctx.fillStyle = '#554433'; ctx.textAlign = 'left';
      ctx.fillText(s.label, colR, ryy);
      ctx.fillStyle = '#997755';
      ctx.textAlign = 'right';
