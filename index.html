// Added to chunk generation: 'shrine','vault','cursed_altar','oil_flask'
const VAULT_COST = 300;

function spawnFloatText(wx, wy, text, color) {
  floatingTexts.push({
    wx, wy,
    px: wx * TILE + TILE/2,
    py: wy * TILE,
    text, color,
    life: 900, maxLife: 900
  });
}

function tryCollect(wx, wy) {
  // Corpse recovery — step on it to reclaim everything
  if (corpse && wx === corpse.wx && wy === corpse.wy) {
    gold += corpse.gold;
    oil = Math.min(maxOil(), oil + corpse.oil * 0.5);
    // Restore upgrades (take the higher of current vs corpse level)
    if (corpse.upgradeLevels) {
      corpse.upgradeLevels.forEach((lvl, i) => {
        if (lvl > upgrades[i].level) upgrades[i].level = lvl;
      });
      applyUpgrades();
    }
    // Restore weapon and bombs
    if (corpse.weapon) player.weapon = corpse.weapon;
    if (corpse.bombs) bombCount = Math.max(bombCount, corpse.bombs);
    if (corpse.bloodCharm) player.bloodCharm = true;
    if (corpse.cursedBlade) player.cursedBlade = true;
    if (corpse.voidCloaks > 0) player.voidCloaks = Math.max(player.voidCloaks, corpse.voidCloaks);
    const recovered = [];
    if (corpse.gold > 0) recovered.push(`+${corpse.gold}g`);
    if (corpse.upgradeLevels && corpse.upgradeLevels.some((lvl, i) => lvl > 0)) recovered.push('upgrades');
    if (corpse.bombs > 0) recovered.push(`${corpse.bombs} bombs`);
    spawnFloatText(wx, wy, 'RECOVERED! ' + recovered.join(' '), '#00ffcc');
    triggerFlash('#00ffcc44', 600);
    triggerShake(4, 400);
    banners.push({ text: 'REMAINS RECOVERED!', color: '#00ffcc', life: 3500, maxLife: 3500 });
    corpse = null;
  }
  const cx = Math.floor(wx / CHUNK);
  const cy = Math.floor(wy / CHUNK);
  const lx = ((wx % CHUNK) + CHUNK) % CHUNK;
  const ly = ((wy % CHUNK) + CHUNK) % CHUNK;
  const chunk = getChunk(cx, cy);
  const colKey = `${cx},${cy},${lx},${ly}`;
  for (const obj of chunk.objects) {
    if (obj.lx !== lx || obj.ly !== ly) continue;
    if (collected.has(colKey + obj.type)) continue;

    if (obj.type === 'coin') {
      collected.add(colKey + obj.type);
      const goldMult = (player.goldMultiTimer||0) > 0 ? 3 : 1;
      const coinVal = (gameMode === 'hardcore' ? COIN_VALUE * 4 : gameMode === 'combat' ? COIN_VALUE * 2 : COIN_VALUE) * goldMult;
      gold += coinVal; totalCollected++;
      SFX.play('coin');
      spawnFloatText(wx, wy, `+${coinVal}g`, '#ffdd44');
    } else if (obj.type === 'gem') {
      collected.add(colKey + obj.type);
      const base = GEM_VALUES[obj.gemType];
      const val = gameMode === 'hardcore' ? Math.floor(base * 3) : gameMode === 'combat' ? Math.floor(base * 1.5) : base;
      gold += val; totalCollected++;
      const colors = {ruby:'#ff4466', emerald:'#44ff88', sapphire:'#44aaff'};
      SFX.play('gem');
      spawnFloatText(wx, wy, `+${val}g`, colors[obj.gemType]);
      triggerShake(2, 200);
    } else if (obj.type === 'chest') {
      collected.add(colKey + obj.type);
      const chestVal = gameMode === 'hardcore' ? Math.floor(CHEST_VALUE * 3) : gameMode === 'combat' ? Math.floor(CHEST_VALUE * 1.5) : CHEST_VALUE;
      gold += chestVal; totalCollected++;
      SFX.play('chest');
      spawnFloatText(wx, wy, `+${chestVal}g CHEST!`, '#ffaa00');
      triggerFlash('#ffaa00', 250);
      triggerShake(4, 350);
    } else if (obj.type === 'oil_flask') {
      collected.add(colKey + obj.type);
      const restore = OIL_FLASK_VALUE;
      oil = Math.min(maxOil(), oil + restore);
      if (hasCurse('starving')) {
        spawnFloatText(wx, wy, 'STARVING!', '#ff4400');
      } else {
        oil = Math.min(maxOil(), oil + restore);
        SFX.play('oil_flask');
        spawnFloatText(wx, wy, `+${restore}% OIL`, '#ff9900');
      }
      triggerFlash('#ff660033', 150);
    } else if (obj.type === 'health_potion') {
      collected.add(colKey + obj.type);
      const heal = Math.ceil(player.maxHp * 0.75); // restore 75% max HP
      player.hp = Math.min(player.maxHp, player.hp + heal);
      SFX.play('potion');
      spawnFloatText(wx, wy, `+${heal} HP`, '#ff4466');
      triggerFlash('#ff004433', 200);
    } else if (obj.type === 'shrine' && !obj.used) {
      obj.used = true;
      collected.add(colKey + obj.type);
      oil = Math.min(maxOil(), oil + 50);
      SFX.play('shrine');
      spawnFloatText(wx, wy, 'SHRINE! +50% OIL', '#cc88ff');
      triggerFlash('#aa44ff44', 500);
      triggerShake(2, 300);
      shrinesUsed++;
    } else if (obj.type === 'vault' && !obj.opened) {
      if (gold >= VAULT_COST) {
        obj.opened = true;
        collected.add(colKey + obj.type);
        gold -= VAULT_COST;
        // vault pays out 2–4x cost in gems + gold
        const payout = VAULT_COST * (2 + Math.random() * 2);
        gold += Math.floor(payout);
        spawnFloatText(wx, wy, `VAULT! +${Math.floor(payout)}g`, '#ffcc44');
        triggerFlash('#ffaa0044', 600);
        triggerShake(5, 500);
        vaultsOpened++;
      } else {
        spawnFloatText(wx, wy, `VAULT: NEED ${VAULT_COST}g`, '#ff4444');
      }
    } else if (obj.type === 'bone_pickup') {
      boneCount = (boneCount || 0) + 1;
      collected.add(colKey + obj.type);
      spawnFloatText(wx, wy, '+1 BONE', '#ccbbaa');
    } else if (obj.type === 'lore_pickup') {
      if (!storyLoreCollected.includes(obj.loreId)) {
        storyLoreCollected.push(obj.loreId);
        collected.add(colKey + obj.type);
        // Show a one-panel lore popup as a banner
        const loreTexts = STORY_LORE_FRAGMENTS[obj.actNum] || [];
        const frag = loreTexts[Math.floor(Math.random()*loreTexts.length)];
        if (frag) banners.push({ text: frag, color: '#aaddcc', life: 5000, maxLife: 5000 });
        SFX.play('lore_find');
        spawnFloatText(wx, wy, '✦ FOUND', '#aaddff');
      }
    } else if (obj.type === 'merchant') {
      // Open merchant shop — stock is fixed on first visit
      if (!obj.stock) obj.stock = rollMerchantStock(wx, wy);
      merchantStock = obj.stock;
      merchantOpen = true;
      shopOpen = false;
      loreOpen = false;
    } else if (obj.type === 'cursed_altar' && !obj.used) {
      obj.used = true;
      collected.add(colKey + obj.type);
      // Lose half current gold but gain a permanent upgrade
      const penalty = Math.floor(gold * 0.5);
      gold -= penalty;
      // random buff: extra light or speed
      const buffs = ['light','speed'];
      const buff = buffs[Math.floor(Math.random()*buffs.length)];
      const upg = upgrades.find(u => u.id === buff);
      if (upg && upg.level < upg.maxLevel) {
        upg.level++;
        applyUpgrades();
        spawnFloatText(wx, wy, `CURSED! -${penalty}g +${upg.name}`, '#ff44ff');
      } else {
        spawnFloatText(wx, wy, `CURSED! -${penalty}g`, '#ff44ff');
      }
      triggerFlash('#ff00ff33', 700);
      triggerShake(6, 600);
    }
  }
}

function spawnEnemiesForChunk(cx, cy) {
  const key = chunkKey(cx, cy);
  if (spawnedChunks.has(key)) return;
  spawnedChunks.add(key);

  const chunk = getChunk(cx, cy);
  const biome = chunk.biome;
  const rng = mulberry32((cx * 3141592) ^ (cy * 2718281) ^ 0xBEEFCAFE);
  const depth = Math.round(Math.sqrt(cx*cx*CHUNK*CHUNK + cy*cy*CHUNK*CHUNK) / (CHUNK*5));

  // Check if this is a boss chunk (depth multiple of 25, specific chunk)
  const isBossChunk = depth > 0 && depth % 25 === 0 &&
    Math.abs(cx) + Math.abs(cy) > 2 && rng() < 0.4;

  if (isBossChunk) {
    const bossType = BOSS_TYPES[Math.min(Math.floor(depth/25)-1, BOSS_TYPES.length-1)];
    const wx = cx*CHUNK + Math.floor(CHUNK/2);
    const wy = cy*CHUNK + Math.floor(CHUNK/2);
    enemies.push({
      wx, wy, px: wx*TILE, py: wy*TILE,
      type: 'boss', def: bossType,
      hp: bossType.hp, maxHp: bossType.hp,
      moveTimer: 0, spawnChunk: key,
      faceDx: 0, faceDy: 1,
      hitFlash: 0,
    });
    return;
  }

  // Regular enemies — pick biome-appropriate types
  const validTypes = Object.entries(ENEMY_TYPES)
    .filter(([,def]) => def.biomes.includes(biome.id) && (gameMode === 'story' || !def.storyOnly))
    .map(([id,def]) => ({id,def}));
  if (!validTypes.length) return;

  const numEnemies = 1 + Math.floor(rng() * 2) + Math.floor(depth / 20);
  for (let i = 0; i < Math.min(numEnemies, 4); i++) {
    const spawnThresh = gameMode === 'hardcore' ? 0.25 : gameMode === 'story' ? 0.5 : 0.6;
    if (rng() > spawnThresh) continue;
    const pick = validTypes[Math.floor(rng() * validTypes.length)];
    // Place in a floor tile away from player start
    let ex, ey, tries = 0;
    do {
      ex = cx*CHUNK + 2 + Math.floor(rng()*(CHUNK-4));
      ey = cy*CHUNK + 2 + Math.floor(rng()*(CHUNK-4));
      tries++;
    } while (tries < 20 && getTile(ex, ey) === T.WALL);
    if (getTile(ex, ey) === T.WALL) continue;

    enemies.push({
      wx: ex, wy: ey, px: ex*TILE, py: ey*TILE,
      type: pick.id, def: pick.def,
      hp: pick.def.hp + Math.floor(depth/10), maxHp: pick.def.hp + Math.floor(depth/10),
      moveTimer: Math.floor(rng() * (gameMode === 'hardcore' ? pick.def.moveInterval / 1.5 : pick.def.moveInterval)),
      spawnChunk: key,
      faceDx: 0, faceDy: 1,
      hitFlash: 0,
    });
  }
}

function tickEnemies(dt, timestamp) {
  // Spawn enemies for visible chunks
  const pcx = Math.floor(player.wx/CHUNK), pcy = Math.floor(player.wy/CHUNK);
  for (let dy = -2; dy <= 2; dy++)
    for (let dx = -2; dx <= 2; dx++)
      if (!ghost || !ghost.active) spawnEnemiesForChunk(pcx+dx, pcy+dy);

  // Remove enemies too far away
  for (let i = enemies.length-1; i >= 0; i--) {
    const e = enemies[i];
    const dist = Math.abs(e.wx - player.wx) + Math.abs(e.wy - player.wy);
    if (dist > CHUNK * 4) { enemies.splice(i, 1); continue; }
    if (e.hp <= 0) {
      // Drop gold
      gold += e.def.reward;
      SFX.play(e.type === 'boss' ? 'boss_die' : 'enemy_die');
      _runKills++;
      trackKill(e.type);
      if (hasCurse('starving')) oil = Math.min(maxOil(), oil + 5);
      spawnFloatText(e.wx, e.wy, `+${e.def.reward}g`, '#ffdd44');
      if (e.type === 'boss') {
        triggerFlash('#ff440044', 800);
        triggerShake(8, 700);
        banners.push({ text: `${e.def.name} DEFEATED!`, color:'#ff8844', life:4000, maxLife:4000 });
        if (e.isStoryBoss) onStoryBossKill(e);
      }
      // EMBER: explodes into lava patch on death
      if (e.type === 'ember') {
        const ecx2=Math.floor(e.wx/CHUNK), ecy2=Math.floor(e.wy/CHUNK);
        const elx2=((e.wx%CHUNK)+CHUNK)%CHUNK, ely2=((e.wy%CHUNK)+CHUNK)%CHUNK;
        const ech=getChunk(ecx2,ecy2);
        if (ech.tiles[ely2*CHUNK+elx2]===T.FLOOR) ech.tiles[ely2*CHUNK+elx2]=T.LAVA;
        triggerFlash('#ff440033', 200);
        spawnFloatText(e.wx, e.wy, 'BOOM', '#ff6622');
      }
      // SLIME: splits into 2 mini-slimes if not already a mini
      if (e.type === 'slime' && !e.isMini) {
        [[1,0],[-1,0]].forEach(([ox,oy]) => {
          const mx2=e.wx+ox, my2=e.wy+oy;
          if (isWalkable(mx2,my2) && !enemies.some(o=>o.wx===mx2&&o.wy===my2))
            enemies.push({wx:mx2,wy:my2,px:mx2*TILE,py:my2*TILE,type:'slime',def:ENEMY_TYPES.slime,isMini:true,hp:1,maxHp:1,moveTimer:400,spawnChunk:e.spawnChunk,faceDx:ox,faceDy:oy,hitFlash:0});
        });
        spawnFloatText(e.wx, e.wy, 'SPLITS!', '#44cc44');
      }
      // SKELETON: 50% chance to drop a throwable bone
      if (e.type === 'skeleton' && Math.random() < 0.5) {
        const scx2=Math.floor(e.wx/CHUNK), scy2=Math.floor(e.wy/CHUNK);
        const chunk2=getChunk(scx2,scy2);
        const slx2=((e.wx%CHUNK)+CHUNK)%CHUNK, sly2=((e.wy%CHUNK)+CHUNK)%CHUNK;
        chunk2.objects.push({type:'bone_pickup',lx:slx2,ly:sly2});
      }
      if ((player.bloodCharm || hasPerk('blood_price')) && player.hp < player.maxHp) {
        const _healAmt = hasSynergy('vampiric_curse') ? 3 : 1;
        player.hp = Math.min(player.maxHp, player.hp + _healAmt);
        if (hasSynergy('vampiric_curse') && _healAmt > 1) spawnFloatText(player.wx, player.wy, '+3 VAMPIRIC', '#ff2266');
        spawnFloatText(player.wx, player.wy, '+1 ❤', '#ff4466');
      }
      enemies.splice(i, 1);
      continue;
    }

    // Tick hit flash
    if (e.hitFlash > 0) e.hitFlash -= dt;

    // AI: move toward player if in range
    const edx = player.wx - e.wx, edy = player.wy - e.wy;
    const distTiles = Math.sqrt(edx*edx+edy*edy);
    const range = e.def.range || 8;
    if (distTiles < range) {
      e.moveTimer -= dt;
      if (e.moveTimer <= 0) {
        let interval = gameMode === 'hardcore' ? Math.floor(e.def.moveInterval / 1.5) : e.def.moveInterval;
        if (e.type === 'shadow') {
          const sLit = litMap ? (litMap.get(`${e.wx},${e.wy}`) || 0) : 0;
          if (sLit < 0.2) interval = Math.floor(interval * 0.55); // much faster in dark
        }
        e.moveTimer = interval;
        let mx = 0, my = 0;
        if (Math.abs(edx) >= Math.abs(edy)) mx = edx > 0 ? 1 : -1;
        else my = edy > 0 ? 1 : -1;

        // ── SHADOW: teleport adjacent to player if far + dark ──
        if (e.type === 'shadow' && distTiles > 4) {
          const lit2 = litMap ? (litMap.get(`${e.wx},${e.wy}`) || 0) : 0;
          if (lit2 < 0.25 && Math.random() < 0.15) {
            const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
            const d2 = dirs[Math.floor(Math.random()*4)];
            const tx2 = player.wx+d2[0], ty2 = player.wy+d2[1];
            if (isWalkable(tx2,ty2) && !enemies.some(o=>o!==e&&o.wx===tx2&&o.wy===ty2)) {
              e.wx=tx2; e.wy=ty2;
              SFX.play('shadow_teleport');
              spawnFloatText(tx2,ty2,'BLINK','#6644aa');
              e.moveTimer += 200; // small penalty after blink
            }
          }
        }

        // ── WRAITH: can pass through walls ──
        const nx = e.wx + mx, ny = e.wy + my;
        const wraith_passwall = e.type === 'wraith';
        const canMove = wraith_passwall
          ? !enemies.some(o => o !== e && o.wx === nx && o.wy === ny)
          : (getTile(nx, ny) !== T.WALL && getTile(nx,ny) !== T.SECRET_WALL && !enemies.some(o => o !== e && o.wx === nx && o.wy === ny));
        if (canMove) {
          e.wx = nx; e.wy = ny;
          e.faceDx = mx; e.faceDy = my;
        }

        // ── SKELETON: ranged bone throw every 3 moves ──
        if (e.type === 'skeleton' && distTiles >= 3 && distTiles <= 7) {
          e.boneCooldown = (e.boneCooldown || 0) - (gameMode==='hardcore'?2000:1400);
          if (e.boneCooldown <= 0) {
            e.boneCooldown = gameMode==='hardcore' ? 1800 : 2800;
            projectiles.push({
              wx:e.wx, wy:e.wy, px:e.wx*TILE+8, py:e.wy*TILE+8,
              dx: edx/distTiles, dy: edy/distTiles,
              speed:0.12, dmg:2, type:'bone', life:800, maxLife:800,
              color:'#ccbbaa', charged:false,
            });
            SFX.play('skeleton_bone');
            spawnFloatText(e.wx, e.wy-1, 'BONE!', '#ccbbaa');
          }
        }

        // ── LAVA GOLEM: leaves lava tile behind on each step ──
        if (e.type === 'lava_golem') {
          const gcx=Math.floor(e.wx/CHUNK), gcy=Math.floor(e.wy/CHUNK);
          const glx=((e.wx%CHUNK)+CHUNK)%CHUNK, gly=((e.wy%CHUNK)+CHUNK)%CHUNK;
          const gchunk=getChunk(gcx,gcy);
          if (gchunk.tiles[gly*CHUNK+glx]===T.FLOOR||gchunk.tiles[gly*CHUNK+glx]===T.CORRIDOR)
            gchunk.tiles[gly*CHUNK+glx]=T.LAVA;
        }
        // ── CAVE SPIDER: leaves web (slow patch) behind ──
        if (e.type === 'cave_spider' && Math.random() < 0.4) {
          const scx2=Math.floor(e.wx/CHUNK), scy2=Math.floor(e.wy/CHUNK);
          const slx2=((e.wx%CHUNK)+CHUNK)%CHUNK, sly2=((e.wy%CHUNK)+CHUNK)%CHUNK;
          const sch=getChunk(scx2,scy2);
          if (sch.tiles[sly2*CHUNK+slx2]===T.FLOOR) sch.tiles[sly2*CHUNK+slx2]=T.ICE_PATCH;
        }
        // ── BOSS SPECIAL ATTACKS (story only) ──────────────
        if (e.isStoryBoss) {
          e.specialTimer = (e.specialTimer || 0) + 1;
          const specialEvery = [0, 5, 4, 5, 4, 3][e.actNum] || 5; // moves between specials

          if (e.specialTimer >= specialEvery) {
            e.specialTimer = 0;
            const dx3 = player.wx - e.wx, dy3 = player.wy - e.wy;
            const dist3 = Math.sqrt(dx3*dx3+dy3*dy3);

            // Act 1 — Warden: 3-tile slam wave outward
            if (e.actNum === 1) {
              const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
              dirs.forEach(([ox,oy]) => {
                for (let r2=1;r2<=3;r2++) {
                  projectiles.push({
                    wx:e.wx+ox*r2, wy:e.wy+oy*r2,
                    px:(e.wx+ox*r2)*TILE+8, py:(e.wy+oy*r2)*TILE+8,
                    dx:ox, dy:oy, speed:0.08, dmg:2,
                    type:'boss_wave', life:400, maxLife:400,
                    color:'#cc4400', charged:false,
                  });
                }
              });
              spawnFloatText(e.wx, e.wy, 'SLAM!', e.def.color);
              SFX.play('boss_attack');
            }

            // Act 2 — Bone Sovereign: bone volley (5 directions)
            else if (e.actNum === 2 && dist3 < 10) {
              const baseAng = Math.atan2(dy3, dx3);
              for (let i=-2;i<=2;i++) {
                const ang2 = baseAng + i * 0.35;
                projectiles.push({
                  wx:e.wx, wy:e.wy, px:e.wx*TILE+8, py:e.wy*TILE+8,
                  dx:Math.cos(ang2), dy:Math.sin(ang2),
                  speed:0.1, dmg:2, type:'bone', life:700, maxLife:700,
                  color:'#eeddbb', charged:false,
                });
              }
              spawnFloatText(e.wx, e.wy, 'VOLLEY!', e.def.color);
              SFX.play('skeleton_bone');
            }

            // Act 3 — The Hollow: darkness pulse (briefly blinds)
            else if (e.actNum === 3) {
              player.darkPatchTimer = Math.max(player.darkPatchTimer, 2000);
              triggerFlash('#00000066', 400);
              spawnFloatText(e.wx, e.wy, 'DARK PULSE!', e.def.color);
              SFX.play('boss_attack');
            }

            // Act 4 — First Warden: freeze nova (slow all around)
            else if (e.actNum === 4) {
              player.icePatchTimer = Math.max(player.icePatchTimer, 3000);
              for (let iy=-2;iy<=2;iy++) for (let ix=-2;ix<=2;ix++) {
                const nx2=e.wx+ix, ny2=e.wy+iy;
                const icx=Math.floor(nx2/CHUNK), icy=Math.floor(ny2/CHUNK);
                const ilx=((nx2%CHUNK)+CHUNK)%CHUNK, ily=((ny2%CHUNK)+CHUNK)%CHUNK;
                const ich=getChunk(icx,icy);
                if (ich.tiles[ily*CHUNK+ilx]===T.FLOOR) ich.tiles[ily*CHUNK+ilx]=T.ICE_PATCH;
              }
              spawnFloatText(e.wx, e.wy, 'FREEZE!', e.def.color);
              triggerFlash('#aaddff33', 400);
              SFX.play('boss_attack');
            }

            // Act 5 — The Abyss: void pull (knock player toward boss)
            else if (e.actNum === 5 && dist3 > 2 && dist3 < 12) {
              const pdx = e.wx - player.wx, pdy = e.wy - player.wy;
              const plen = Math.sqrt(pdx*pdx+pdy*pdy);
              const pullX = Math.round(pdx/plen * 2), pullY = Math.round(pdy/plen * 2);
              let px2=player.wx, py2=player.wy;
              for (let step=0; step<2; step++) {
                if (isWalkable(px2+pullX, py2)) px2+=pullX;
                if (isWalkable(px2, py2+pullY)) py2+=pullY;
              }
              player.wx=px2; player.wy=py2;
              player.px=player.wx*TILE; player.py=player.wy*TILE;
              spawnFloatText(player.wx, player.wy, 'PULLED!', e.def.color);
              triggerFlash('#22004433', 300);
              SFX.play('boss_attack');
            }
          }
        }

        // Damage player on contact
        if (e.wx === player.wx && e.wy === player.wy && player.invincible <= 0) {
          // Parry check — reflect damage back
          if (player.parryWindow > 0) {
            e.hp -= e.def.dmg * 3;
            e.hitFlash = 500;
            player.parryWindow = 0;
            player.parryCooldown = 400; // shorter cooldown reward
            applyKnockback(e, e.wx - player.wx >= 0 ? 1 : -1, e.wy - player.wy >= 0 ? 1 : -1, 2);
            spawnFloatText(player.wx, player.wy, 'PARRIED! x3', '#00ffff');
            triggerShake(3, 200);
            triggerFlash('#00ffff22', 200);
          } else if (player.voidCloaks > 0) {
            player.voidCloaks--;
            player.invincible = 600;
            spawnFloatText(player.wx, player.wy, `VOID CLOAK! (${player.voidCloaks} left)`, '#aa88ff');
            triggerFlash('#aa88ff22', 200);
          } else {
            let dmg = Math.max(1, e.def.dmg - (player.cursedBlade ? Math.max(0,player.armor-1) : player.armor));
            if (META.selectedClass === 'shade') {
              const _shadeLit = litMap ? (litMap.get(`${player.wx},${player.wy}`) || 0) : 0;
              if (_shadeLit > 0.4) dmg = Math.floor(dmg * 2);
            }
            player.hp -= dmg;
            player.invincible = 1400;
            SFX.play('hurt');
            spawnFloatText(player.wx, player.wy, `-${dmg}HP`, '#ff2222');
            triggerShake(4, 300);
            triggerFlash('#ff000033', 200);
            if ((e.type === 'wraith' || e.type === 'crypt_ghost') && !player.wraithWard && !hasPerk('wraith_bane')) {
              oil = Math.max(0, oil - (e.type === 'crypt_ghost' ? 5 : 8));
              SFX.play('wraith_drain');
            }
            // Ice shade — double damage if player already slowed
            if (e.type === 'ice_shade' && player.icePatchTimer > 0) {
              player.hp -= dmg; // extra hit
              spawnFloatText(player.wx, player.wy, 'FROZEN!', '#88ccff');
            }
            if (player.hp <= 0) {
              if (!deathStats) deathStats = {};
              deathStats._pendingKiller = e.def.name || e.type;
              if (player._secondWind && !player._secondWindUsed) {
                player._secondWindUsed = true;
                player.hp = 1;
                player.invincible = 2000;
                spawnFloatText(player.wx, player.wy, 'SECOND WIND!', '#ff88aa');
                triggerFlash('#ff88aa44', 600);
                SFX.play('parry');
              } else
              if (gameMode === 'story') {
                // Story: soft death — respawn near start of act, keep upgrades
                player.hp = Math.max(1, Math.floor(player.maxHp * 0.5));
                oil = maxOil();
                const _rs = actStartTile(storyAct || 1);
                player.wx = _rs.wx; player.wy = _rs.wy;
                player.px = player.wx * TILE; player.py = player.wy * TILE;
                enemies.length = 0; spawnedChunks.clear();
                triggerFlash('#000000aa', 800);
                banners.push({ text: 'YOU FELL. RETURNING TO ACT ' + storyAct + '...', color:'#aaddff', life:3500, maxLife:3500 });
                const _dep4=Math.round(Math.sqrt(player.wx**2+player.wy**2)/5);
                const _se3=endRunMeta({depth:_dep4,gold,kills:_runKills,actsCleared:storyActsCleared.length,mode:gameMode,survived:false,cursedMultiplier:curseEchoMultiplier});
                setTimeout(()=>banners.push({text:`+${_se3} ECHOES EARNED`,color:'#cc88ff',life:3000,maxLife:3000}),2000);
                const _sdep = Math.round(Math.sqrt(player.wx**2+player.wy**2)/5);
                const _se = endRunMeta({ depth: _sdep, gold, kills: _runKills, actsCleared: storyActsCleared.length, mode: gameMode, survived: false, cursedMultiplier: curseEchoMultiplier });
                setTimeout(() => banners.push({ text: `+${_se} ECHOES EARNED`, color: '#cc88ff', life: 3000, maxLife: 3000 }), 2000);
              } else {
                isDead = true;
                deathTimestamp = timestamp;
                const _dep2 = Math.round(Math.sqrt(player.wx**2+player.wy**2)/5);
                const _earned = endRunMeta({ depth: _dep2, gold, kills: _runKills, actsCleared: storyActsCleared.length, mode: gameMode, survived: false, cursedMultiplier: curseEchoMultiplier });
                setTimeout(() => banners.push({ text: `+${_earned} ECHOES EARNED`, color: '#cc88ff', life: 3000, maxLife: 3000 }), 2000);
                const dep = Math.round(Math.sqrt(player.wx**2+player.wy**2)/5);
                const _killerBiome = (() => {
                  const _cx = Math.floor(player.wx/CHUNK), _cy = Math.floor(player.wy/CHUNK);
                  return getChunkBiome ? getChunkBiome(_cx,_cy) : null;
                })();
                deathStats = {
                  tiles: exploredCount, gold, depth: dep,
                  kills: _runKills,
                  killerName: deathStats?._pendingKiller || 'the dark',
                  biome: _killerBiome ? _killerBiome.name : 'the dungeon',
                  curses: activeCurses.length > 0 ? activeCurses.map(id => { const d = CURSE_DEFS.find(c2=>c2.id===id); return d ? d.name : id; }).join(', ') : null,
                  echoes: _earned,
                  mode: gameMode,
                };
                saveBest(deathStats);
                corpse = { wx: player.wx, wy: player.wy, gold, tiles: exploredCount, depth: dep, oil: maxOil(), upgradeLevels: upgrades.map(u => u.level), weapon: player.weapon, bombs: bombCount, bloodCharm: player.bloodCharm, cursedBlade: player.cursedBlade, voidCloaks: player.voidCloaks, expires: gameMode === 'hardcore' ? Date.now() + 90000 : null };
                triggerFlash('#000000', 1200);
              }
            }
          }
        }
      }
    }

    // Smooth pixel pos
    e.px += (e.wx*TILE - e.px) * 0.25;
    e.py += (e.wy*TILE - e.py) * 0.25;
  }
}

function drawEnemies(timestamp) {
  for (const e of enemies) {
    const sx = Math.floor(e.px - camX);
    const sy2 = Math.floor(e.py - camY);
    const lit = litMap ? (litMap.get(`${e.wx},${e.wy}`) || 0) : 0;
    if (lit < 0.04) continue;
    const a = Math.min(1, lit * 2);
    const isBoss = e.type === 'boss';
    const def = e.def;
    const flash = e.hitFlash > 0;
    const col = flash ? '#ffffff' : def.color;
    const sz = def.size || 10;
    const bx = sx + 8 - sz/2, by = sy2 + 14 - sz;
    ctx.fillStyle = `rgba(0,0,0,${a*0.3})`;
    ctx.fillRect(sx+2, sy2+13, 12, 3);
    ctx.fillStyle = `rgba(${hexToRgb(col)},${a})`;
    if (e.type === 'slime') {
      ctx.fillRect(bx+1, by+2, sz-2, sz-4);
      ctx.fillRect(bx, by+4, sz, sz-6);
      ctx.fillRect(bx+2, by, sz-4, sz-2);
      ctx.fillStyle = `rgba(0,0,0,${a})`;
      ctx.fillRect(bx+2, by+3, 2, 2); ctx.fillRect(bx+sz-4, by+3, 2, 2);
    } else if (e.type === 'skeleton') {
      ctx.fillRect(bx+2, by, sz-4, sz/2);
      ctx.fillStyle = `rgba(${hexToRgb(col)},${a*0.8})`;
      ctx.fillRect(bx+3, by+sz/2, sz-6, sz/2);
      ctx.fillRect(bx, by+sz/2, 3, sz/2-2);
      ctx.fillRect(bx+sz-3, by+sz/2, 3, sz/2-2);
      ctx.fillStyle = `rgba(0,0,0,${a})`;
      ctx.fillRect(bx+2, by+2, 2, 2); ctx.fillRect(bx+sz-4, by+2, 2, 2);
    } else if (e.type === 'shadow') {
      const pulse = 0.7 + Math.sin(timestamp*0.005+e.wx)*0.3;
      ctx.fillStyle = `rgba(${hexToRgb(col)},${a*pulse})`;
      ctx.fillRect(bx+1, by+2, sz-2, sz-2);
      ctx.fillRect(bx+3, by, sz-6, sz);
      ctx.fillStyle = `rgba(255,200,255,${a*0.6})`;
      ctx.fillRect(bx+3, by+3, 2, 2); ctx.fillRect(bx+sz-5, by+3, 2, 2);
    } else if (e.type === 'wraith') {
      const pulse = 0.6 + Math.abs(Math.sin(timestamp*0.003+e.wy))*0.4;
      ctx.fillStyle = `rgba(${hexToRgb(col)},${a*pulse})`;
      ctx.fillRect(bx, by+2, sz, sz-4); ctx.fillRect(bx+2, by, sz-4, sz);
      ctx.fillStyle = `rgba(200,230,255,${a})`;
      ctx.fillRect(bx+2, by+2, 2, 2); ctx.fillRect(bx+sz-4, by+2, 2, 2);
    } else if (e.type === 'lava_golem') {
      ctx.fillRect(bx, by+2, sz, sz-2); ctx.fillRect(bx+2, by, sz-4, sz);
      ctx.fillStyle = `rgba(255,200,0,${a*0.7})`;
      ctx.fillRect(bx+2, by+2, 3, 3); ctx.fillRect(bx+sz-5, by+2, 3, 3);
    } else if (isBoss) {
      ctx.fillRect(bx-2, by+1, sz+4, sz-1); ctx.fillRect(bx, by, sz, sz+1);
      ctx.fillStyle = `rgba(255,255,0,${a})`;
      ctx.fillRect(bx+2, by+2, 3, 3); ctx.fillRect(bx+sz-5, by+2, 3, 3);
      ctx.fillStyle = `rgba(255,200,0,${a})`;
      ctx.fillRect(bx+1, by-3, 2, 4); ctx.fillRect(bx+sz/2-1, by-4, 3, 5); ctx.fillRect(bx+sz-3, by-3, 2, 4);
    }
    const barW2 = sz + 4;
    const hpFrac = e.hp / e.maxHp;
    ctx.fillStyle = `rgba(0,0,0,${a*0.7})`;
    ctx.fillRect(sx+8-barW2/2, sy2-6, barW2, 3);
    ctx.fillStyle = hpFrac > 0.5 ? `rgba(0,220,0,${a})` : hpFrac > 0.25 ? `rgba(255,180,0,${a})` : `rgba(255,0,0,${a})`;
    ctx.fillRect(sx+8-barW2/2, sy2-6, Math.floor(barW2*hpFrac), 3);
    if (isBoss && lit > 0.2) {
      ctx.font = '5px "Press Start 2P"';
      ctx.fillStyle = `rgba(255,100,50,${a})`;
      ctx.textAlign = 'center';
      ctx.fillText(def.name, sx+8, sy2-10);
      ctx.textAlign = 'left';
    }
  }
}

// ─── Attack system ────────────────────────────────────────────
let groundPoundCooldown = 0;
let groundPoundDuration = 0;
let groundPoundWaveR = 0;

function doAttack() {
  // Charged attack: if chargeTime >= chargeMax, do big hit
  const charged = player.chargeTime >= player.chargeMax;
  SFX.play(charged ? 'sword_charged' : player.weapon === 'torch_weapon' ? 'torch_swing' : 'sword');
  if (ghost) ghost.hasAttacked = true;
  player.chargeTime = 0;
  if (player.attackCooldown > 0 && !charged) return;
  // Cursed blade cost
  if (player.cursedBlade && player.hp > 1 && !hasSynergy('vampiric_curse')) { player.hp -= 1; }
  // Berserk boost
  const dmgMulti = (player.boostDmgTimer || 0) > 0 ? 3 : 1;
  player.attackCooldown = charged ? 0 : (player.attackCooldownMax || 300);
  player.attackDuration = charged ? 350 : 200;

  const w = player.weapon || 'sword';
  const dir = { dx: player.faceDx || 1, dy: player.faceDy || 0 };
  let hit = false;

  if (w === 'sword') {
    const range = gameMode === 'hardcore' ? (charged ? 2 : 1) : (charged ? 3 : 2);
    const dmg = (charged ? player.attackDamage * 3 : player.attackDamage) * dmgMulti;
    for (let r = 1; r <= range; r++) {
      const ax = player.wx + dir.dx * r;
      const ay = player.wy + dir.dy * r;
      for (const e of enemies) {
        if (e.wx === ax && e.wy === ay) {
          const kb = charged ? 2 : 1;
          applyKnockback(e, dir.dx, dir.dy, kb);
          e.hp -= dmg;
          e.hitFlash = 250;
          SFX.play(e.type === 'boss' ? 'boss_hurt' : 'enemy_hurt');
          spawnFloatText(ax, ay, `-${dmg}`, charged ? '#ff2200' : '#ff6644');
          hit = true;
        }
      }
    }
    if (charged) { triggerShake(5, 250); triggerFlash('#ff220022', 200); }

  } else if (w === 'torch_weapon') {
    // Wide 3-tile arc perpendicular to facing
    const torchLvl = getUpgradeValue('torch_weapon');
    const dmg = 1 + torchLvl;
    const oilCost = charged ? 12 : 6;
    oil = Math.max(0, oil - oilCost);
    const perp = { dx: -dir.dy, dy: dir.dx };
    const spread = charged ? 2 : 1;
    for (let s = -spread; s <= spread; s++) {
      for (let r = 1; r <= 2; r++) {
        const ax = player.wx + dir.dx * r + perp.dx * s;
        const ay = player.wy + dir.dy * r + perp.dy * s;
        for (const e of enemies) {
          if (e.wx === ax && e.wy === ay) {
            e.hp -= dmg;
            e.hitFlash = 300;
            SFX.play(e.type === 'boss' ? 'boss_hurt' : 'enemy_hurt');
            e.burning = 1200 + torchLvl * 400; // burn DoT
            spawnFloatText(ax, ay, `🔥-${dmg}`, '#ff6600');
            hit = true;
          }
        }
      }
    }

  } else if (w === 'bow') {
    fireBowShot(charged);
    return; // bow handles its own cooldown
  }

  if (hit) triggerShake(2, 120);

  // Check if any sword attack hit a secret wall in facing direction
  if (w === 'sword') {
    const dir2 = { dx: player.faceDx || 1, dy: player.faceDy || 0 };
    const swx = player.wx + dir2.dx;
    const swy = player.wy + dir2.dy;
    const scx = Math.floor(swx/CHUNK), scy = Math.floor(swy/CHUNK);
    const slx = ((swx%CHUNK)+CHUNK)%CHUNK, sly = ((swy%CHUNK)+CHUNK)%CHUNK;
    if (getTile(swx, swy) === T.SECRET_WALL) {
      breakSecretWall(scx, scy, slx, sly, swx, swy);
    }
  }
}

function fireBowShot(charged) {
  SFX.play('arrow_fire');
  if (player.bowCooldown > 0 && !charged) return;
  const bowLvl = getUpgradeValue('bow');
  const dmg = (charged ? 3 : 1) + bowLvl;
  const maxRange = 8 + bowLvl * 4;
  player.bowCooldown = charged ? 200 : Math.max(300, 700 - bowLvl * 100);
  player.attackDuration = 180;

  // Aim assist: find nearest enemy within a 40° cone in facing direction
  const dir = { dx: player.faceDx || 1, dy: player.faceDy || 0 };
  let best = null, bestScore = -1;
  for (const e of enemies) {
    const ex = e.wx - player.wx, ey = e.wy - player.wy;
    const dist = Math.sqrt(ex*ex + ey*ey);
    if (dist > maxRange || dist < 0.5) continue;
    const dot = (ex * dir.dx + ey * dir.dy) / dist; // cosine of angle
    if (dot < 0.5) continue; // outside ~60° half-cone
    const score = dot - dist * 0.04; // prefer aligned AND close
    if (score > bestScore) { best = e; bestScore = score; }
  }

  let adx = dir.dx, ady = dir.dy;
  if (best) {
    const ex = best.wx - player.wx, ey = best.wy - player.wy;
    const dist = Math.sqrt(ex*ex + ey*ey);
    // Blend 70% toward target, 30% facing — soft aim assist
    adx = ex/dist * 0.7 + dir.dx * 0.3;
    ady = ey/dist * 0.7 + dir.dy * 0.3;
    const len = Math.sqrt(adx*adx + ady*ady);
    adx /= len; ady /= len;
  }

  const bowColors = ['#ffdd44','#88ccff','#cc88ff'];
  projectiles.push({
    wx: player.wx, wy: player.wy,
    px: player.px + 8, py: player.py + 8,
    dx: adx, dy: ady,
    speed: 0.18 + bowLvl * 0.04,
    dmg, type: 'arrow',
    life: maxRange * 100,
    maxLife: maxRange * 100,
    color: bowColors[Math.min(bowLvl, 2)],
    charged,
  });
}

function throwBone() {
  if ((boneCount || 0) <= 0) return;
  boneCount--;
  const dir = { dx: player.faceDx || 1, dy: player.faceDy || 0 };
  projectiles.push({
    wx: player.wx, wy: player.wy,
    px: player.px + 8 + dir.dx * 8, py: player.py + 8 + dir.dy * 8,
    dx: dir.dx, dy: dir.dy,
    speed: 0.14,
    dmg: 3 + getUpgradeValue('sword'),
    type: 'arrow', // re-use arrow logic (hits enemies)
    life: 1000, maxLife: 1000,
    color: '#ccbbaa',
    charged: false,
  });
  spawnFloatText(player.wx, player.wy, 'BONE THROW!', '#ccbbaa');
}

function throwBomb() {
  if (bombCount <= 0) return;
  SFX.play('bomb_throw');
  bombCount--;
  const dir = { dx: player.faceDx || 1, dy: player.faceDy || 0 };
  projectiles.push({
    wx: player.wx + dir.dx, wy: player.wy + dir.dy,
    px: player.px + 8 + dir.dx * 8, py: player.py + 8 + dir.dy * 8,
    dx: dir.dx, dy: dir.dy,
    speed: 0.10,
    dmg: 4 + getUpgradeValue('bomb') * 2,
    type: 'bomb',
    life: 1200, maxLife: 1200,
    fuse: 900, // explodes after this ms
    color: '#333',
  });
  spawnFloatText(player.wx, player.wy, 'BOMB!', '#ff8800');
}

function doDash() {
  if (player.dashCooldown > 0) return;
  SFX.play('dash');
  player.dashCooldown = META.selectedClass === 'shade' ? 0 : 900;
  player.dashDuration = 180;
  player.dashDx = player.faceDx || 1;
  player.dashDy = player.faceDy || 0;
  player.invincible = Math.max(player.invincible, 300); // iframes during dash
  triggerFlash('#ffffff11', 120);
}

function doParry() {
  if (player.parryCooldown > 0 || player.parryWindow > 0) return;
  player.parryCooldown = 1200;
  player.parryWindow = 280; // active parry window
  spawnFloatText(player.wx, player.wy, 'PARRY!', '#88ffff');
}

function applyKnockback(e, dx, dy, tiles) {
  for (let t = 0; t < tiles; t++) {
    const nx = e.wx + dx, ny = e.wy + dy;
    if (getTile(nx, ny) !== T.WALL) { e.wx = nx; e.wy = ny; }
    else break;
  }
}

function doGroundPound() {
  if (groundPoundCooldown > 0) return;
  SFX.play('ground_pound');
  groundPoundCooldown = Math.max(1200, 2500 - getUpgradeValue('attackspeed') * 300);
  groundPoundDuration = 600;
  groundPoundWaveR = 0;
  for (const e of enemies) e.groundPoundHit = false;
  triggerShake(6, 400);
  triggerFlash('#ffaa0033', 300);
  spawnFloatText(player.wx, player.wy, 'GROUND POUND!', '#ffaa00');
}

function tickGroundPound(dt) {
  if (groundPoundCooldown > 0) groundPoundCooldown = Math.max(0, groundPoundCooldown - dt);
  if (groundPoundDuration <= 0) return;
  groundPoundDuration -= dt;
  const maxR = 5 + getUpgradeValue('sword');
  groundPoundWaveR = (1 - groundPoundDuration / 600) * maxR;
  for (const e of enemies) {
    if (e.groundPoundHit) continue;
    const d = Math.sqrt((e.wx - player.wx) ** 2 + (e.wy - player.wy) ** 2);
    if (d >= groundPoundWaveR - 0.8 && d <= groundPoundWaveR + 0.6) {
      e.hp -= player.attackDamage;
      e.hitFlash = 300;
      e.groundPoundHit = true;
      applyKnockback(e, e.wx - player.wx > 0 ? 1 : -1, e.wy - player.wy > 0 ? 1 : -1, 1);
      spawnFloatText(e.wx, e.wy, `-${player.attackDamage}`, '#ffaa44');
    }
  }
  if (groundPoundDuration <= 0) for (const e of enemies) e.groundPoundHit = false;
}

function tickProjectiles(dt) {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.life -= dt;

    if (p.type === 'bomb') {
      p.fuse -= dt;
      // Move slowly
      p.px += p.dx * p.speed * dt;
      p.py += p.dy * p.speed * dt;
      p.wx = Math.round(p.px / TILE);
      p.wy = Math.round(p.py / TILE);
      // Stop at walls
      if (getTile(p.wx, p.wy) === T.WALL) { p.fuse = 0; }
      if (p.fuse <= 0 || p.life <= 0) {
        // BOOM — hit all enemies in radius 3
        const blastR = 3;
        const dmg = p.dmg;
        for (const e of enemies) {
          const d = Math.sqrt((e.wx-p.wx)**2+(e.wy-p.wy)**2);
          if (d <= blastR) {
            e.hp -= dmg;
            e.hitFlash = 400;
            applyKnockback(e, e.wx-p.wx >= 0 ? 1:-1, e.wy-p.wy >= 0 ? 1:-1, 2);
            spawnFloatText(e.wx, e.wy, `-${dmg}`, '#ff8800');
          }
        }
        SFX.play('bomb_explode');
        triggerShake(7, 500);
        triggerFlash('#ff880044', 350);
        spawnFloatText(p.wx, p.wy, '💥 BOOM!', '#ff8800');
        projectiles.splice(i, 1);
      }
      continue;
    }

    // Arrow — move fast, hit first enemy in path
    p.px += p.dx * p.speed * dt;
    p.py += p.dy * p.speed * dt;
    const wx2 = Math.round(p.px / TILE);
    const wy2 = Math.round(p.py / TILE);
    if (getTile(wx2, wy2) === T.WALL || p.life <= 0) {
      if (p.life > 0) SFX.play('arrow_hit');
      projectiles.splice(i, 1); continue;
    }
    p.wx = wx2; p.wy = wy2;
    // Bone projectile — hits player
    if (p.type === 'bone') {
      if (wx2 === player.wx && wy2 === player.wy && player.invincible <= 0) {
        if (player.parryWindow > 0) {
          player.parryWindow = 0;
          spawnFloatText(player.wx, player.wy, 'PARRIED!', '#00ffff');
        } else if (player.voidCloaks > 0) {
          player.voidCloaks--;
          spawnFloatText(player.wx, player.wy, 'VOID CLOAK!', '#aa88ff');
        } else {
          const bdmg = Math.max(1, p.dmg - player.armor);
          player.hp -= bdmg;
          player.invincible = 800;
          spawnFloatText(player.wx, player.wy, `-${bdmg}HP`, '#ff2222');
          triggerShake(2, 150);
        }
        projectiles.splice(i, 1);
      }
      continue;
    }

    let hit = false;
    for (const e of enemies) {
      if (e.wx === wx2 && e.wy === wy2) {
        e.hp -= p.dmg;
        e.hitFlash = 300;
        spawnFloatText(wx2, wy2, `-${p.dmg}`, p.color);
        if (p.charged) applyKnockback(e, p.dx > 0 ? 1 : p.dx < 0 ? -1 : 0, p.dy > 0 ? 1 : p.dy < 0 ? -1 : 0, 2);
        hit = true;
        break;
      }
    }
    if (hit) { projectiles.splice(i, 1); }
  }
}

function tickCombatPlayer(dt) {
  // Cooldowns
  if (player.attackCooldown > 0) player.attackCooldown = Math.max(0, player.attackCooldown - dt);
  if (player.attackDuration > 0) player.attackDuration = Math.max(0, player.attackDuration - dt);
  if (player.invincible > 0)     player.invincible     = Math.max(0, player.invincible - dt);
  if (player.dashCooldown > 0)   player.dashCooldown   = Math.max(0, player.dashCooldown - dt);
  if (player.phaseTimer > 0) { player.phaseTimer = Math.max(0, player.phaseTimer - dt); if (player.phaseTimer === 0) player._voidJustFired = false; }
  if (player.dashDuration > 0)   player.dashDuration   = Math.max(0, player.dashDuration - dt);
  if (player.parryCooldown > 0)  player.parryCooldown  = Math.max(0, player.parryCooldown - dt);
  if (player.parryWindow > 0)    player.parryWindow    = Math.max(0, player.parryWindow - dt);
  if (player.bowCooldown > 0)    player.bowCooldown    = Math.max(0, player.bowCooldown - dt);

  // Charge held — build charge
  if (keys[' '] && !shopOpen && !loreOpen && gameMode !== 'easy') {
    player.chargeTime = Math.min(player.chargeMax, (player.chargeTime || 0) + dt);
  }

  // Dash movement
  if (player.dashDuration > 0) {
    const steps = 2;
    for (let s = 0; s < steps; s++) {
      const nx = player.wx + player.dashDx;
      const ny = player.wy + player.dashDy;
      if (isWalkable(nx, ny)) { player.wx = nx; player.wy = ny; }
      else { player.dashDuration = 0; break; }
    }
  }

  // Passive regen: 1 HP every 60 tiles walked (tracked by regenTimer as step-counter)
  // (handled in movement)

  // Burning enemies DoT
  for (const e of enemies) {
    if (e.burning > 0) {
      e.burning -= dt;
      e.burnTick = (e.burnTick || 0) + dt;
      if (e.burnTick >= 600) {
        e.burnTick = 0;
        e.hp -= 1;
        e.hitFlash = 100;
        spawnFloatText(e.wx, e.wy, '🔥-1', '#ff6600');
      }
    }
  }
}

function drawAttackArc(timestamp) {
  const px = Math.floor(player.px - camX);
  const py = Math.floor(player.py - camY);
  const w = player.weapon || 'sword';
  const swordLvl = getUpgradeValue('sword');
  const swordColor  = swordLvl >= 2 ? '#cc88ff' : swordLvl >= 1 ? '#88ccff' : '#ffdd44';
  const bladeColor  = swordLvl >= 2 ? '#eeccff' : swordLvl >= 1 ? '#cceeff' : '#ffffaa';
  const guardColor  = swordLvl >= 2 ? '#884488' : swordLvl >= 1 ? '#446688' : '#cc9900';
  const handleColor = '#664422';
  const charged = player.chargeTime >= (player.chargeMax || 600);

  // Charge buildup glow on player
  if (player.chargeTime > 100 && player.attackDuration <= 0) {
    const chargeFrac = Math.min(1, player.chargeTime / player.chargeMax);
    const glowColor = w === 'torch_weapon' ? '255,100,0' : w === 'bow' ? '100,200,255' : '255,200,50';
    ctx.fillStyle = `rgba(${glowColor},${chargeFrac * 0.35})`;
    ctx.fillRect(px - 4, py - 4, TILE + 8, TILE + 8);
    if (chargeFrac >= 1) {
      ctx.strokeStyle = `rgba(${glowColor},0.9)`;
      ctx.lineWidth = 2;
      ctx.strokeRect(px - 3, py - 3, TILE + 6, TILE + 6);
      ctx.lineWidth = 1;
    }
  }

  // Parry window flash
  if (player.parryWindow > 0) {
    const pFrac = player.parryWindow / 280;
    ctx.fillStyle = `rgba(100,220,255,${pFrac * 0.4})`;
    ctx.fillRect(px - 6, py - 6, TILE + 12, TILE + 12);
    ctx.strokeStyle = `rgba(100,220,255,${pFrac * 0.9})`;
    ctx.lineWidth = 2;
    ctx.strokeRect(px - 5, py - 5, TILE + 10, TILE + 10);
    ctx.lineWidth = 1;
  }

  // Dash trail
  if (player.dashDuration > 0) {
    const df = player.dashDuration / 180;
    ctx.fillStyle = `rgba(255,255,255,${df * 0.3})`;
    ctx.fillRect(px - player.dashDx * TILE * 0.5, py - player.dashDy * TILE * 0.5, TILE, TILE);
  }

  // ── Sword swing ─────────────────────────────────────────────
  if (w === 'sword' && player.attackDuration > 0) {
    const dur = charged ? 350 : 200;
    const progress = player.attackDuration / dur;
    const swing = (1 - progress) * Math.PI * 0.75;
    const fdx = player.faceDx || 1, fdy = player.faceDy || 0;
    const baseAngle = Math.atan2(fdy, fdx);
    const startAngle = baseAngle - Math.PI * 0.45;
    const curAngle = startAngle + swing;
    const bladeLen = charged ? 28 + swordLvl * 3 : 18 + swordLvl * 3;
    const cx2 = px + TILE/2, cy2 = py + TILE/2;

    ctx.save();
    ctx.translate(cx2, cy2);
    ctx.rotate(curAngle);
    const a = Math.min(1, progress * 2);
    // Blade glow
    ctx.strokeStyle = `rgba(${hexToRgb(swordColor)},${a * (charged ? 0.5 : 0.25)})`;
    ctx.lineWidth = charged ? 12 : 7;
    ctx.beginPath(); ctx.moveTo(2, 0); ctx.lineTo(bladeLen + 4, 0); ctx.stroke();
    // Blade
    ctx.strokeStyle = `rgba(${hexToRgb(swordColor)},${a * 0.9})`;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(3, 0); ctx.lineTo(bladeLen, 0); ctx.stroke();
    // Highlight
    ctx.strokeStyle = `rgba(${hexToRgb(bladeColor)},${a})`;
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(4, 0); ctx.lineTo(bladeLen - 2, 0); ctx.stroke();
    // Tip
    ctx.fillStyle = `rgba(255,255,255,${a * 0.9})`;
    ctx.fillRect(bladeLen - 1, -1, 2, 2);
    // Guard
    ctx.fillStyle = `rgba(${hexToRgb(guardColor)},${a})`;
    ctx.fillRect(2, -3, 4, 6);
    ctx.fillStyle = `rgba(255,220,100,${a * 0.6})`;
    ctx.fillRect(3, -2, 2, 4);
    // Handle
    ctx.strokeStyle = `rgba(${hexToRgb(handleColor)},${a})`;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(-5, 0); ctx.lineTo(2, 0); ctx.stroke();
    // Swing trail
    ctx.strokeStyle = `rgba(${hexToRgb(swordColor)},${a * (charged ? 0.3 : 0.18)})`;
    ctx.lineWidth = bladeLen;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.arc(0, 0, bladeLen / 2, startAngle - curAngle - 0.05, 0.05);
    ctx.stroke();
    ctx.lineCap = 'butt'; ctx.lineWidth = 1;
    ctx.restore();
    // Tip spark
    if (progress < 0.6 && progress > 0.3) {
      const tipX = cx2 + Math.cos(curAngle) * (bladeLen + 2);
      const tipY = cy2 + Math.sin(curAngle) * (bladeLen + 2);
      ctx.fillStyle = `rgba(255,255,200,${(0.6-progress)*3})`;
      ctx.fillRect(tipX-2, tipY-2, 4, 4);
    }
  }

  // ── Torch sweep ─────────────────────────────────────────────
  if (w === 'torch_weapon' && player.attackDuration > 0) {
    const progress = player.attackDuration / 200;
    const dir = { dx: player.faceDx || 1, dy: player.faceDy || 0 };
    const perp = { dx: -dir.dy, dy: dir.dx };
    const torchLvl = getUpgradeValue('torch_weapon');
    const spread = player.chargeTime > 0 ? 2 : 1;
    for (let s = -spread; s <= spread; s++) {
      for (let r = 1; r <= 2; r++) {
        const ax = px + (dir.dx * r + perp.dx * s) * TILE;
        const ay = py + (dir.dy * r + perp.dy * s) * TILE;
        const a = progress * 0.7 * (1/r);
        ctx.fillStyle = `rgba(255,${80 + torchLvl*30},0,${a})`;
        ctx.fillRect(ax+1, ay+1, TILE-2, TILE-2);
        if (r === 1) {
          ctx.fillStyle = `rgba(255,200,50,${a*0.5})`;
          ctx.fillRect(ax+3, ay+3, TILE-6, TILE-6);
        }
      }
    }
  }

  // ── Bow draw ────────────────────────────────────────────────
  if (w === 'bow' && player.attackDuration > 0) {
    const progress = player.attackDuration / 180;
    const dir = { dx: player.faceDx || 1, dy: player.faceDy || 0 };
    const angle = Math.atan2(dir.dy, dir.dx);
    const bowColor = getUpgradeValue('bow') >= 2 ? '#cc88ff' : getUpgradeValue('bow') >= 1 ? '#88ccff' : '#ffdd44';
    ctx.save();
    ctx.translate(px + TILE/2, py + TILE/2);
    ctx.rotate(angle);
    // Arrow line
    ctx.strokeStyle = `rgba(${hexToRgb(bowColor)},${progress})`;
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(6, 0); ctx.lineTo(28, 0); ctx.stroke();
    ctx.fillStyle = `rgba(${hexToRgb(bowColor)},${progress})`;
    ctx.fillRect(26, -1, 4, 2); // arrowhead
    ctx.restore();
  }

  // ── Projectiles ─────────────────────────────────────────────
  for (const p of projectiles) {
    const sx2 = Math.floor(p.px - camX);
    const sy2 = Math.floor(p.py - camY);
    const frac = p.life / p.maxLife;
    if (p.type === 'arrow') {
      ctx.save();
      ctx.translate(sx2, sy2);
      ctx.rotate(Math.atan2(p.dy, p.dx));
      ctx.fillStyle = p.color;
      ctx.fillRect(-6, -1, 12, 2);
      ctx.fillStyle = '#fff';
      ctx.fillRect(4, -1, 3, 2);
      ctx.restore();
      // Trail
      ctx.fillStyle = `rgba(${hexToRgb(p.color)},0.3)`;
      ctx.fillRect(sx2 - p.dx*4, sy2 - p.dy*4, 3, 3);
    } else if (p.type === 'bone') {
      ctx.save();
      ctx.translate(sx2, sy2);
      ctx.rotate(Math.atan2(p.dy, p.dx) + (Date.now()*0.015));
      ctx.fillStyle = '#ccbbaa';
      ctx.fillRect(-4, -1, 8, 2);
      ctx.fillRect(-3, -2, 2, 4);
      ctx.fillRect(2, -2, 2, 4);
      ctx.restore();
    } else if (p.type === 'bomb') {
      const pulse = Math.sin(timestamp * 0.01 + p.fuse) > 0;
      ctx.fillStyle = pulse ? '#ff4400' : '#222';
      ctx.fillRect(sx2 - 3, sy2 - 3, 6, 6);
      ctx.fillStyle = '#888';
      ctx.fillRect(sx2 - 1, sy2 - 5, 2, 3);
      // Fuse spark
      if (p.fuse > 0 && pulse) {
        ctx.fillStyle = '#ffaa00';
        ctx.fillRect(sx2, sy2 - 5, 2, 2);
      }
    }
  }

  // ── Ground pound wave ────────────────────────────────────────
  if (groundPoundDuration > 0 && groundPoundWaveR > 0) {
    const waveAlpha = (groundPoundDuration / 600) * 0.9;
    const wR = groundPoundWaveR * TILE;
    const cx2 = px + TILE/2, cy2 = py + TILE/2;
    ctx.strokeStyle = `rgba(255,180,0,${waveAlpha})`;
    ctx.lineWidth = 4;
    ctx.beginPath(); ctx.arc(cx2, cy2, wR, 0, Math.PI*2); ctx.stroke();
    ctx.strokeStyle = `rgba(255,255,120,${waveAlpha*0.5})`;
    ctx.lineWidth = 1;
    if (wR > 6) { ctx.beginPath(); ctx.arc(cx2, cy2, wR-5, 0, Math.PI*2); ctx.stroke(); }
    ctx.lineWidth = 1;
  }

  // ── Cooldown arcs (bottom of player) ────────────────────────
  if (gameMode === 'combat' || gameMode === 'hardcore') {
    const maxCd = Math.max(1, 2500 - getUpgradeValue('attackspeed') * 300);
    if (groundPoundCooldown > 0) {
      const frac = Math.max(0, Math.min(1, 1 - groundPoundCooldown/maxCd));
      ctx.strokeStyle = 'rgba(255,180,0,0.4)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(px+TILE/2, py+TILE/2, 11, -Math.PI/2, -Math.PI/2 + frac*Math.PI*2);
      ctx.stroke(); ctx.lineWidth = 1;
    }
    if (player.dashCooldown > 0) {
      const frac = 1 - player.dashCooldown/900;
      ctx.strokeStyle = 'rgba(100,200,255,0.4)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(px+TILE/2, py+TILE/2, 13, -Math.PI/2, -Math.PI/2 + frac*Math.PI*2);
      ctx.stroke(); ctx.lineWidth = 1;
    }
  }
}

// ─── Landmarks ───────────────────────────────────────────────
const LANDMARK_PREFIXES = ['The','Old','Lost','Dark','Grim','Hollow','Cursed','Forgotten','Ancient','Bleak','Silent','Iron'];
const LANDMARK_NOUNS    = ['Hall','Chamber','Vault','Crossing','Passage','Sanctum','Crypt','Gate','Pit','Archive','Throne','Keep'];
const LANDMARK_SUFFIXES = ['of Echoes','of Shadows','of Bones','of Whispers','of Ruin','of the Fallen','of No Return','of Ash'];
const discoveredLandmarks = new Map(); // chunkKey → {name, wx, wy, discovered}

function getLandmarkForChunk(cx, cy) {
  const key = chunkKey(cx, cy);
  if (discoveredLandmarks.has(key)) return discoveredLandmarks.get(key);
  // Only ~1 in 4 chunks gets a landmark
  const rng = mulberry32((cx * 9876543) ^ (cy * 1234567) ^ 0xFACEFEED);
  if (rng() > 0.25) return null;
  const r2 = mulberry32((cx * 1111111) ^ (cy * 9999999));
  const prefix = LANDMARK_PREFIXES[Math.floor(r2() * LANDMARK_PREFIXES.length)];
  const noun   = LANDMARK_NOUNS[Math.floor(r2() * LANDMARK_NOUNS.length)];
  const suffix = r2() > 0.4 ? ' ' + LANDMARK_SUFFIXES[Math.floor(r2() * LANDMARK_SUFFIXES.length)] : '';
  const name   = `${prefix} ${noun}${suffix}`;
  // Place near chunk center
  const wx = cx * CHUNK + Math.floor(CHUNK / 2);
  const wy = cy * CHUNK + Math.floor(CHUNK / 2);
  const landmark = { name, wx, wy, cx, cy, discovered: false };
  discoveredLandmarks.set(key, landmark);
  return landmark;
}

function checkLandmarkDiscovery() {
  // Check the current chunk and neighbors
  const pcx = Math.floor(player.wx / CHUNK);
  const pcy = Math.floor(player.wy / CHUNK);
  for (let dy = -1; dy <= 1; dy++) {
    for (let dx = -1; dx <= 1; dx++) {
      const lm = getLandmarkForChunk(pcx+dx, pcy+dy);
      if (!lm || lm.discovered) continue;
      // Discover when player enters the chunk
      if (pcx+dx === pcx && pcy+dy === pcy) {
        lm.discovered = true;
        spawnFloatText(player.wx, player.wy - 2, lm.name, '#ddccff');
      }
    }
  }
}

      special: 'Press Q to fire. Soft aim-assist. Charged = knockback.',
      level: bowLvl,
      maxLevel: 3,
    });
  }
  return owned;
}

function drawWeaponSprite(ctx, id, cx, cy, col, lvl, t) {
  // Pixel-art weapon icons drawn in a 32x32 box centred on cx,cy
  const a = 1;
  if (id === 'sword') {
    // Blade
    const bc = lvl >= 2 ? '#cc88ff' : lvl >= 1 ? '#88ccff' : '#ffdd44';
    const gc = lvl >= 2 ? '#884488' : lvl >= 1 ? '#446688' : '#cc9900';
    const bob = Math.round(Math.sin(t * 0.003) * 1.5);
    // Blade body (diagonal)
    for (let i = 0; i < 14; i++) {
      ctx.fillStyle = i === 13 ? '#ffffff' : bc;
      ctx.fillRect(cx - 7 + i, cy + 7 - i + bob, 2, 2);
    }
    // Highlight
    ctx.fillStyle = '#ffffff';
    for (let i = 2; i < 12; i++) ctx.fillRect(cx - 6 + i, cy + 6 - i + bob, 1, 1);
    // Guard
    ctx.fillStyle = gc;
    ctx.fillRect(cx - 8, cy + 5 + bob, 8, 3);
    ctx.fillStyle = '#ffee88';
    ctx.fillRect(cx - 7, cy + 6 + bob, 6, 1);
    // Handle
    ctx.fillStyle = '#664422';
    ctx.fillRect(cx - 12, cy + 8 + bob, 5, 2);
    ctx.fillStyle = '#886644';
    ctx.fillRect(cx - 11, cy + 8 + bob, 3, 1);
    // Pommel
    ctx.fillStyle = gc;
    ctx.fillRect(cx - 13, cy + 7 + bob, 3, 4);

  } else if (id === 'torch_weapon') {
    const bob = Math.round(Math.sin(t * 0.004) * 1);
    const flameColors = ['#ff3300','#ff6600','#ff9900','#ffcc00'];
    const ff = Math.floor(t / 120) % 4;
    // Handle pole
    ctx.fillStyle = '#8B5E3C';
    ctx.fillRect(cx - 1, cy + bob, 3, 16);
    ctx.fillStyle = '#6B4423';
    ctx.fillRect(cx, cy + bob, 1, 16);
    // Torch head
    ctx.fillStyle = '#cc7700';
    ctx.fillRect(cx - 3, cy - 10 + bob, 7, 7);
    ctx.fillStyle = '#aa5500';
    ctx.fillRect(cx - 2, cy - 9 + bob, 5, 5);
    // Flame layers
    ctx.fillStyle = flameColors[ff];
    ctx.fillRect(cx - 2, cy - 16 + bob, 5, 8);
    ctx.fillStyle = flameColors[(ff+1)%4];
    ctx.fillRect(cx - 1, cy - 18 + bob, 3, 6);
    ctx.fillStyle = '#ffff88';
    ctx.fillRect(cx, cy - 19 + bob, 1, 4);
    // Glow
    ctx.fillStyle = `rgba(255,140,0,0.2)`;
    ctx.fillRect(cx - 6, cy - 20 + bob, 13, 18);
    // Wrap
    ctx.fillStyle = '#ffcc44';
    ctx.fillRect(cx - 3, cy - 4 + bob, 7, 2);

  } else if (id === 'bow') {
    const bob = Math.round(Math.sin(t * 0.0025) * 1.5);
    const bc2 = lvl >= 2 ? '#cc88ff' : lvl >= 1 ? '#88ccff' : '#cc9900';
    // Bow limbs (curved with pixel steps)
    const steps = [[-2,-12],[-3,-8],[-3,-4],[-3,0],[-3,4],[-3,8],[-2,12]];
    for (const [ox, oy] of steps) {
      ctx.fillStyle = bc2;
      ctx.fillRect(cx + ox, cy + oy + bob, 3, 3);
    }
    // Bow body darker
    ctx.fillStyle = lvl >= 1 ? '#885522' : '#664422';
    for (let i = -10; i <= 10; i++) ctx.fillRect(cx - 1, cy + i + bob, 2, 1);
    // String
    ctx.fillStyle = '#cccccc';
    ctx.fillRect(cx + 4, cy - 11 + bob, 1, 23);
    ctx.fillRect(cx + 3, cy - 9 + bob, 2, 1);
    ctx.fillRect(cx + 3, cy + 9 + bob, 2, 1);
    // Arrow nocked
    ctx.fillStyle = '#ffdd44';
    ctx.fillRect(cx + 1, cy - 1 + bob, 12, 2);
    ctx.fillStyle = '#888';
    ctx.fillRect(cx + 10, cy - 2 + bob, 3, 4);
  }
}

function drawInventory(timestamp) {
  const owned = getOwnedWeapons();
  if (invCursor >= owned.length) invCursor = 0;

  // Backdrop
  ctx.fillStyle = 'rgba(0,0,0,0.88)';
  ctx.fillRect(0, 0, W, H);

  const iw = 520, ih = 400;
  const ix = (W - iw) / 2, iy = (H - ih) / 2;

  // Panel
  ctx.fillStyle = '#080500';
  ctx.fillRect(ix, iy, iw, ih);
  ctx.strokeStyle = '#cc8800'; ctx.lineWidth = 2;
  ctx.strokeRect(ix, iy, iw, ih);
  ctx.strokeStyle = '#331800'; ctx.lineWidth = 1;
  ctx.strokeRect(ix + 4, iy + 4, iw - 8, ih - 8);

  // Title
  ctx.font = '9px "Press Start 2P"';
  ctx.fillStyle = '#cc8800';
  ctx.textAlign = 'center';
  ctx.fillText('INVENTORY', W / 2, iy + 26);

  ctx.font = '5px "Press Start 2P"';
  ctx.fillStyle = '#443300';
  ctx.fillText('A / D  SELECT     ENTER  EQUIP     I  CLOSE', W / 2, iy + 42);
  ctx.textAlign = 'left';

  // Divider
  ctx.fillStyle = '#221100';
  ctx.fillRect(ix + 10, iy + 48, iw - 20, 1);

  // Weapon slots
  const slotW = 120, slotH = 220;
  const totalSlotW = owned.length * slotW + (owned.length - 1) * 12;
  const startX = ix + iw / 2 - totalSlotW / 2;
  const slotY = iy + 58;

  owned.forEach((wpn, i) => {
    const sx = startX + i * (slotW + 12);
    const selected = i === invCursor;
    const equipped = player.weapon === wpn.id;
    const pulse = selected ? 0.6 + Math.sin(timestamp * 0.005) * 0.4 : 0;

    // Slot bg
    ctx.fillStyle = equipped ? '#1a0d00' : selected ? '#110800' : '#0a0500';
    ctx.fillRect(sx, slotY, slotW, slotH);

    // Border
    if (equipped) {
      ctx.strokeStyle = wpn.color;
      ctx.lineWidth = 2;
      ctx.shadowColor = wpn.color;
      ctx.shadowBlur = 8 * pulse;
    } else if (selected) {
      ctx.strokeStyle = '#664400';
      ctx.lineWidth = 1;
      ctx.shadowBlur = 0;
    } else {
      ctx.strokeStyle = '#221100';
      ctx.lineWidth = 1;
      ctx.shadowBlur = 0;
    }
    ctx.strokeRect(sx, slotY, slotW, slotH);
    ctx.shadowBlur = 0; ctx.lineWidth = 1;

    // EQUIPPED badge
    if (equipped) {
      ctx.fillStyle = wpn.color;
      ctx.font = '5px "Press Start 2P"';
      ctx.textAlign = 'center';
      ctx.fillText('✦ EQUIPPED ✦', sx + slotW / 2, slotY + 12);
    }

    // Weapon sprite (centred in top half of slot)
    const spriteY = slotY + (equipped ? 30 : 22);
    drawWeaponSprite(ctx, wpn.id, sx + slotW / 2, spriteY, wpn.color, wpn.level, timestamp);

    // Name
    ctx.font = '6px "Press Start 2P"';
    ctx.fillStyle = selected || equipped ? wpn.color : '#886644';
    ctx.textAlign = 'center';
    const nameY = slotY + 130;
    // Word-wrap long names
    const words = wpn.label.split(' ');
    if (words.length > 1 && ctx.measureText(wpn.label).width > slotW - 8) {
      const mid = Math.ceil(words.length / 2);
      ctx.fillText(words.slice(0, mid).join(' '), sx + slotW / 2, nameY);
      ctx.fillText(words.slice(mid).join(' '), sx + slotW / 2, nameY + 12);
    } else {
      ctx.fillText(wpn.label, sx + slotW / 2, nameY);
    }

    // Level pips
    if (wpn.maxLevel > 0) {
      const pipW = 10, pipGap = 4;
      const totalPip = wpn.maxLevel * pipW + (wpn.maxLevel - 1) * pipGap;
      const pipX = sx + slotW / 2 - totalPip / 2;
      for (let p = 0; p < wpn.maxLevel; p++) {
        ctx.fillStyle = p < wpn.level ? wpn.color : '#221100';
        ctx.fillRect(pipX + p * (pipW + pipGap), slotY + 148, pipW, 4);
      }
    }

    // Stats
    ctx.font = '5px "Press Start 2P"';
    ctx.textAlign = 'left';
    const statX = sx + 6;
    let statY = slotY + 162;
    ctx.fillStyle = '#664433';
    ctx.fillText('DMG: ' + wpn.dmg, statX, statY); statY += 11;
    ctx.fillText('RNG: ' + wpn.range, statX, statY); statY += 11;

    // Special (word-wrap to fit slot width)
    ctx.fillStyle = '#443322';
    const maxW = slotW - 12;
    const specialWords = wpn.special.split(' ');
    let line = '';
    for (const word of specialWords) {
      const test = line + (line ? ' ' : '') + word;
      if (ctx.measureText(test).width > maxW && line) {
        ctx.fillText(line, statX, statY); statY += 10;
        line = word;
      } else line = test;
    }
    if (line) ctx.fillText(line, statX, statY);

    ctx.textAlign = 'left';
  });

  // Bottom hint — if nothing else owned, nudge player to shop
  if (owned.length === 1) {
    ctx.font = '5px "Press Start 2P"';
    ctx.fillStyle = '#332200';
    ctx.textAlign = 'center';
    ctx.fillText('buy weapons at the shop [E] to unlock more slots', W / 2, iy + ih - 14);
    ctx.textAlign = 'left';
  }

  // Current weapon HUD hint at bottom
  ctx.font = '6px "Press Start 2P"';
  ctx.fillStyle = '#554422';
  ctx.textAlign = 'center';
  ctx.fillText('quick-swap: 1 = SWORD   2 = TORCH   3 = BOW', W / 2, iy + ih - 26);
  ctx.textAlign = 'left';
}



function drawMerchant(ctx, sx, sy, lit, timestamp, wx, wy) {
  if (lit < 0.05) return;
  const a = Math.min(1, lit * 2.5);
  const bob = Math.round(Math.sin(timestamp * 0.002 + wx) * 1.5);
  // Robe body
  ctx.fillStyle = `rgba(60,30,80,${a})`;
  ctx.fillRect(sx+3, sy+8+bob, 10, 8);
  // Hood/head
  ctx.fillStyle = `rgba(40,20,60,${a})`;
  ctx.fillRect(sx+4, sy+2+bob, 8, 7);
  // Face glint
  ctx.fillStyle = `rgba(255,220,150,${a*0.8})`;
  ctx.fillRect(sx+6, sy+4+bob, 4, 3);
  // Eyes (glowing)
  ctx.fillStyle = `rgba(255,200,50,${a})`;
  ctx.fillRect(sx+6, sy+5+bob, 1, 1);
  ctx.fillRect(sx+9, sy+5+bob, 1, 1);
  // Lantern (right hand)
  const lflick = 0.7 + 0.3 * Math.sin(timestamp * 0.006 + wy);
  ctx.fillStyle = `rgba(255,180,50,${a*lflick*0.9})`;
  ctx.fillRect(sx+13, sy+7+bob, 3, 4);
  ctx.fillStyle = `rgba(255,255,100,${a*lflick})`;
  ctx.fillRect(sx+14, sy+8+bob, 1, 2);
  // Glow
  ctx.fillStyle = `rgba(255,160,0,${a*lflick*0.18})`;
  ctx.fillRect(sx+8, sy+2+bob, 12, 12);
  // Label
  if (lit > 0.3) {
    ctx.font = '5px "Press Start 2P"';
    ctx.fillStyle = `rgba(255,200,80,${a})`;
    ctx.textAlign = 'center';
    ctx.fillText('MERCHANT', sx + 8, sy - 3 + bob);
    ctx.textAlign = 'left';
  }
}

function drawShop(timestamp) {
  ctx.fillStyle = 'rgba(0,0,0,0.88)';
  ctx.fillRect(0, 0, W, H);

  const sw = 500, sh = 440;
  const sx = (W - sw) / 2, sy = (H - sh) / 2;

  ctx.fillStyle = '#0a0500';
  ctx.fillRect(sx, sy, sw, sh);
  ctx.strokeStyle = '#ff9900'; ctx.lineWidth = 2;
  ctx.strokeRect(sx, sy, sw, sh);
  ctx.strokeStyle = '#442200'; ctx.lineWidth = 1;
  ctx.strokeRect(sx+4, sy+4, sw-8, sh-8);

  // Title
  ctx.font = '9px "Press Start 2P"';
  ctx.fillStyle = '#ff9900';
  ctx.textAlign = 'center';
  ctx.fillText('SHOP', W/2, sy + 22);
  ctx.font = '6px "Press Start 2P"';
  ctx.fillStyle = '#ffdd44';
  ctx.fillText(`GOLD: ${gold}g    BOMBS: ${bombCount}`, W/2, sy + 38);

  // Tabs
  const tabs = ['EXPLORE', 'WEAPONS'];
  tabs.forEach((tab, ti) => {
    const tw = 110, th = 18;
    const tx = sx + 20 + ti * (tw + 8);
    const ty = sy + 46;
    const active = shopTab === ti;
    ctx.fillStyle = active ? '#331800' : '#110800';
    ctx.fillRect(tx, ty, tw, th);
    ctx.strokeStyle = active ? '#ff9900' : '#442200'; ctx.lineWidth = 1;
    ctx.strokeRect(tx, ty, tw, th);
    ctx.font = '6px "Press Start 2P"';
    ctx.fillStyle = active ? '#ffcc44' : '#664422';
    ctx.textAlign = 'center';
    ctx.fillText(tab, tx + tw/2, ty + 12);
  });
  ctx.textAlign = 'left';

  // Filter upgrades by current tab
  const tabKey = shopTab === 0 ? 'explore' : 'weapons';
  const tabUpgrades = upgrades.filter(u => (u.tab || 'explore') === tabKey);
  const visStart = Math.max(0, shopCursor - 3);
  const visItems = tabUpgrades.slice(visStart, visStart + 5);

  const rowH = 58;
  visItems.forEach((upg, vi) => {
    const globalI = tabUpgrades.indexOf(upg);
    const iy = sy + 72 + vi * rowH;
    const ix = sx + 16;
    const selected = globalI === shopCursor;
    const maxed = upg.isBombs ? false : upg.level >= upg.maxLevel;
    const cost = upgradeCost(upg);
    const canAfford = gold >= cost && !maxed;
    const displayName = upg.labels
      ? (upg.level > 0 ? upg.labels[Math.min(upg.level-1, upg.labels.length-1)] : upg.labels[0])
      : upg.name;

    ctx.fillStyle = selected ? (canAfford ? '#1a1000' : '#0d0800') : '#000';
    ctx.fillRect(ix - 4, iy - 2, sw - 24, rowH - 4);
    if (selected) {
      ctx.strokeStyle = canAfford ? '#ff9900' : '#553300'; ctx.lineWidth = 1;
      ctx.strokeRect(ix - 4, iy - 2, sw - 24, rowH - 4);
    }

    // Weapon indicator dot
    if (upg.tab === 'weapons' && !upg.isBombs) {
      const owned = upg.level > 0;
      const active = player.weapon === upg.id;
      ctx.fillStyle = active ? '#ffaa00' : (owned ? '#446644' : '#332200');
      ctx.fillRect(ix + 4, iy + 2, 6, 6);
      if (active) {
        ctx.font = '5px "Press Start 2P"';
        ctx.fillStyle = '#ffaa00';
        ctx.fillText('EQUIPPED', sx + sw - 80, iy + 10);
      }
    }

    ctx.font = '7px "Press Start 2P"';
    ctx.fillStyle = maxed ? '#886600' : (selected ? '#ffcc44' : '#cc8800');
    ctx.fillText(displayName, ix + 14, iy + 14);

    ctx.font = '5px "Press Start 2P"';
    ctx.fillStyle = '#886644';
    ctx.fillText(upg.desc, ix + 14, iy + 27);

    if (!upg.isBombs) {
      for (let p = 0; p < upg.maxLevel; p++) {
        ctx.fillStyle = p < upg.level ? '#ffaa00' : '#332200';
        ctx.fillRect(ix + 14 + p * 13, iy + 34, 10, 5);
      }
    } else {
      ctx.font = '5px "Press Start 2P"';
      ctx.fillStyle = '#ffaa44';
      ctx.fillText(`Owned: ${bombCount}  (buy more with ENTER)`, ix + 14, iy + 38);
    }

    ctx.textAlign = 'right';
    if (maxed) {
      ctx.font = '6px "Press Start 2P"'; ctx.fillStyle = '#664400';
      ctx.fillText('MAXED', sx + sw - 20, iy + 18);
    } else {
      ctx.font = '6px "Press Start 2P"';
      ctx.fillStyle = canAfford ? '#ffdd44' : '#554400';
      ctx.fillText(`${cost}g`, sx + sw - 20, iy + 18);
    }
    ctx.textAlign = 'left';
  });

  if (tabUpgrades.length > 5) {
    ctx.font = '5px "Press Start 2P"'; ctx.fillStyle = '#443300';
    ctx.textAlign = 'center';
    ctx.fillText(`${shopCursor+1} / ${tabUpgrades.length}`, W/2, sy + sh - 24);
  }
  ctx.font = '5px "Press Start 2P"'; ctx.fillStyle = '#443300';
  ctx.textAlign = 'center';
  ctx.fillText('W/S: SELECT   ENTER: BUY/EQUIP   A/D: TABS   E: CLOSE', W/2, sy + sh - 10);
  ctx.textAlign = 'left';
}
